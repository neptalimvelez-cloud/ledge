function renderBudgetOverview(){
  const now=new Date(),{wNet,mNet,connected}=getBudgetIncome();
  const activeExp=S.expenses.filter(e=>e.active!==false);
  const ws=getWeekStart(now,'0','00:00');// budget uses sun week for now
  const recW=activeExp.filter(e=>e.frequency!=='one-time').reduce((s,e)=>s+expWeekAmt(e,ws),0);
  const recM=activeExp.filter(e=>e.frequency!=='one-time').reduce((s,e)=>s+expMonthAmt(e,now.getFullYear(),now.getMonth()),0);
  const otW=activeExp.filter(e=>e.frequency==='one-time'&&!e.paid&&inWeek(e,ws)).reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  const otM=activeExp.filter(e=>e.frequency==='one-time'&&!e.paid&&inMonth(e,now.getFullYear(),now.getMonth())).reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  const wBal=wNet-(recW+otW),mBal=mNet-(recM+otM);

  // YTD from log + custom shifts + imported income
  const yr=now.getFullYear(),rate=parseFloat(S.schedule.hourlyRate)||0;
  let ytdG=0;
  for(const[,dm]of Object.entries(S.log)){for(const[dk,sec]of Object.entries(dm)){const d=parseLocal(dk);if(d.getFullYear()===yr)ytdG+=calcEarnings(sec,rate,S.schedule.overtimeAfter,S.schedule.overtimeMultiplier);}}
  const ytdCsGross=S.customShifts.filter(cs=>parseLocal(cs.date).getFullYear()===yr).reduce((s,c)=>s+csGross(c),0);
  const ytdSideInc=S.sideIncome.filter(s=>s.date&&parseLocal(s.date).getFullYear()===yr&&s.frequency==='one-time').reduce((t,s)=>t+(parseFloat(s.amount)||0),0);
  const ytdTxInc=getTxIncome(new Date(yr,0,1),new Date(yr,11,31,23,59,59,999));
  const ytdNet=applyDed(ytdG+ytdCsGross,S.deductions)+ytdSideInc+ytdTxInc;

  // This week actual — include live shift seconds not yet saved
  const wkK=wkKey(now),thisWkLog=(S.log[wkK]||{}),wkSec=Object.values(thisWkLog).reduce((a,b)=>a+b,0);
  // Get live shift net seconds (already computed in getLiveEarned internals)
  const _liveShift=(()=>{
    const shift=getActiveShift(now);if(!shift)return{sec:0,wk:null};
    const p=S.pause;
    let ls=p.paused&&p.pausedAt!=null?p.pausedAt:secsIntoShift(now,toMin(shift.shift.start));
    const brkL=p.onBreak&&p.breakStart?Math.floor((now-p.breakStart)/1000):0;
    return{sec:Math.max(0,ls-(p.accBreakSec+brkL)),wk:localStr(getWeekStart(shift.date,S.schedule.weekStartDay,S.schedule.weekStartTime))};
  })();
  const liveSecThisWk=_liveShift.wk===wkK?_liveShift.sec:0;
  const wkActGross=calcEarnings(wkSec+liveSecThisWk,rate,S.schedule.overtimeAfter,S.schedule.overtimeMultiplier);
  const wkActNet=applyDed(wkActGross,S.deductions);
  // Add side income for this week
  const wkStart2=getWeekStart(now,S.schedule.weekStartDay,S.schedule.weekStartTime);
  const wkEnd2=wkEnd(wkStart2);
  const siWk=S.sideIncome.filter(s=>{
    if(s.frequency==='one-time')return s.date&&(()=>{const d=parseLocal(s.date);return d>=wkStart2&&d<=wkEnd2;})();
    return false;
  }).reduce((t,s)=>t+(parseFloat(s.amount)||0),0);
  const txIncW=getTxIncome(wkStart2,wkEnd2);
  const wkActNetFinal=wkActNet+siWk+txIncW;
  // Actual spending from transactions this week
  const wsStart=ws,wsEnd=new Date(ws);wsEnd.setDate(wsEnd.getDate()+6);wsEnd.setHours(23,59,59,999);
  const txSpendW=getTxSpending(wsStart,wsEnd);
  const actualExpW=Math.max(recW+otW,txSpendW);
  const wActBal=wkActNetFinal-actualExpW;

  // This month actual from log
  let mActSec=0;
  for(const[,dm]of Object.entries(S.log)){for(const[dk,sec]of Object.entries(dm)){const d=parseLocal(dk);if(d.getFullYear()===yr&&d.getMonth()===now.getMonth())mActSec+=sec;}}
  const mActGross=calcEarnings(mActSec,rate,S.schedule.overtimeAfter,S.schedule.overtimeMultiplier);
  // Add custom shifts for this month
  const mActCsG=S.customShifts.filter(cs=>{const d=parseLocal(cs.date);return d.getFullYear()===yr&&d.getMonth()===now.getMonth();}).reduce((s,c)=>s+csGross(c),0);
  const mActNet=applyDed(mActGross+mActCsG,S.deductions);
  // Add one-time side income this month + imported deposits
  const moStart=new Date(yr,now.getMonth(),1),moEnd=new Date(yr,now.getMonth()+1,0,23,59,59,999);
  const siMo=S.sideIncome.filter(s=>{
    if(s.frequency==='one-time')return s.date&&(()=>{const d=parseLocal(s.date);return d>=moStart&&d<=moEnd;})();
    return false;
  }).reduce((t,s)=>t+(parseFloat(s.amount)||0),0);
  const txIncM=getTxIncome(moStart,moEnd);
  const mActNetFinal=mActNet+siMo+txIncM;
  // Actual monthly spending from transactions
  const txSpendM=getTxSpending(moStart,moEnd);
  const actualExpM=Math.max(recM+otM,txSpendM);
  const mActBal=mActNetFinal-actualExpM;

  // Savings rate
  const savingsM=activeExp.filter(e=>e.category==='savings'&&e.frequency!=='one-time').reduce((s,e)=>s+toMonthly(e),0);
  const savRate=mNet>0?Math.round((savingsM/mNet)*100):0;

  // Tx note for overview
  const txImportedIncome=S.transactions.filter(t=>{const type=(t.type||'').toLowerCase();const amt=parseFloat(t.amount)||0;return amt>0&&(type==='deposit'||type==='direct deposit'||type==='cash bonus'||type==='income');}).length;
  const txNote=S.transactions.length>0?`<div style="font-size:9px;color:var(--mut);margin-bottom:12px;padding:6px 10px;background:var(--surf);border-left:2px solid var(--blu)">⊞ ${S.transactions.length} imported transaction${S.transactions.length!==1?'s':''} · ${txImportedIncome} income · included in actuals · <button onclick="S.budgetTab='transactions';_txWizard.step='import';render()" style="font-size:9px;color:var(--blu);border:none;background:none;cursor:pointer;padding:0;text-decoration:underline">Manage</button></div>`:'';

  // Income threshold alert
  const incomeFloor=parseFloat(S.incomeSafetyThresholds.monthlyFloor)||0;
  const incomeAlertHTML=(()=>{
    if(!incomeFloor||!mActNetFinal)return'';
    const dayOfMonth=now.getDate(),daysInMonth=new Date(yr,now.getMonth()+1,0).getDate();
    const projected=mActNetFinal*(daysInMonth/dayOfMonth);
    const shortfall=incomeFloor-projected;
    if(shortfall<=0)return'';
    return'<div style="font-size:10px;color:var(--org);margin-bottom:14px;padding:10px 12px;background:var(--orgd);border:1px solid rgba(255,173,107,.3);border-left:3px solid var(--org);line-height:1.6">'
      +'⚠ '+MONTHS[now.getMonth()]+' income projected at '+fmt$(projected)+' — '+fmt$(shortfall)+' below your '+fmt$(incomeFloor)+' floor.'
      +' Consider extra hours or cutting discretionary spend.</div>';
  })();

  // Budget variance — actual tx spend vs envelope/budget per category this month
  const txSpendByCat=getTxSpendingByCategory(moStart,moEnd);
  const budgetVarianceHTML=(()=>{
    const cats=CATS.filter(c=>c.id!=='custom');
    const rows=cats.map(c=>{
      const budgeted=S.envelopes[c.id]||activeExp.filter(e=>e.active!==false&&e.category===c.id&&e.frequency!=='one-time').reduce((s,e)=>s+toMonthly(e),0);
      const actual=txSpendByCat[c.id]||0;
      if(!budgeted&&!actual)return null;
      const diff=budgeted-actual;
      const pct=budgeted>0?Math.round((actual/budgeted)*100):0;
      return{cat:c,budgeted,actual,diff,pct};
    }).filter(Boolean);
    if(!rows.length)return'';
    return'<div class="mb20"><div class="label">Budget vs Actual (This Month)</div>'
      +rows.map(r=>'<div style="margin-bottom:8px">'
        +'<div class="flex" style="justify-content:space-between;margin-bottom:3px">'
        +'<span style="font-size:10px"><span style="color:'+r.cat.color+'">'+r.cat.icon+'</span> '+r.cat.label+'</span>'
        +'<span style="font-size:9px;color:'+(r.diff>=0?'var(--grn)':'var(--red)')+'">'+fmt$(r.actual)+' / '+fmt$(r.budgeted)+(r.pct>0?' ('+r.pct+'%)':'')+'</span>'
        +'</div>'
        +'<div class="prog"><div class="prog-fill" style="width:'+Math.min(100,r.pct)+'%;background:'+(r.pct>100?'var(--red)':r.pct>80?'var(--org)':'var(--grn)')+'"></div></div>'
        +'</div>').join('')
      +'</div>';
  })();
  // Upcoming one-time
  const upcoming=activeExp.filter(e=>e.frequency==='one-time'&&e.oneTimeDate&&!e.paid).map(e=>({...e,days:daysUntil(e.oneTimeDate)})).filter(e=>e.days>=-1&&e.days<=60).sort((a,b)=>a.days-b.days);

  // Category breakdown
  const byCat={};
  for(const e of activeExp.filter(x=>x.frequency!=='one-time')){const k=e.category;byCat[k]=(byCat[k]||0)+toMonthly(e);}
  const catSorted=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const catTotal=catSorted.reduce((s,[,v])=>s+v,0);

  // Recent paychecks
  const recentPc=Object.entries(S.paychecks).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,4);

  const balCard=(bal,label,inc,recExp,otExp,incSub,actIncome,actBal)=>`<div class="mb20">
    <div class="label">${label}</div>
    <div class="card" style="border-left:3px solid ${actIncome>0?(actBal>=0?'var(--grn)':'var(--red)'):(bal>=0?'var(--grn)':'var(--red)')}">
      ${actIncome>0?`
      <div class="bal-badge">
        <div class="bal-dot" style="background:${actBal>=0?'var(--grn)':'var(--red)'};box-shadow:0 0 8px ${actBal>=0?'var(--grn)':'var(--red)'}"></div>
        <div class="bal-num" style="color:${actBal>=0?'var(--grn)':'var(--red)'}">${fmt$(actBal,true)}</div>
      </div>
      <div class="row bold"><span class="rl">Earned So Far</span><span class="rr" style="color:var(--grn)">${fmt$(actIncome)}</span></div>
      <div class="row"><span class="rl">Total Expenses</span><span class="rr" style="color:var(--red)">−${fmt$(recExp+otExp)}</span></div>
      <div style="border-top:1px solid var(--bdr);margin-top:8px;padding-top:8px">
        <div class="row"><span class="rl" style="color:var(--mut)">Projected if remaining hours worked</span><span class="rr" style="font-size:12px">${fmt$(inc)}${incSub?`<br><span style="font-size:9px;color:var(--mut)">${incSub}</span>`:''}</span></div>
        ${otExp>0?`<div class="row"><span class="rl" style="color:var(--mut);font-size:9px">One-Time</span><span class="rr" style="font-size:11px;color:var(--red)">−${fmt$(otExp)}</span></div>`:''}
        <div class="row bold"><span class="rl" style="color:var(--mut)">Projected Surplus</span><span class="rr" style="color:${bal>=0?'var(--grn)':'var(--red)'}">${fmt$(bal,true)}</span></div>
      </div>`:`
      <div style="font-size:9px;letter-spacing:3px;color:var(--mut);margin-bottom:6px;text-transform:uppercase">${bal>=0?'SURPLUS':'DEFICIT'}</div>
      <div class="bal-badge">
        <div class="bal-dot" style="background:${bal>=0?'var(--grn)':'var(--red)'};box-shadow:0 0 8px ${bal>=0?'var(--grn)':'var(--red)'}"></div>
        <div class="bal-num" style="color:${bal>=0?'var(--grn)':'var(--red)'}">${fmt$(bal,true)}</div>
      </div>
      <div class="row"><span class="rl">Expected Income</span><span class="rr">${fmt$(inc)}${incSub?`<br><span style="font-size:9px;color:var(--mut)">${incSub}</span>`:''}</span></div>
      <div class="row"><span class="rl">Total Expenses</span><span class="rr" style="color:var(--red)">−${fmt$(recExp+otExp)}</span></div>
      <div class="row bold"><span class="rl">Net</span><span class="rr" style="color:${bal>=0?'var(--grn)':'var(--red)'}">${fmt$(bal,true)}</span></div>`}
    </div>
  </div>`;

  content.innerHTML=`<div class="page">
    ${connected&&ytdG>0?`<div class="card" style="display:flex;justify-content:space-between;align-items:center;border-left:3px solid var(--acc);margin-bottom:20px">
      <div><div class="label2">${yr} YTD</div><div style="font-size:22px;font-weight:bold;color:var(--acc)">${fmt$(ytdNet)} net</div><div style="font-size:9px;color:var(--mut);margin-top:3px">wages + income${ytdTxInc>0?` · ${fmt$(ytdTxInc)} imported`:''}</div></div>
      <div class="right"><div class="label2">Actual This Week</div><div style="font-size:16px;font-weight:bold;color:var(--grn)">${fmt$(wkActNetFinal)}</div></div>
    </div>`:''}
    ${txNote}
    ${incomeAlertHTML}
    ${balCard(wBal,'This Week',wNet,recW,otW,connected?'from Pay Ledger':null,wkActNetFinal,wActBal)}
    ${balCard(mBal,'This Month',mNet,recM,otM,connected?'from Pay Ledger':null,mActNetFinal,mActBal)}

    ${(()=>{
      // 6-month income vs expense trend chart
      const months6=Array.from({length:6},(_,i)=>{
        const d=new Date(now.getFullYear(),now.getMonth()-5+i,1);
        const yr2=d.getFullYear(),mo2=d.getMonth();
        let secs2=0;
        for(const[,dm]of Object.entries(S.log)){for(const[dk,sec]of Object.entries(dm)){const dd=parseLocal(dk);if(dd.getFullYear()===yr2&&dd.getMonth()===mo2)secs2+=sec;}}
        const g2=calcEarnings(secs2,rate,S.schedule.overtimeAfter,S.schedule.overtimeMultiplier);
        // Add custom shift gross for this month
        const csG2=S.customShifts.filter(cs=>{const dd=parseLocal(cs.date);return dd.getFullYear()===yr2&&dd.getMonth()===mo2;}).reduce((s,c)=>s+csGross(c),0);
        // Add side income for this month
        const siInc=S.sideIncome.filter(s=>{
          if(s.frequency==='one-time')return s.date&&(()=>{const dd=parseLocal(s.date);return dd.getFullYear()===yr2&&dd.getMonth()===mo2;})();
          return true;
        }).reduce((s,si)=>s+(si.frequency==='one-time'?parseFloat(si.amount)||0:toMonthly({amount:si.amount,frequency:si.frequency})),0);
        // Add imported deposit income for this month
        const moS2=new Date(yr2,mo2,1),moE2=new Date(yr2,mo2+1,0,23,59,59,999);
        const txInc2=getTxIncome(moS2,moE2);
        const n2=applyDed(g2+csG2,S.deductions)+siInc+txInc2;
        // Scheduled expenses
        const schedExpM=S.expenses.filter(e=>e.active!==false&&!e.archived).reduce((s,e)=>inMonth(e,yr2,mo2)&&!e.paid?s+expMonthAmt(e,yr2,mo2):s,0);
        // Actual imported transaction spend for this month
        const txExp=getTxSpending(moS2,moE2);
        const expM=Math.max(schedExpM,txExp);
        return{label:MONTHS[mo2],income:n2,expenses:expM,surplus:n2-expM};
      });
      const maxVal=Math.max(...months6.flatMap(m=>[m.income,m.expenses]),1);
      const W=60,G=8,H=60,TW=months6.length*(W+G)-G;
      return`<div class="mb20">
        <div class="label">6-Month Trend</div>
        <svg viewBox="0 0 ${TW} ${H+18}" style="width:100%;display:block">
          ${months6.map((m,i)=>{
            const ih=Math.max(2,(m.income/maxVal)*H),eh=Math.max(2,(m.expenses/maxVal)*H);
            const x=i*(W+G),iY=H-ih,eY=H-eh;
            return`<rect x="${x}" y="${iY}" width="${W*0.45}" height="${ih}" fill="rgba(77,186,110,.7)" rx="1"/>
                   <rect x="${x+W*0.5}" y="${eY}" width="${W*0.45}" height="${eh}" fill="rgba(192,80,80,.6)" rx="1"/>
                   <text x="${x+W/2}" y="${H+12}" text-anchor="middle" fill="var(--mut)" font-size="7" font-family="monospace">${m.label}</text>
                   ${m.surplus>0?`<text x="${x+W/4}" y="${iY-3}" text-anchor="middle" fill="var(--grn)" font-size="6">+${Math.round(m.surplus/100)*100>999?Math.round(m.surplus/1000)+'k':''}</text>`:''}`;
          }).join('')}
        </svg>
        <div class="flex gap10" style="justify-content:center;margin-top:4px">
          <div style="display:flex;align-items:center;gap:4px;font-size:8px;color:var(--mut)"><div style="width:10px;height:6px;background:rgba(77,186,110,.7);border-radius:1px"></div>Income</div>
          <div style="display:flex;align-items:center;gap:4px;font-size:8px;color:var(--mut)"><div style="width:10px;height:6px;background:rgba(192,80,80,.6);border-radius:1px"></div>Expenses</div>
        </div>
      </div>`;
    })()}

    ${recentPc.length?`<div class="mb20">
      <div class="label">Recent Paychecks — Actual vs Projected</div>
      ${recentPc.map(([wk,pc])=>{
        const d=parseLocal(wk),wkLog=(S.log[wk]||{}),sec=Object.values(wkLog).reduce((a,b)=>a+b,0);
        const g=calcEarnings(sec,rate,S.schedule.overtimeAfter,S.schedule.overtimeMultiplier),proj=applyDed(g,S.deductions);
        const diff=pc.amount-proj;
        return`<div class="flex" style="justify-content:space-between;align-items:center;padding:9px 14px;background:var(--surf);margin-bottom:6px;border-left:2px solid ${diff>=0?'var(--grn)':'var(--red)'}">
          <div>
            <div style="font-size:9px;color:var(--mut)">WK OF ${MONTHS[d.getMonth()].toUpperCase()} ${d.getDate()}${pc.date?` · Received ${pc.date}`:''}</div>
            <div style="font-size:10px;margin-top:2px">Projected ${fmt$(proj)} · Actual ${fmt$(pc.amount)}</div>
          </div>
          <div style="font-size:13px;font-weight:bold;color:${diff>=0?'var(--grn)':'var(--red)'}">${diff>=0?'+':''}${fmt$(diff)}</div>
        </div>`;
      }).join('')}
    </div>`:''}

    ${mNet>0?`<div class="flex gap10 mb20">
      <div class="stat-box" style="border-left:2px solid var(--grn)"><div class="sl">Savings Rate</div><div class="sv" style="color:var(--grn)">${savRate}%</div><div style="font-size:9px;color:var(--mut);margin-top:2px">${fmt$(savingsM)}/mo</div></div>
      <div class="stat-box" style="border-left:2px solid var(--blu)"><div class="sl">Cash Runway</div><div class="sv" style="color:var(--blu)">${recM>0?`${Math.floor(mNet/recM*10)/10} mo`:'—'}</div><div style="font-size:9px;color:var(--mut);margin-top:2px">income vs expenses</div></div>
    </div>`:''}

    ${(()=>{
      const trend=getExpenseTrend();
      const hasData=trend.some(t=>t.total>0);
      if(!hasData)return'';
      const mx=Math.max(...trend.map(t=>t.total),1);
      return`<div class="mb20">
        <div class="label">Expense Trend (3 months)</div>
        <div class="flex gap8">${trend.map(t=>{const pct=Math.round((t.total/mx)*100);return`<div style="flex:1;text-align:center"><div style="height:40px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:4px"><div style="width:24px;background:${t.total>trend[0].total?'var(--red)':'var(--grn)'};border-radius:2px 2px 0 0;height:${Math.max(4,pct)}%"></div></div><div style="font-size:8px;color:var(--mut)">${t.label}</div><div style="font-size:9px;font-weight:bold">${fmt$(t.total)}</div></div>`;}).join('')}
        </div>
      </div>`;
    })()}
    ${catTotal>0?`<div class="mb20">
      <div class="label">Monthly by Category</div>
      ${catSorted.map(([catId,amt])=>{const cat=catById[catId]||CATS[CATS.length-1],pct=catTotal>0?(amt/catTotal)*100:0;return`<div class="mb8"><div class="flex" style="justify-content:space-between;margin-bottom:4px"><span style="font-size:11px"><span style="color:${cat.color}">${cat.icon} </span>${cat.label}</span><span style="font-size:12px">${fmt$(amt)}</span></div><div class="prog"><div class="prog-fill" style="width:${pct}%;background:${cat.color};opacity:.8"></div></div></div>`;}).join('')}
    </div>`:''}

    ${budgetVarianceHTML}

    ${(()=>{
      // Monthly actual spending from transactions by category
      const txByCat=getTxSpendingByCategory(moStart,moEnd);
      const txCats=Object.entries(txByCat).sort((a,b)=>b[1]-a[1]);
      const txTotal=txCats.reduce((s,[,v])=>s+v,0);
      if(!txTotal)return'';
      return'<div class="mb20"><div class="label">Actual Spending This Month (from transactions)</div>'
        +txCats.map(([catId,amt])=>{const cat=catById[catId]||CATS[CATS.length-1];const pct=txTotal>0?(amt/txTotal)*100:0;return'<div class="mb8"><div class="flex" style="justify-content:space-between;margin-bottom:4px"><span style="font-size:11px"><span style="color:'+cat.color+'">'+cat.icon+' </span>'+cat.label+'</span><span style="font-size:12px">'+fmt$(amt)+'</span></div><div class="prog"><div class="prog-fill" style="width:'+pct+'%;background:'+cat.color+';opacity:.8"></div></div></div>';}).join('')
        +'<div style="font-size:9px;color:var(--mut);margin-top:6px">Total: '+fmt$(txTotal)+'</div></div>';
    })()}

    ${upcoming.length?`<div>
      <div class="label">Upcoming One-Time</div>
      ${upcoming.slice(0,5).map(e=>{const cat=catById[e.category]||CATS[CATS.length-1];const due=e.days===0?'Today':e.days===1?'Tomorrow':e.days<0?`${Math.abs(e.days)}d ago`:`In ${e.days}d`;return`<div class="flex" style="justify-content:space-between;align-items:center;padding:9px 12px;background:var(--surf);margin-bottom:6px;border-left:2px solid ${e.days<=3?'var(--acc)':'var(--bdr)'}"><div><div style="font-size:12px"><span style="color:${cat.color}">${cat.icon} </span>${e.label}</div><div style="font-size:9px;color:${e.days<=3?'var(--acc)':'var(--mut)'};margin-top:2px">${due} · ${e.oneTimeDate}</div></div><div style="font-size:14px;font-weight:bold;color:var(--red)">−${fmt$(e.amount)}</div></div>`;}).join('')}
    </div>`:''}
  </div>`;
}

// ─── BUDGET EXPENSES ─────────────────────────────────────────────────────────
let _expFilter='all',_showExpForm=false,_editExpId=null,_showEnvelopes=false;
let _expForm={label:'',category:'housing',customCategory:'',amount:'',frequency:'monthly',oneTimeDate:'',dayOfMonth:'',note:''};

function renderBudgetExpenses(){
  const filter=_expFilter;
  const activeExps=S.expenses.filter(e=>!e.archived&&!e._archived);
  const archivedExps=S.expenses.filter(e=>e.archived||e._archived);
  const filtered=activeExps.filter(e=>filter==='all'||(filter==='recurring'&&e.frequency!=='one-time')||(filter==='one-time'&&e.frequency==='one-time'))
    .sort((a,b)=>{if(a.frequency==='one-time'&&b.frequency!=='one-time')return 1;if(b.frequency==='one-time'&&a.frequency!=='one-time')return-1;return toMonthly(b)-toMonthly(a)});

  // Envelope summary — always visible as subsection
  const now2=new Date();
  const envTotal=CATS.filter(c=>c.id!=='custom').reduce((s,cat)=>{
    const spent=S.expenses.filter(e=>e.active!==false&&e.category===cat.id&&e.frequency!=='one-time').reduce((ss,e)=>ss+toMonthly(e),0);
    const limit=S.envelopes[cat.id]||0;
    return s+(limit>0?limit:spent);
  },0);
  const envHTML='<div class="mt20">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;cursor:pointer" onclick="_showEnvelopes=!_showEnvelopes;renderBudgetExpenses()">'
    +'<div class="label" style="margin:0">◇ Envelope Budgets</div>'
    +'<span style="font-size:10px;color:var(--mut)">'+(_showEnvelopes?'▲ Hide':'▼ Show')+'</span>'
    +'</div>'
    +(_showEnvelopes?CATS.filter(c=>c.id!=='custom').map(cat=>{
      const scheduled=S.expenses.filter(e=>e.active!==false&&e.category===cat.id&&e.frequency!=='one-time').reduce((s,e)=>s+toMonthly(e),0);
      // Also count imported transaction spend for this category this month
      const txSpent=txSpendByCatForMonth(cat.id,now2.getFullYear(),now2.getMonth());
      const spent=Math.max(scheduled,txSpent);
      const limit=S.envelopes[cat.id]||0;
      const pct=limit>0?Math.min(100,(spent/limit)*100):0;
      const over=limit>0&&spent>limit;
      const hasTx=txSpent>0;
      return '<div style="margin-bottom:10px">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'
        +'<span style="font-size:10px"><span style="color:'+cat.color+'">'+cat.icon+'</span> '+cat.label+'</span>'
        +'<div style="display:flex;align-items:center;gap:6px">'
        +'<span style="font-size:9px;color:'+(over?'var(--red)':'var(--mut)')+'">'+fmt$(spent)+(hasTx?'*':'')+(limit?' / '+fmt$(limit):'')+' /mo</span>'
        +'<div style="display:flex;align-items:center;border:1px solid var(--bdrh);background:var(--bg)">'
        +'<span style="padding:0 6px;color:var(--mut);font-size:11px">$</span>'
        +'<input type="number" min="0" step="10" placeholder="No limit" value="'+(limit||'')+'" onblur="setEnvLimit(\''+cat.id+'\',this.value)" style="border:none;background:transparent;font-size:11px;padding:4px;width:70px;color:var(--txt)">'
        +'</div></div></div>'
        +(limit?'<div class="prog"><div class="prog-fill" style="width:'+pct+'%;background:'+(over?'var(--red)':pct>80?'var(--org)':'var(--grn)')+'"></div></div>':'<div style="height:3px;background:var(--bdr);border-radius:1px"></div>')
        +'</div>';
    }).join('')+((S.transactions.length>0)?'<div style="font-size:8px;color:var(--mut2);margin-top:6px">* includes imported transaction data</div>':''):'')
    +'</div>';
  const formHTML=_showExpForm?`<div class="inline-form mb14">
    <div class="label">${_editExpId?'Edit Expense':'New Expense'}</div>

function setEnvLimit(catId,val){const v=parseFloat(val)||0;if(v>0)S.envelopes[catId]=v;else delete S.envelopes[catId];save('envelopes');}
function saveExpense(){
  const lbl=document.getElementById('ef-label')?.value;
  const amt=document.getElementById('ef-amt')?.value;
  const freq=document.getElementById('ef-freq')?.value;
  const date=document.getElementById('ef-date')?.value||'';
  const dom=document.getElementById('ef-dom')?.value||'';
  const cc=document.getElementById('ef-cc')?.value||'';
  if(!lbl||!amt)return;
  const e={id:_editExpId||Date.now().toString(),label:lbl,category:_expForm.category,customCategory:cc,amount:amt,frequency:freq,oneTimeDate:date,dayOfMonth:dom,active:true};
  if(_editExpId)S.expenses=S.expenses.map(x=>x.id===_editExpId?e:x);
  else S.expenses=[...S.expenses,e];
  save('expenses');_showExpForm=false;_editExpId=null;renderBudgetExpenses();
}
function delExp(id){S.expenses=S.expenses.filter(e=>e.id!==id);save('expenses');renderBudgetExpenses();}
function toggleExp(id){S.expenses=S.expenses.map(e=>e.id===id?{...e,active:e.active===false}:e);save('expenses');renderBudgetExpenses();}
function markPaid(id){S.expenses=S.expenses.map(e=>e.id===id?{...e,paid:!e.paid}:e);save('expenses');renderBudgetExpenses();}

// Auto-archive one-time expenses whose month has passed
function archiveOldOneTime(){
  const now=new Date();
  let changed=false;
  S.expenses=S.expenses.map(e=>{
    if(e.frequency!=='one-time'||e.paid||e.archived||!e.oneTimeDate)return e;
    const d=parseLocal(e.oneTimeDate);
    // Archive if the expense month has fully passed
    if(d.getFullYear()<now.getFullYear()||(d.getFullYear()===now.getFullYear()&&d.getMonth()<now.getMonth())){
      changed=true;return{...e,paid:true,archived:true};
    }
    return e;
  });
  if(changed)save('expenses');
}

function renderBudgetForecastCalOnly(){
  const yr=_calYear,mo=_calMonth;
  const firstDay=new Date(yr,mo,1).getDay();
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);

  // Build expense-by-day: scheduled expenses + imported transaction expenses
  const expByDay={};
  for(const e of S.expenses.filter(x=>x.active!==false&&!x.archived)){
    if(e.frequency==='one-time'&&e.oneTimeDate&&!e.paid){
      const d=parseLocal(e.oneTimeDate);
      if(d.getFullYear()===yr&&d.getMonth()===mo){const day=d.getDate();if(!expByDay[day])expByDay[day]=[];expByDay[day].push({label:e.label,amount:parseFloat(e.amount)||0,source:'scheduled'});}
    } else if(e.frequency!=='one-time'&&e.dayOfMonth){
      const dom=parseInt(e.dayOfMonth);if(dom>=1&&dom<=daysInMonth){if(!expByDay[dom])expByDay[dom]=[];expByDay[dom].push({label:e.label,amount:parseFloat(e.amount)||0,source:'scheduled'});}
    }
  }
  // Add imported transaction expenses for this month
  for(const t of S.transactions){
    if(!t.date)continue;
    const d=parseLocal(t.date);
    if(d.getFullYear()!==yr||d.getMonth()!==mo)continue;
    const amt=parseFloat(t.amount)||0;
    const type=(t.type||'').toLowerCase();
    if(amt<0||(type==='purchase'||type==='direct debit')){
      const day=d.getDate();
      if(!expByDay[day])expByDay[day]=[];
      expByDay[day].push({label:t.description||t.type||'Purchase',amount:Math.abs(amt),source:'imported'});
    }
  }

  // Payday markers
  const paydays=new Set();
  const rate=parseFloat(S.schedule.hourlyRate)||0;
  const offset=parseInt(S.earlyDepositDays)||0;
  if(rate){
    const seenWks=new Set();
    for(let d=1;d<=daysInMonth;d++){
      const dd=new Date(yr,mo,d);
      const ws=getWeekStart(dd,S.schedule.weekStartDay,S.schedule.weekStartTime);
      const wsKey=localStr(ws);
      if(seenWks.has(wsKey))continue;
      seenWks.add(wsKey);
      const we=wkEnd(ws);
      const payDate=new Date(we);payDate.setDate(payDate.getDate()+1-offset);
      // Use actual paycheck date if recorded
      const pc=S.paychecks[wsKey];
      const actualPay=pc?.date?parseLocal(pc.date):payDate;
      if(actualPay.getFullYear()===yr&&actualPay.getMonth()===mo)paydays.add(actualPay.getDate());
    }
  }
  // Also mark imported deposit dates as income days
  const incDays=new Set();
  for(const t of S.transactions){
    if(!t.date)continue;
    const d=parseLocal(t.date);
    if(d.getFullYear()!==yr||d.getMonth()!==mo)continue;
    const amt=parseFloat(t.amount)||0;
    const type=(t.type||'').toLowerCase();
    if(amt>0&&(type==='deposit'||type==='direct deposit'||type==='cash bonus'))incDays.add(d.getDate());
  }

  const debtDays=new Set(S.debts.filter(d=>d.dayOfMonth).map(d=>parseInt(d.dayOfMonth)));
  const savingsDays=new Set(S.expenses.filter(e=>e.category==='savings'&&e.dayOfMonth&&e.active!==false).map(e=>parseInt(e.dayOfMonth)));
  const today=new Date(),isNow=today.getFullYear()===yr&&today.getMonth()===mo;

  const legend=S.calLegendHidden?'':
    `<div class="cal-legend">
      <div style="width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:8px;letter-spacing:3px;color:var(--mut);text-transform:uppercase">Legend</span>
        <button onclick="S.calLegendHidden=true;renderCalApp()" style="font-size:8px;color:var(--mut);border:none;background:transparent;padding:0;cursor:pointer">Hide</button>
      </div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#5b8de8"></div>PAYDAY</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--red)"></div>EXPENSE</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--org)"></div>DEBT DUE</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--grn)"></div>SAVINGS</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#9b7de8"></div>MULTIPLE</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--acc)"></div>TODAY</div>
    </div>`;
  const legendToggle=S.calLegendHidden?`<button onclick="S.calLegendHidden=false;renderCalApp()" style="font-size:8px;color:var(--mut);border:1px solid var(--bdrh);padding:3px 10px;cursor:pointer;margin-bottom:10px;display:block">Show Legend</button>`:'';

  content.innerHTML=`<div class="page">
    ${legend}${legendToggle}
    <div class="flex" style="align-items:center;justify-content:space-between;margin-bottom:12px">
      <button class="btn-ghost btn-sm" onclick="calPrev()">←</button>
      <div style="font-size:12px;letter-spacing:2px">${MONTHS[mo].toUpperCase()} ${yr}</div>
      <button class="btn-ghost btn-sm" onclick="calNext()">→</button>
    </div>
    <div class="cal-grid" style="margin-bottom:4px">${['S','M','T','W','T','F','S'].map(d=>`<div style="text-align:center;font-size:8px;color:var(--mut);padding:4px 0">${d}</div>`).join('')}</div>
    <div class="cal-grid">${cells.map((day)=>{
      if(!day)return'<div></div>';
      const dayExps=expByDay[day]||[];
      const total=dayExps.reduce((s,e)=>s+e.amount,0);
      const hasImported=dayExps.some(e=>e.source==='imported');
      const isToday=isNow&&today.getDate()===day;
      const isPay=paydays.has(day);
      const isInc=incDays.has(day);
      const isDebt=debtDays.has(day);
      const isSav=savingsDays.has(day);
      const typeCount=[dayExps.length>0,isPay||isInc,isDebt,isSav].filter(Boolean).length;
      let cls='cal-cell';
      if(isToday)cls+=' today';
      else if(typeCount>1)cls+=' cal-multi';
      else if(dayExps.length)cls+=' cal-expense';
      else if(isPay||isInc)cls+=' cal-payday';
      else if(isDebt)cls+=' cal-debt';
      else if(isSav)cls+=' cal-savings';
      return`<div class="${cls}">
        <div class="cal-day-num">${day}${(isPay||isInc)?'<span style="color:var(--blu);font-size:6px"> $</span>':''}</div>
        ${dayExps.length?`<div class="cal-lbl">${dayExps[0].label.slice(0,8)}${hasImported?'*':''}</div><div class="cal-amt">-$${total.toFixed(0)}</div>`:isDebt?'<div class="cal-lbl" style="color:var(--org)">debt</div>':''}
      </div>`;
    }).join('')}</div>
    ${S.expenses.filter(e=>e.frequency!=='one-time'&&e.active!==false&&!e.archived).length?`<div class="card mt16 bdr-l">
      <div class="label2 mb8">Recurring This Month</div>
      ${S.expenses.filter(e=>e.frequency!=='one-time'&&e.active!==false&&!e.archived).map(e=>{const cat=catById[e.category]||CATS[CATS.length-1];return`<div class="row"><span class="rl"><span style="color:${cat.color}">${cat.icon} </span>${e.label}${e.dayOfMonth?` (day ${e.dayOfMonth})`:''}</span><span class="rr" style="color:var(--red)">-${fmt$(toMonthly(e))}</span></div>`;}).join('')}
    </div>`:''}
    ${S.transactions.filter(t=>{if(!t.date)return false;const d=parseLocal(t.date);return d.getFullYear()===yr&&d.getMonth()===mo&&(parseFloat(t.amount)||0)<0;}).length?`<div style="font-size:8px;color:var(--mut2);margin-top:8px">* includes imported transactions</div>`:''}
  </div>`;
}

function renderBudgetForecastForecastOnly(){
  const {wNet,mNet}=getBudgetIncome();
  const now=new Date();
  const activeExp=S.expenses.filter(e=>e.active!==false);

  // Imported + side income for current periods
  const curWkStart=getWeekStart(now,S.schedule.weekStartDay,S.schedule.weekStartTime);
  const curWkEnd=wkEnd(curWkStart);
  const curMoStart=new Date(now.getFullYear(),now.getMonth(),1);
  const curMoEnd=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59,999);
  const txIncCurWk=getTxIncome(curWkStart,curWkEnd);
  const txIncCurMo=getTxIncome(curMoStart,curMoEnd);
  const siCurWk=S.sideIncome.filter(s=>s.frequency==='one-time'&&s.date&&(()=>{const d=parseLocal(s.date);return d>=curWkStart&&d<=curWkEnd;})()).reduce((t,s)=>t+(parseFloat(s.amount)||0),0);
  const siCurMo=S.sideIncome.filter(s=>s.frequency==='one-time'&&s.date&&(()=>{const d=parseLocal(s.date);return d>=curMoStart&&d<=curMoEnd;})()).reduce((t,s)=>t+(parseFloat(s.amount)||0),0);
  const wNetEff=wNet+txIncCurWk+siCurWk;
  const mNetEff=mNet+txIncCurMo+siCurMo;

  const sunWs=getWeekStart(now,'0','00:00');
  const weeks=Array.from({length:4},(_,i)=>{
    const ws=new Date(sunWs);ws.setDate(sunWs.getDate()+i*7);
    const wExp=activeExp.reduce((s,e)=>s+(inWeek(e,ws)&&!e.paid?expWeekAmt(e,ws):0),0);
    const effInc=i===0?wNetEff:wNet;
    const bal=effInc-wExp;
    const otAmt=activeExp.filter(e=>e.frequency==='one-time'&&!e.paid&&inWeek(e,ws)).reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
    const d=new Date(ws);
    return{label:i===0?'THIS WEEK':`WK OF ${MONTHS[d.getMonth()].toUpperCase()} ${d.getDate()}`,income:effInc,expenses:wExp,balance:bal,hasOT:otAmt>0,otAmt,isCurrent:i===0};
  });
  const months=Array.from({length:6},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);

function calcFreedomFundTarget(){
  // Use average monthly spend from budget expenses if available
  const activeExp=S.expenses.filter(e=>e.active!==false&&e.frequency!=='one-time');
  const recM=activeExp.reduce((s,e)=>s+toMonthly(e),0);
  if(recM>0)return Math.round(recM*6);
  // Fall back: use actual spending from log (last 3 months of earnings as proxy)
  const now=new Date(),rate=parseFloat(S.schedule.hourlyRate)||0;
  if(!rate)return 0;
  let monthlyTotals=[];
  for(let i=1;i<=3;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const yr=d.getFullYear(),mo=d.getMonth();
    let secs=0;
    for(const[,dm]of Object.entries(S.log)){
      for(const[dk,sec]of Object.entries(dm)){const dd=parseLocal(dk);if(dd.getFullYear()===yr&&dd.getMonth()===mo)secs+=sec;}
    }
    if(secs>0)monthlyTotals.push(calcEarnings(secs,rate,S.schedule.overtimeAfter,S.schedule.overtimeMultiplier));
  }
  if(monthlyTotals.length){const avg=monthlyTotals.reduce((a,b)=>a+b,0)/monthlyTotals.length;return Math.round(avg*6*0.7);} // 70% of avg income as expense estimate
  return 0;
}
function openGoalFF(){
  const target=calcFreedomFundTarget();
  const activeExp=S.expenses.filter(e=>e.active!==false&&e.frequency!=='one-time');
  const recM=activeExp.reduce((s,e)=>s+toMonthly(e),0);
  const basis=recM>0?'based on your current monthly expenses':'estimated from past earnings';
  _goalForm={label:'Freedom Fund — Business Launch',target:String(target),saved:'',ffBasis:basis};
  _showGoalForm=true;render();
}

// ─── BUDGET DEBT ─────────────────────────────────────────────────────────────
let _showDebtForm=false,_debtForm={label:'',balance:'',rate:'',minimum:'',dayOfMonth:''},_debtMethod='snowball',_debtExtra='';
function runDebtPlan(debts,extra,method){
  if(!debts.length)return{months:0,totalInterest:0,events:[]};
  let ds=debts.map(d=>({...d,bal:parseFloat(d.balance)||0,r:parseFloat(d.rate)||0,min:parseFloat(d.minimum)||0,done:false})).filter(d=>d.bal>0);
  if(method==='snowball')ds.sort((a,b)=>a.bal-b.bal);else ds.sort((a,b)=>b.r-a.r);
  let months=0,interest=0,xtra=parseFloat(extra)||0,events=[];
  while(ds.some(d=>d.bal>0.01)&&months<600){
    months++;
    const ti=ds.findIndex(d=>d.bal>0.01);
    for(let i=0;i<ds.length;i++){
      if(ds[i].bal<=0.01)continue;
      const int=ds[i].bal*(ds[i].r/100/12);interest+=int;ds[i].bal+=int;
      let pay=ds[i].min+(i===ti?xtra:0);pay=Math.min(ds[i].bal,Math.max(pay,ds[i].min));
      ds[i].bal=Math.max(0,ds[i].bal-pay);
      if(ds[i].bal<0.01&&!ds[i].done){ds[i].done=true;events.push({id:ds[i].id,label:ds[i].label,month:months});xtra+=ds[i].min;}
    }
  }
  return{months,totalInterest:interest,events};
}

      </div>

function saveDebt(){
  const l=document.getElementById('df-label')?.value,b=document.getElementById('df-bal')?.value;
  if(!l||!b)return;
  const r=document.getElementById('df-rate')?.value||'0',m=document.getElementById('df-min')?.value||'0',dom=document.getElementById('df-dom')?.value||'';
  const debtId=Date.now().toString();
  S.debts=[...S.debts,{id:debtId,label:l,balance:b,rate:r,minimum:m,dayOfMonth:dom}];
  // Auto-create recurring expense for minimum payment
  if(parseFloat(m)>0){

      amount:m,frequency:'monthly',oneTimeDate:'',dayOfMonth:dom,active:true,_debtId:debtId};
    S.expenses=[...S.expenses,autoExp];
    save('expenses');
  }
  save('debts');_showDebtForm=false;renderBudgetDebt();
}

  // Remove associated auto-expense

function saveAccount(){
  const l=document.getElementById('ac-label')?.value;
  const v=document.getElementById('ac-value')?.value;
  if(!l||!v)return;
  const t=document.getElementById('ac-type')?.value||'checking';
  const note=document.getElementById('ac-note')?.value||'';
  S.assets=[...S.assets,{id:Date.now().toString(),label:l,value:v,type:t,note,updatedDate:todayStr()}];
  save('assets');_showAcctForm=false;renderAccounts();
}

function updateAccountValue(id,val){
  const v=parseFloat(val);if(!v)return;
  S.assets=S.assets.map(a=>{
    if(a.id!==id)return a;
    return{...a,prevValue:a.value,value:String(v),updatedDate:todayStr()};
  });
  save('assets');checkMilestones();
}

const DEFAULT_MILESTONES=[
  {label:'First $1,000 saved',target:1000},{label:'Emergency fund ($5k)',target:5000},

function checkMilestones(){
  const totalAssets=S.assets.reduce((s,a)=>s+(parseFloat(a.value)||0),0);
  const totalDebts=S.debts.reduce((s,d)=>s+(parseFloat(d.balance)||0),0);
  const nw=totalAssets-totalDebts;
  let changed=false;
  for(const m of S.milestones){
    if(m.achieved)continue;
    const hit=m.debtFree?(totalDebts<=0&&totalAssets>0):nw>=m.target;
    if(hit){m.achieved=true;m.achievedDate=todayStr();changed=true;}
  }
  if(changed)save('milestones');
}
function renderMilestones(){
  // Init default milestones if empty
  if(!S.milestones.length){
    S.milestones=DEFAULT_MILESTONES.map((m,i)=>({...m,id:String(i),achieved:false,achievedDate:null,custom:false}));
    save('milestones');
  }
  const totalAssets=S.assets.reduce((s,a)=>s+(parseFloat(a.value)||0),0);
  const totalDebts=S.debts.reduce((s,d)=>s+(parseFloat(d.balance)||0),0);
  const nw=totalAssets-totalDebts;
  checkMilestones();
  const achieved=S.milestones.filter(m=>m.achieved);
  const upcoming=S.milestones.filter(m=>!m.achieved);

  content.innerHTML=`<div class="page">
    <div class="label">Milestones</div>
    ${achieved.length?`<div style="font-size:9px;color:var(--grn);letter-spacing:2px;margin-bottom:12px">● ${achieved.length} ACHIEVED</div>`:''}
    ${achieved.map(m=>`<div class="card mb8" style="border-left:2px solid var(--grn);opacity:.8">
      <div class="flex" style="justify-content:space-between;align-items:center">

          <div style="font-size:13px;color:var(--grn)">✓ ${m.label}</div>
          ${m.achievedDate?`<div style="font-size:9px;color:var(--mut);margin-top:2px">Achieved ${m.achievedDate}</div>`:''}
        </div>
        <div style="font-size:12px;color:var(--grn);font-weight:bold">${m.debtFree?'DEBT FREE':fmt$(m.target)}</div>
      </div>
    </div>`).join('')}
    ${upcoming.length?`<div style="font-size:9px;color:var(--mut);letter-spacing:2px;margin:14px 0 10px">UPCOMING</div>`:''}
    ${upcoming.map(m=>{
      const pct=m.debtFree?(totalDebts<=0?100:Math.max(0,100-Math.round((totalDebts/Math.max(totalAssets,1))*100))):nw>0?Math.min(100,Math.round((nw/m.target)*100)):0;
      const remaining=m.debtFree?totalDebts:Math.max(0,m.target-nw);
      return`<div class="card bdr-l mb8">

          <div style="font-size:11px;font-weight:bold;color:var(--acc)">${m.debtFree?'DEBT FREE':fmt$(m.target)}</div>

        <div class="flex" style="justify-content:space-between;font-size:9px;color:var(--mut)">
          <span>${pct}% there</span>
          <span>${m.debtFree?`${fmt$(remaining)} to pay off`:`${fmt$(remaining)} to go`}</span>

    }).join('')}

let _retForm={target:'1000000',returnRate:'7',years:'30',monthly:'0'};
function renderRetirement(){
  const {mNet}=getBudgetIncome();
  const activeExp=S.expenses.filter(e=>e.active!==false&&e.frequency!=='one-time');
  const mBal=mNet-activeExp.reduce((s,e)=>s+toMonthly(e),0);
  const totalAssets=S.assets.reduce((s,a)=>s+(parseFloat(a.value)||0),0);
  const totalDebts=S.debts.reduce((s,d)=>s+(parseFloat(d.balance)||0),0);
  const curNW=totalAssets-totalDebts;
  const f=_retForm;

  // Calculate: FV = P*(1+r)^n + PMT*(((1+r)^n - 1)/r)
  const target=parseFloat(f.target)||1000000;
  const r=(parseFloat(f.returnRate)||7)/100/12; // monthly rate
  const n=(parseFloat(f.years)||30)*12;          // months
  const monthly=parseFloat(f.monthly)||0;
  const P=Math.max(0,curNW);
  const fv=P*Math.pow(1+r,n)+monthly*(Math.pow(1+r,n)-1)/r;
  const pct=Math.min(100,Math.round((fv/target)*100));

  // How many months to reach target
  let monthsToTarget=null;
  if(monthly>0||P>0){
    let bal=P,mo=0;
    while(bal<target&&mo<600){bal=bal*(1+r)+monthly;mo++;}
    if(bal>=target)monthsToTarget=mo;
  }

  // Required monthly to hit target in n months
  const reqMonthly=P>0?(target-P*Math.pow(1+r,n))/(((Math.pow(1+r,n)-1)/r)):target/((Math.pow(1+r,n)-1)/r);

  content.innerHTML=`<div class="page">
    <div class="label">Retirement Projection</div>
    <div class="card accent-l mb20">
      <div class="label2">Projected Value in ${f.years||30} Years</div>
      <div style="font-size:32px;font-weight:bold;color:var(--acc);line-height:1;margin-bottom:8px">${fmt$(fv)}</div>
      <div class="prog mb8"><div class="prog-fill" style="width:${pct}%;background:${pct>=100?'var(--grn)':'var(--acc)'}"></div></div>
      <div style="font-size:10px;color:var(--mut)">${pct}% of ${fmt$(target)} target</div>
      ${monthsToTarget?`<div style="font-size:10px;color:var(--grn);margin-top:6px">● Reach target in ~${Math.floor(monthsToTarget/12)}y ${monthsToTarget%12}mo at current pace</div>`:''}
    </div>

    <div class="card mb20">
      <div class="label">Inputs</div>
      <div class="flex gap8 mb10">
        <div class="f1"><div class="label2">Target ($)</div><div class="inp-row"><span class="pre">$</span><input id="ret-target" type="number" min="0" step="10000" value="${f.target}" onblur="_retForm.target=this.value;renderRetirement()" style="border:none;background:transparent;font-size:15px;padding:7px 4px"></div></div>
        <div class="f1"><div class="label2">Return Rate</div><div class="inp-row"><input id="ret-rate" type="number" min="0" max="30" step="0.5" value="${f.returnRate}" onblur="_retForm.returnRate=this.value;renderRetirement()" style="border:none;background:transparent;font-size:15px;padding:7px 4px"><span style="padding:0 8px;color:var(--mut)">%</span></div></div>
      </div>
      <div class="flex gap8 mb10">
        <div class="f1"><div class="label2">Time Horizon (yrs)</div><input id="ret-years" type="number" min="1" max="60" value="${f.years}" onblur="_retForm.years=this.value;renderRetirement()"></div>
        <div class="f1"><div class="label2">Monthly Contribution</div><div class="inp-row"><span class="pre">$</span><input id="ret-monthly" type="number" min="0" step="50" placeholder="0" value="${f.monthly}" onblur="_retForm.monthly=this.value;renderRetirement()" style="border:none;background:transparent;font-size:15px;padding:7px 4px"></div></div>
      </div>
      <div style="font-size:9px;color:var(--mut);line-height:1.6">Starting from current net worth ${fmt$(curNW)}. Return rate uses compound monthly growth.</div>
    </div>

    <div class="card bdr-l">
      <div class="label2 mb10">Breakdown</div>
      <div class="row"><span class="rl">Starting Net Worth</span><span class="rr">${fmt$(P)}</span></div>
      <div class="row"><span class="rl">Monthly Contribution</span><span class="rr">${fmt$(monthly)}</span></div>
      <div class="row"><span class="rl">Annual Return Rate</span><span class="rr">${f.returnRate||7}%</span></div>
      <div class="row"><span class="rl">Growth from Returns</span><span class="rr" style="color:var(--grn)">${fmt$(fv-P-monthly*n)}</span></div>
      <div class="row"><span class="rl">Total Contributions</span><span class="rr">${fmt$(monthly*n)}</span></div>
      <div class="row bold"><span class="rl">Projected Total</span><span class="rr" style="color:var(--acc)">${fmt$(fv)}</span></div>
      ${reqMonthly>0&&reqMonthly>monthly?`<div style="font-size:9px;color:var(--org);margin-top:10px">To hit ${fmt$(target)} in ${f.years}y you need ${fmt$(reqMonthly)}/mo (${fmt$(reqMonthly-monthly)}/mo more)</div>`:''}
    </div>

    <div class="card mt16 bdr-l">
      <div class="label2 mb10">Growth Scenarios (${f.years||30} Years)</div>
      ${[3,5,7,9].map(rate2=>{
        const r2=rate2/100/12,n2=(parseFloat(f.years)||30)*12;
        const fv2=P*Math.pow(1+r2,n2)+monthly*(Math.pow(1+r2,n2)-1)/r2;
        const active=parseFloat(f.returnRate)===rate2;
        return'<div class="flex" style="justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bdr);opacity:'+(active?'1':'.7')+'">'
          +'<span style="font-size:11px;color:'+(active?'var(--acc)':'var(--mut)')+';font-weight:'+(active?'bold':'normal')+'">'+rate2+'% annual</span>'
          +'<span style="font-size:12px;color:'+(fv2>=target?'var(--grn)':'var(--txt)')+'">'+fmt$(fv2)+(fv2>=target?' ✓':'')+'</span>'
          +'</div>';

    </div>
  </div>`;
}

function calc401k(){
  const r=S.retirement401k;
  const{mGross}=getBudgetIncome();
  const annualGross=mGross*12;
  const grossPerCheck=annualGross/26;
  let empPerCheck=0;
  if(r.employeeType==='percent'){empPerCheck=grossPerCheck*(parseFloat(r.employeeAmount)||0)/100;}
  else{empPerCheck=parseFloat(r.employeeAmount)||0;}
  const empAnnual=empPerCheck*26;
  const matchPct=(parseFloat(r.matchFormula)||0)/100;
  const matchCap=(parseFloat(r.matchUpTo)||0)/100;
  const empFrac=grossPerCheck>0?empPerCheck/grossPerCheck:0;
  const actualMatchFrac=Math.min(empFrac,matchCap)*matchPct;
  const matchPerCheck=grossPerCheck*actualMatchFrac;
  const matchAnnual=matchPerCheck*26;
  const totalAnnual=empAnnual+matchAnnual;
  const balance=parseFloat(r.accountBalance)||0;
  const taxRate=parseFloat(S.taxRate)||0;
  const preTaxSaving=r.rothOrPretax==='pretax'?empAnnual*(taxRate/100):0;
  const empPct=empFrac*100;
  return{empPerCheck,empAnnual,matchPerCheck,matchAnnual,totalAnnual,balance,preTaxSaving,empPct,annualGross,grossPerCheck};
}
function estimate401kBalance(){
  // Estimate 401k balance from contribution history in the log.
  // If a balanceAnchor exists, use it as the starting point and
  // only sum contributions from shifts AFTER the anchor date.
  const r=S.retirement401k;
  const empType=r.employeeType||'percent';
  const empAmt=parseFloat(r.employeeAmount)||0;
  const matchPct=(parseFloat(r.matchFormula)||0)/100;
  const matchCap=(parseFloat(r.matchUpTo)||0)/100;
  const rate=parseFloat(S.schedule.hourlyRate)||0;
  const oa=S.schedule.overtimeAfter,om=S.schedule.overtimeMultiplier;

  if(!rate||!empAmt)return{estimated:0,fromAnchor:false,anchor:r.balanceAnchor,contributions:0};

  const anchor=r.balanceAnchor;
  const anchorDate=anchor?.date||null;
  const anchorAmount=parseFloat(anchor?.amount)||0;

  // Sum contributions from all logged shifts (or only after anchor date)
  let totalContrib=0;
  for(const[wkStr,dayMap]of Object.entries(S.log)){
    for(const[dk,sec]of Object.entries(dayMap)){
      if(anchorDate&&dk<=anchorDate)continue; // only count shifts after anchor
      const gross=calcEarnings(sec,rate,oa,om);
      // Per-paycheck gross approximation: treat each shift as a fraction of a paycheck
      // Use gross directly with contribution rate
      let empContrib=0;
      if(empType==='percent'){empContrib=gross*(empAmt/100);}
      else{
        // Flat per paycheck: prorate by shift gross vs expected per-paycheck gross
        const {grossPerCheck}=calc401k();
        empContrib=grossPerCheck>0?(sec/3600/8)*empAmt:0; // rough: per 8h worked
      }
      const empFrac=gross>0?empContrib/gross:0;
      const actualMatchFrac=Math.min(empFrac,matchCap)*matchPct;
      const matchContrib=gross*actualMatchFrac;
      totalContrib+=empContrib+matchContrib;
    }
  }

  // Also add custom shifts after anchor
  for(const cs of S.customShifts){
    if(anchorDate&&cs.date<=anchorDate)continue;
    const csGrossAmt=csGross(cs);
    let empContrib=0;
    if(empType==='percent'){empContrib=csGrossAmt*(empAmt/100);}
    else{const{grossPerCheck}=calc401k();empContrib=grossPerCheck>0?(parseFloat(cs.hours||0)/8)*empAmt:0;}
    const empFrac=csGrossAmt>0?empContrib/csGrossAmt:0;
    const actualMatchFrac=Math.min(empFrac,matchCap)*matchPct;
    totalContrib+=empContrib+csGrossAmt*actualMatchFrac;
  }

  const estimated=anchorAmount+totalContrib;
  return{estimated,fromAnchor:!!anchor,anchor,contributions:totalContrib};
}

function set401kAnchor(amount){
  const v=parseFloat(amount);
  if(isNaN(v)||v<0)return;
  S.retirement401k.balanceAnchor={amount:String(v),date:todayStr()};
  S.retirement401k.accountBalance=String(v); // keep legacy field in sync
  save('retirement401k');
  // Sync to assets
  sync401kAsset(v);

// Parse pasted text or CSV into raw row objects
function parseImportText(raw){
  const lines=raw.trim().split('\n').filter(l=>l.trim());
  const rows=[];

  // Detect CSV (has commas AND consistent column count) vs free-text
  const firstLine=lines[0]||'';
  const isCSV=firstLine.split(',').length>=3&&!firstLine.match(/^\d{1,2}\/\d{1,2}\/\d{4}/);

  if(isCSV){
    // CSV path — find date/amount/desc columns from header or first data row
    for(const line of lines){
      const parts=parseCSVLine(line);
      // Find date
      let date='',amount=0,type='',desc='';
      for(const p of parts){
        const t=p.trim().replace(/"/g,'');
        if(!date&&/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(t)){
          const[mo,da,yr]=t.split('/');
          date=`${yr}-${mo.padStart(2,'0')}-${da.padStart(2,'0')}`;
        } else if(!date&&/^\d{4}-\d{2}-\d{2}$/.test(t)){
          date=t;
        } else if(!amount&&/^-?\$?[\d,]+\.\d{2}$/.test(t)){
          amount=parseFloat(t.replace(/[$,]/g,''));
        } else if(['purchase','deposit','transfer','direct debit','adjustment','cash bonus'].includes(t.toLowerCase())){
          type=t.toLowerCase();
        } else if(t.length>2&&!desc){
          desc=t;
        }
      }
      if(date&&(amount||desc))rows.push({date,description:desc,amount,type,raw:line});
    }
    return rows;
  }

  // Free-text path (PDF paste, Chime-style, etc.)
  // Each line: DATE  DESCRIPTION  [MERCHANT_CODE]  TYPE  AMOUNT  AMOUNT  DATE

  for(const line of lines){
    const dateRe=/^(\d{1,2}\/\d{1,2}\/\d{4})\s+/;
    const dm=line.match(dateRe);
    if(!dm)continue;

    const[mo,da,yr]=dm[1].split('/');
    const date=`${yr}-${mo.padStart(2,'0')}-${da.padStart(2,'0')}`;

    // Find type keyword — check longer/more specific keywords first to avoid
    // "Deposit" matching inside "Secured Deposit Account" (Chime internal transfers)
    const TYPE_KWS_ORDERED=['Direct Debit','Cash Bonus','Adjustment','Purchase','Transfer','Deposit'];
    let type='';
    for(const kw of TYPE_KWS_ORDERED){
      // Only match if the keyword appears as a standalone column value,
      // i.e. surrounded by spaces or at end of meaningful content — not inside "Secured Deposit Account"
      const re=new RegExp('(?<![A-Za-z])'+kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'(?![A-Za-z])');
      if(re.test(line)&&!(kw==='Deposit'&&line.includes('Secured Deposit Account'))){
        type=kw.toLowerCase();break;
      }
    }

    // Extract dollar amounts
    const amts=[...line.matchAll(/-?\$[\d,]+\.\d{2}/g)].map(m=>parseFloat(m[0].replace(/[$,]/g,'')));
    const amount=amts.find(a=>a<0)??amts[0]??0;

    // Build description: start after date, strip type keyword, amounts, trailing date, ALL-CAPS codes
    let desc=line.slice(dm[0].length);
    if(type)desc=desc.replace(new RegExp('\\b'+type.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i'),'');
    desc=desc.replace(/-?\$[\d,]+\.\d{2}/g,'');
    desc=desc.replace(/\s+\d{1,2}\/\d{1,2}\/\d{4}\s*$/,'');
    // Strip ALL-CAPS merchant code blocks (Chime's raw merchant identifiers)
    desc=desc.replace(/\b[A-Z][A-Z\s\d#.*&,@!\/\\-]{4,}\b/g,' ');
    desc=desc.replace(/^[\s:,]+|[\s:,]+$/g,'').replace(/\s+/g,' ').trim();

    if(date&&(amount!==0||desc))rows.push({date,description:desc,amount,type,raw:line});
  }
  return rows;
}

function parseCSVLine(line){
  const result=[];let cur='',inQ=false;
  for(const ch of line){
    if(ch==='"'){inQ=!inQ;}
    else if(ch===','&&!inQ){result.push(cur);cur='';}
    else cur+=ch;
  }
  result.push(cur);
  return result;
}

function handleTxFile(e){
  const file=e.target.files[0];if(!file)return;
  _txWizard.fileName=file.name;
  const reader=new FileReader();
  reader.onload=ev=>{
    _txWizard.rawText=ev.target.result;
    processTxRaw();
  };
  reader.readAsText(file);
}

function handleTxPaste(){
  const ta=document.getElementById('tx-paste');
  if(!ta||!ta.value.trim())return;
  _txWizard.rawText=ta.value;
  processTxRaw();
}

function processTxRaw(){
  const rows=parseImportText(_txWizard.rawText);
  if(!rows.length){
    alert('Could not parse any transactions. Make sure each line has a date (MM/DD/YYYY) and a dollar amount (e.g. -$30.77).');
    return;
  }
  _txWizard.parsedRows=rows;
  // Default: include purchases, direct debits, AND deposits/income — exclude only transfers/adjustments
  const types=[...new Set(rows.map(r=>r.type))];
  const expenseTypes=['purchase','direct debit','cash bonus','deposit','direct deposit'];
  _txWizard.filterTypes=types.filter(t=>expenseTypes.includes(t.toLowerCase()));
  if(!_txWizard.filterTypes.length)_txWizard.filterTypes=[...types]; // if nothing matches, show all
  _txWizard.step='filter';
  renderTransactions();
}

function toggleTxType(t){
  const idx=_txWizard.filterTypes.indexOf(t);
  if(idx>=0)_txWizard.filterTypes.splice(idx,1);
  else _txWizard.filterTypes.push(t);
  renderTransactions();
}

function startTxReview(){
  const filtered=_txWizard.parsedRows.filter(r=>(_txWizard.filterTypes.length===0||_txWizard.filterTypes.includes(r.type))&&r.amount!==0);
  _txWizard.pendingTxns=filtered.map(r=>({
    ...r,
    id:Date.now().toString()+Math.random().toString(36).slice(2),
    category:autoCategorizeTx(r.description),
    _confirmed:false,
    imported:true,
    source:_txWizard.fileName||'paste',
  }));
  _txWizard.reviewIdx=0;
  _txWizard.step='review';
  renderTransactions();
}

function setTxCat(catId){
  _txWizard.pendingTxns[_txWizard.reviewIdx].category=catId;
  renderTransactions();
}

function confirmTx(){
  _txWizard.pendingTxns[_txWizard.reviewIdx]._confirmed=true;
  _txWizard.reviewIdx++;
  renderTransactions();
}

function skipTx(){
  _txWizard.reviewIdx++;
  renderTransactions();
}

function confirmAllRemaining(){
  for(let i=_txWizard.reviewIdx;i<_txWizard.pendingTxns.length;i++){
    _txWizard.pendingTxns[i]._confirmed=true;
  }
  _txWizard.step='confirm';
  renderTransactions();
}

function importTxns(){
  const approved=_txWizard.pendingTxns.filter(t=>t._confirmed).map(t=>{
    const{_confirmed,...rest}=t;return rest;
  });
  // Avoid duplicates by checking date+amount+description
  const existing=new Set(S.transactions.map(t=>t.date+'|'+t.amount+'|'+t.description));
  const newOnes=approved.filter(t=>!existing.has(t.date+'|'+t.amount+'|'+t.description));
  S.transactions=[...S.transactions,...newOnes];
  save('transactions');
  _txWizard={step:'import',rawText:'',parsedRows:[],colMap:{date:0,desc:1,amount:3,type:2},filterTypes:['purchase','direct debit'],reviewIdx:0,pendingTxns:[],fileName:''};
  renderTransactions();
}

function delTx(id){S.transactions=S.transactions.filter(t=>t.id!==id);save('transactions');renderTransactions();}

function addAutoCatRule(){
  const keyword=prompt('Keyword to match in description (e.g. "Starbucks"):');
  if(!keyword)return;
  const catLabels=CATS.map((c,i)=>i+': '+c.label).join(', ');
  const catIdx=parseInt(prompt('Category number:\n'+catLabels));
  if(isNaN(catIdx)||catIdx<0||catIdx>=CATS.length)return;
  S.autoCatRules=[...S.autoCatRules,{id:Date.now().toString(),keyword,category:CATS[catIdx].id}];
  save('autoCatRules');renderTransactions();
}

function exportCSV(){
  const rate=parseFloat(S.schedule.hourlyRate)||0,oa=S.schedule.overtimeAfter,om=S.schedule.overtimeMultiplier,otMode=S.schedule.overtimeMode;
  const rows=[['Week Start','Hours','Gross','Deductions','Est Net','Actual','Date Received','Variance']];
  const seenWks=new Set();
  Object.entries(S.log).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([wk,dm])=>{
    seenWks.add(wk);
    const sec=Object.values(dm).reduce((a,b)=>a+b,0);
    const cg=csInWeek(wk).reduce((s,c)=>s+csGross(c),0);
    const g=weekGross(dm,'__x__',0,rate,oa,om,otMode,cg,csCoveredDays(wk));
    const ded=g-applyDed(g,S.deductions),net=g-ded;
    const pc=S.paychecks[wk];
    rows.push([wk,(sec/3600).toFixed(2),g.toFixed(2),ded.toFixed(2),net.toFixed(2),pc?.amount||'',pc?.date||'',pc?.amount?(pc.amount-net).toFixed(2):'']);
  });
  // Include weeks that only have custom shifts (no log entries)
  for(const cs of S.customShifts){
    const wk=localStr(getWeekStart(parseLocal(cs.date),S.schedule.weekStartDay,S.schedule.weekStartTime));
    if(seenWks.has(wk))continue;
    seenWks.add(wk);
    const cg=csInWeek(wk).reduce((s,c)=>s+csGross(c),0);
    const ded=cg-applyDed(cg,S.deductions),net=cg-ded;
    const pc=S.paychecks[wk];
    rows.push([wk,'0.00',cg.toFixed(2),ded.toFixed(2),net.toFixed(2),pc?.amount||'',pc?.date||'',pc?.amount?(pc.amount-net).toFixed(2):'']);
  }
  rows.sort((a,b)=>a===rows[0]?-1:b===rows[0]?1:a[0].localeCompare(b[0]));
  const csv=rows.map(r=>r.join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='pay-ledger.csv';a.click();URL.revokeObjectURL(url);
}

    if(bundle.milestones){S.milestones=bundle.milestones;lsSet('milestones_v1',S.milestones);}
    if(bundle.retirement401k){S.retirement401k={...S.retirement401k,...bundle.retirement401k};lsSet('ret401k_v1',S.retirement401k);}
    if(bundle.sideIncome){S.sideIncome=bundle.sideIncome;lsSet('side_income_v1',S.sideIncome);}
    if(bundle.savingsChallenge){S.savingsChallenge=bundle.savingsChallenge;lsSet('savings_challenge_v1',S.savingsChallenge);}
    if(bundle.transactions){S.transactions=bundle.transactions;lsSet('transactions_v1',S.transactions);}
    if(bundle.taxRate!=null){S.taxRate=bundle.taxRate;lsSet('tax_rate_v1',S.taxRate);}
    if(bundle.earlyDepositDays!=null){S.earlyDepositDays=bundle.earlyDepositDays;lsSet('early_deposit_v1',S.earlyDepositDays);}
    if(bundle.incomeSafetyThresholds){S.incomeSafetyThresholds=bundle.incomeSafetyThresholds;lsSet('income_thresholds_v1',S.incomeSafetyThresholds);}
    if(bundle.autoCatRules){S.autoCatRules=bundle.autoCatRules;lsSet('auto_cat_rules_v1',S.autoCatRules);}
    showToast(true);closeDataPanel();render();
  }catch(e){alert('Import failed — make sure you pasted valid JSON.');}
}

// ─── Init ─────────────────────────────────────────────────────────────────────
// Register service worker for PWA install support (required by Android Chrome)
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(function(){});
}

// Add iOS class for CSS targeting
(function(){
  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||
    (navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
  if(isIOS)document.documentElement.classList.add('ios');
})();

// Show splash, load, then fade out
document.getElementById('splash-msg').textContent='Loading…';
setTimeout(()=>{
  loadState();
  // Sync switcher immediately after load so classes match restored app state
  ['tracker','budget','worth','cal'].forEach(a=>{
    const btn=document.getElementById('sw-'+a);
    if(btn)btn.classList.toggle('active',S.app===a);
  });
  initPin();
  archiveOldOneTime();
  render();
  // Fade splash out
  const splash=document.getElementById('splash');
  splash.classList.add('fade');
  setTimeout(()=>splash.classList.add('gone'),550);
},300);
</script>
