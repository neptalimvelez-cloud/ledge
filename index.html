function renderTaxBrackets(hourlyRate){
  const rate=hourlyRate||parseFloat(S.schedule.hourlyRate)||0;
  if(!rate)return'';
  let wkHrs=0;
  for(let d=0;d<7;d++){const sh=S.schedule.shifts[d];if(!sh.active)continue;const sm=toMin(sh.start),em=toMin(sh.end);const dur=em<sm?em+1440-sm:em-sm;wkHrs+=dur/60;}
  const siWeekly=S.sideIncome.filter(s=>s.frequency!=='one-time').reduce((t,s)=>t+toWeekly({amount:s.amount,frequency:s.frequency}),0);
  const annGross=(wkHrs*rate+siWeekly)*52;
  if(annGross<=0)return'';
  const stdDed=15700;
  const taxableIncome=Math.max(0,annGross-stdDed);
  const totalDedAnn=S.deductions.filter(d=>d.type==='flat').reduce((s,d)=>s+(parseFloat(d.value)||0),0)*52
    +S.deductions.filter(d=>d.type==='percent').reduce((s,d)=>s+(annGross*(parseFloat(d.value)||0)/100),0);
  const brackets=[{min:0,max:11925,rate:10},{min:11925,max:48475,rate:12},{min:48475,max:103350,rate:22},{min:103350,max:197300,rate:24},{min:197300,max:250525,rate:32},{min:250525,max:626350,rate:35},{min:626350,max:Infinity,rate:37}];
  let totalTax=0;const bracketRows=[];
  for(const b of brackets){if(taxableIncome<=b.min)break;const taxable=Math.min(taxableIncome,b.max)-b.min;const tax=taxable*b.rate/100;totalTax+=tax;bracketRows.push({rate:b.rate,taxable,tax});}
  const effectiveRate=annGross>0?(totalTax/annGross*100):0;
  const marginalBracket=brackets.find(b=>taxableIncome<=b.max)||brackets[brackets.length-1];
  const afterTax=annGross-totalTax-totalDedAnn;
  let h='<div class="card mt20" style="border-left:2px solid var(--org)">';
  h+='<div class="label">Federal Tax Estimate</div>';
  h+='<div style="font-size:10px;color:var(--mut);margin-bottom:12px;line-height:1.6">Based on your schedule ('+wkHrs.toFixed(0)+'h/wk \u00d7 $'+rate.toFixed(2)+'), single filer, standard deduction.</div>';
  h+='<div class="stat-row" style="margin-bottom:14px">';
  h+='<div class="stat-box" style="border-top:2px solid var(--org)"><div class="sl">Effective Rate</div><div class="sv" style="color:var(--org)">'+effectiveRate.toFixed(1)+'%</div></div>';
  h+='<div class="stat-box" style="border-top:2px solid var(--red)"><div class="sl">Marginal</div><div class="sv" style="color:var(--red)">'+marginalBracket.rate+'%</div></div>';
  h+='<div class="stat-box" style="border-top:2px solid var(--grn)"><div class="sl">After Tax</div><div class="sv" style="color:var(--grn)">'+fmt$(afterTax/12)+'/mo</div></div>';
  h+='</div>';
  h+='<div style="font-size:8px;letter-spacing:2px;color:var(--mut);margin-bottom:6px">BRACKET BREAKDOWN</div>';
  for(const br of bracketRows){const pct=(br.tax/totalTax*100)||0;h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="width:28px;font-size:10px;color:var(--org);text-align:right;font-weight:bold">'+br.rate+'%</span><div style="flex:1;height:4px;background:var(--surf3);border-radius:2px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:var(--org);border-radius:2px"></div></div><span style="font-size:9px;color:var(--mut);width:55px;text-align:right">'+fmt$(br.tax)+'</span></div>';}
  h+='<div class="row bold" style="margin-top:8px"><span class="rl">Est. Federal Tax</span><span class="rr" style="color:var(--red)">'+fmt$(totalTax)+'/yr</span></div>';
  h+='<div class="row"><span class="rl">Gross Income</span><span class="rr">'+fmt$(annGross)+'/yr</span></div>';
  h+='<div class="row"><span class="rl">Standard Deduction</span><span class="rr" style="color:var(--grn)">-'+fmt$(stdDed)+'</span></div>';
  h+='<div class="row"><span class="rl">Taxable Income</span><span class="rr">'+fmt$(taxableIncome)+'</span></div>';
  if(parseFloat(S.taxRate)>0){const userEst=annGross*(parseFloat(S.taxRate)/100);const diff=userEst-totalTax;h+='<div style="margin-top:10px;padding:8px 10px;background:var(--accd);border-radius:var(--radius-xs);font-size:10px;color:var(--txt2);line-height:1.6">Your Setup tax rate ('+S.taxRate+'%) estimates '+fmt$(userEst)+'/yr. '+(Math.abs(diff)>500?'That\u2019s <span style="color:'+(diff>0?'var(--org)':'var(--grn)')+'">'+fmt$(Math.abs(diff))+(diff>0?' higher':' lower')+'</span> than this federal-only estimate. State/local taxes, FICA, etc. may account for the difference.':'That\u2019s close to this federal-only estimate.')+'</div>';}
  h+='<div style="font-size:8px;color:var(--mut2);margin-top:8px">Estimate only. Does not include FICA (7.65%), state, or local taxes.</div>';
  h+='</div>';
  return h;
}

function setSchOtMode(v){

  const wsd=document.getElementById('s-wsd')?.value;

  if(rate!==undefined)_editSch.hourlyRate=rate;

  if(otm!==undefined)_editSch.overtimeMultiplier=otm;
  _editSch.overtimeMode=v;

// Income Calculator
function calcIncome(src){
  const annualEl=document.getElementById('ic-annual'),hrsEl=document.getElementById('ic-hrs'),resEl=document.getElementById('ic-result');
  if(!resEl)return;
  const annual=parseFloat(annualEl?.value)||0;
  const hrs=parseFloat(hrsEl?.value)||40;
  const taxPct=parseFloat(S.taxRate)||0;
  const rate=parseFloat(S.schedule.hourlyRate)||0;
  let lines=[];
  if(annual>0){
    const implied=annual/(hrs*52);
    const afterTax=annual*(1-taxPct/100);
    lines.push('At '+fmt$(annual)+'/yr with '+hrs+'h/wk → '+fmt$(implied)+'/hr');
    if(taxPct>0)lines.push('After '+taxPct+'% tax: '+fmt$(afterTax)+'/yr · '+fmt$(afterTax/12)+'/mo');
  }
  if(rate>0){
    const annFromRate=rate*hrs*52;
    const afterTax2=annFromRate*(1-taxPct/100);
    lines.push('At current $'+rate.toFixed(2)+'/hr × '+hrs+'h/wk = '+fmt$(annFromRate)+'/yr');
    if(taxPct>0)lines.push('Take-home: '+fmt$(afterTax2)+'/yr · '+fmt$(afterTax2/12)+'/mo · '+fmt$(afterTax2/52)+'/wk');
  }
  resEl.innerHTML=lines.length?lines.join('<br>'):'Enter an annual target or set your hourly rate above';
}

function getBudgetIncome(){
  const rate=parseFloat(S.schedule.hourlyRate)||0;
  const sch=S.schedule;
  let hrs=0;for(const sh of Object.values(sch.shifts)){if(!sh.active)continue;const sm=toMin(sh.start),em=toMin(sh.end),dur=em<sm?em+1440-sm:em-sm;hrs+=dur/60;}
  const wGross=hrs*rate,wNet=applyDed(wGross,S.deductions);
  // Add recurring side income to weekly/monthly projections
  const siWeekly=S.sideIncome.filter(s=>s.frequency!=='one-time').reduce((t,s)=>t+toWeekly({amount:s.amount,frequency:s.frequency}),0);
  const siMonthly=S.sideIncome.filter(s=>s.frequency!=='one-time').reduce((t,s)=>t+toMonthly({amount:s.amount,frequency:s.frequency}),0);
  return{wGross,wNet:wNet+siWeekly,mGross:wGross*52/12,mNet:wNet*52/12+siMonthly,connected:!!rate};
}

// Fix 1: actual spending from imported transactions for a date range
function getTxSpending(fromDate,toDate){
  // Only count negative-amount transactions (purchases/expenses), not deposits
  return S.transactions
    .filter(t=>{const d=parseLocal(t.date);return d>=fromDate&&d<=toDate&&(t.amount<0||(t.type&&(t.type.toLowerCase()==='purchase'||t.type.toLowerCase()==='direct debit')));})
    .reduce((s,t)=>s+Math.abs(parseFloat(t.amount)||0),0);
}
function getTxSpendingByCategory(fromDate,toDate){
  const byCat={};
  S.transactions
    .filter(t=>{const d=parseLocal(t.date);return d>=fromDate&&d<=toDate&&(t.amount<0||(t.type&&(t.type.toLowerCase()==='purchase'||t.type.toLowerCase()==='direct debit')));})
    .forEach(t=>{const c=t.category||'custom';byCat[c]=(byCat[c]||0)+Math.abs(parseFloat(t.amount)||0);});
  return byCat;
}
// Get imported deposit/income for a date range (positive-amount deposit-type transactions)
function getTxIncome(fromDate,toDate){
  return S.transactions
    .filter(t=>{
      if(!t.date)return false;
      const d=parseLocal(t.date);
      if(d<fromDate||d>toDate)return false;
      const amt=parseFloat(t.amount)||0;
      if(amt<=0)return false;
      const type=(t.type||'').toLowerCase();
      // Only count transactions that are explicitly deposit-typed or manually added (no type set)
      return type==='deposit'||type==='direct deposit'||type==='cash bonus'||type==='income'||(!t.imported&&type==='');
    })
    .reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
}

        return{label:MONTHS[mo2],income:n2,expenses:expM,surplus:n2-expM};
      });
      const maxVal=Math.max(...months6.flatMap(m=>[m.income,m.expenses]),1);
      const W=60,G=8,H=60,TW=months6.length*(W+G)-G;
      const fmtBar=(v)=>{if(v>=1000)return'$'+Math.round(v/1000)+'k';if(v>=1)return'$'+Math.round(v);return'';};
      return`<div class="mb20">
        <div class="label">6-Month Trend</div>
        <svg viewBox="0 0 ${TW} ${H+28}" style="width:100%;display:block">
          ${months6.map((m,i)=>{
            const ih=Math.max(2,(m.income/maxVal)*H),eh=Math.max(2,(m.expenses/maxVal)*H);
            const x=i*(W+G),iY=H-ih,eY=H-eh;
            return`<rect x="${x}" y="${iY}" width="${W*0.45}" height="${ih}" fill="rgba(77,186,110,.7)" rx="1"/>
                   <rect x="${x+W*0.5}" y="${eY}" width="${W*0.45}" height="${eh}" fill="rgba(192,80,80,.6)" rx="1"/>
                   ${m.income>0?`<text x="${x+W*0.225}" y="${iY-3}" text-anchor="middle" fill="var(--grn)" font-size="6" font-family="monospace">${fmtBar(m.income)}</text>`:''}
                   ${m.expenses>0?`<text x="${x+W*0.725}" y="${eY-3}" text-anchor="middle" fill="var(--red)" font-size="6" font-family="monospace">${fmtBar(m.expenses)}</text>`:''}
                   <text x="${x+W/2}" y="${H+12}" text-anchor="middle" fill="var(--mut)" font-size="7" font-family="monospace">${m.label}</text>
                   ${m.surplus!==0?`<text x="${x+W/2}" y="${H+22}" text-anchor="middle" fill="${m.surplus>=0?'var(--grn)':'var(--red)'}" font-size="6" font-family="monospace">${m.surplus>=0?'+':''}${fmtBar(Math.abs(m.surplus))}</text>`:''}`;          }).join('')}
        </svg>
        <div class="flex gap10" style="justify-content:center;margin-top:4px">
          <div style="display:flex;align-items:center;gap:4px;font-size:8px;color:var(--mut)"><div style="width:10px;height:6px;background:rgba(77,186,110,.7);border-radius:1px"></div>Income</div>
          <div style="display:flex;align-items:center;gap:4px;font-size:8px;color:var(--mut)"><div style="width:10px;height:6px;background:rgba(192,80,80,.6);border-radius:1px"></div>Expenses</div>
        </div>
      </div>`;
    })()}

    ${recentPc.length?`<div class="mb20">
      <div class="label">Recent Paychecks — Actual vs Projected</div>
      ${recentPc.map(([wk,pc])=>{
        const d=parseLocal(wk),wkLog=(S.log[wk]||{}),sec=Object.values(wkLog).reduce((a,b)=>a+b,0);
        const g=calcEarnings(sec,rate,S.schedule.overtimeAfter,S.schedule.overtimeMultiplier),proj=applyDed(g,S.deductions);
        const diff=pc.amount-proj;
        return`<div class="flex" style="justify-content:space-between;align-items:center;padding:9px 14px;background:var(--surf);margin-bottom:6px;border-left:2px solid ${diff>=0?'var(--grn)':'var(--red)'}">
          <div>
            <div style="font-size:9px;color:var(--mut)">WK OF ${MONTHS[d.getMonth()].toUpperCase()} ${d.getDate()}${pc.date?` · Received ${pc.date}`:''}</div>
            <div style="font-size:10px;margin-top:2px">Projected ${fmt$(proj)} · Actual ${fmt$(pc.amount)}</div>
          </div>
          <div style="font-size:13px;font-weight:bold;color:${diff>=0?'var(--grn)':'var(--red)'}">${diff>=0?'+':''}${fmt$(diff)}</div>
        </div>`;
      }).join('')}
    </div>`:''}

    ${mNet>0?`<div class="flex gap10 mb20">
      <div class="stat-box" style="border-left:2px solid var(--grn)"><div class="sl">Savings Rate</div><div class="sv" style="color:var(--grn)">${savRate}%</div><div style="font-size:9px;color:var(--mut);margin-top:2px">${fmt$(savingsM)}/mo</div></div>
      <div class="stat-box" style="border-left:2px solid var(--blu)"><div class="sl">Cash Runway</div><div class="sv" style="color:var(--blu)">${recM>0?`${Math.floor(mNet/recM*10)/10} mo`:'—'}</div><div style="font-size:9px;color:var(--mut);margin-top:2px">income vs expenses</div></div>
    </div>`:''}

    ${(()=>{
      const trend=getExpenseTrend();
      const hasData=trend.some(t=>t.total>0);
      if(!hasData)return'';
      const mx=Math.max(...trend.map(t=>t.total),1);
      return`<div class="mb20">
        <div class="label">Expense Trend (3 months)</div>
        <div class="flex gap8">${trend.map(t=>{const pct=Math.round((t.total/mx)*100);return`<div style="flex:1;text-align:center"><div style="height:40px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:4px"><div style="width:24px;background:${t.total>trend[0].total?'var(--red)':'var(--grn)'};border-radius:2px 2px 0 0;height:${Math.max(4,pct)}%"></div></div><div style="font-size:8px;color:var(--mut)">${t.label}</div><div style="font-size:9px;font-weight:bold">${fmt$(t.total)}</div></div>`;}).join('')}

    ${catTotal>0?`<div class="mb20">

      ${catSorted.map(([catId,amt])=>{const cat=catById[catId]||CATS[CATS.length-1],pct=catTotal>0?(amt/catTotal)*100:0;return`<div class="mb8"><div class="flex" style="justify-content:space-between;margin-bottom:4px"><span style="font-size:11px"><span style="color:${cat.color}">${cat.icon} </span>${cat.label}</span><span style="font-size:12px">${fmt$(amt)}</span></div><div class="prog"><div class="prog-fill" style="width:${pct}%;background:${cat.color};opacity:.8"></div></div></div>`;}).join('')}
    </div>`:''}

    ${budgetVarianceHTML}

    ${(()=>{
      // Monthly actual spending from transactions by category
      const txByCat=getTxSpendingByCategory(moStart,moEnd);
      const txCats=Object.entries(txByCat).sort((a,b)=>b[1]-a[1]);

        +'<div style="font-size:9px;color:var(--mut);margin-top:6px">Total: '+fmt$(txTotal)+'</div></div>';

// ─── BUDGET EXPENSES ─────────────────────────────────────────────────────────
let _expFilter='all',_showExpForm=false,_editExpId=null,_showEnvelopes=false;
let _expForm={label:'',category:'housing',customCategory:'',amount:'',frequency:'monthly',oneTimeDate:'',dayOfMonth:'',accountId:''};

function renderBudgetExpenses(){
  const filter=_expFilter;
  const activeExps=S.expenses.filter(e=>!e.archived&&!e._archived);
  const archivedExps=S.expenses.filter(e=>e.archived||e._archived);
  const filtered=activeExps.filter(e=>filter==='all'||(filter==='recurring'&&e.frequency!=='one-time')||(filter==='one-time'&&e.frequency==='one-time'))
    .sort((a,b)=>{
      if(a.frequency==='one-time'&&b.frequency!=='one-time')return 1;
      if(b.frequency==='one-time'&&a.frequency!=='one-time')return-1;
      if(a.frequency==='one-time'&&b.frequency==='one-time')return(a.oneTimeDate||'').localeCompare(b.oneTimeDate||'');
      const da=parseInt(a.dayOfMonth)||32,db=parseInt(b.dayOfMonth)||32;
      if(da!==db)return da-db;
      return toMonthly(b)-toMonthly(a);

  // Envelope summary — always visible as subsection

  const envHTML='<div class="mt20">'

    +'<span style="font-size:10px;color:var(--mut)">'+(_showEnvelopes?'▲ Hide':'▼ Show')+'</span>'
    +'</div>'
    +(_showEnvelopes?CATS.filter(c=>c.id!=='custom').map(cat=>{
      const scheduled=S.expenses.filter(e=>e.active!==false&&e.category===cat.id&&e.frequency!=='one-time').reduce((s,e)=>s+toMonthly(e),0);
      // Also count imported transaction spend for this category this month
      const txSpent=txSpendByCatForMonth(cat.id,now2.getFullYear(),now2.getMonth());
      const spent=Math.max(scheduled,txSpent);
      const limit=S.envelopes[cat.id]||0;
      const pct=limit>0?Math.min(100,(spent/limit)*100):0;
      const over=limit>0&&spent>limit;
      const hasTx=txSpent>0;
      return '<div style="margin-bottom:10px">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'

        +'<div style="display:flex;align-items:center;gap:6px">'
        +'<span style="font-size:9px;color:'+(over?'var(--red)':'var(--mut)')+'">'+fmt$(spent)+(hasTx?'*':'')+(limit?' / '+fmt$(limit):'')+' /mo</span>'
        +'<div style="display:flex;align-items:center;border:1px solid var(--bdrh);background:var(--bg)">'
        +'<span style="padding:0 6px;color:var(--mut);font-size:11px">$</span>'
        +'<input type="number" min="0" step="10" placeholder="No limit" value="'+(limit||'')+'" inputmode="decimal" oninput="setEnvLimit(\''+cat.id+'\',this.value)" style="border:none;background:transparent;font-size:11px;padding:4px;width:70px;color:var(--txt)">'
        +'</div></div></div>'
        +(limit?'<div class="prog"><div class="prog-fill" style="width:'+pct+'%;background:'+(over?'var(--red)':pct>80?'var(--org)':'var(--grn)')+'"></div></div>':'<div style="height:3px;background:var(--bdr);border-radius:1px"></div>')
        +'</div>';
    }).join('')+((S.transactions.length>0)?'<div style="font-size:8px;color:var(--mut2);margin-top:6px">* includes imported transaction data</div>':''):'')
    +'</div>';
  const formHTML=_showExpForm?`<div class="inline-form mb14">
    <div class="label">${_editExpId?'Edit Expense':'New Expense'}</div>
    <input id="ef-label" placeholder="Expense name" value="${_expForm.label}" style="margin-bottom:10px">
    <div class="label2">Category</div>
    <div class="chips mb10">${CATS.map(cat=>`<button class="chip${_expForm.category===cat.id?' active':''}" style="${_expForm.category===cat.id?`border-color:${cat.color};background:${cat.color}22;color:${cat.color}`:`color:var(--mut)`}" onclick="setExpCat('${cat.id}')">${cat.icon} ${cat.label}</button>`).join('')}</div>
    ${_expForm.category==='custom'?`<input id="ef-cc" placeholder="Custom category" value="${_expForm.customCategory}" style="margin-bottom:10px">`:''}
    <div class="form-row">
      <div class="inp-row" style="flex:1"><span class="pre" style="font-size:16px">$</span><input id="ef-amt" type="number" inputmode="decimal" min="0" step=".01" placeholder="0.00" value="${_expForm.amount}" style="border:none;background:transparent;font-size:18px;padding:8px 4px"></div>
      <select id="ef-freq" style="flex:1">${FREQ.map(f=>`<option value="${f.id}" ${_expForm.frequency===f.id?'selected':''}>${f.label}</option>`).join('')}</select>
    </div>
    ${_expForm.frequency==='one-time'?`<div class="mt8"><div class="label2">Due Date</div><input id="ef-date" type="date" value="${_expForm.oneTimeDate}"></div>`:''}
    ${_expForm.frequency!=='one-time'?`<div class="mt8"><div class="label2">Day of Month (optional — for precise forecast & calendar)</div><input id="ef-dom" type="number" inputmode="numeric" min="1" max="31" placeholder="e.g. 15" value="${_expForm.dayOfMonth||''}" style="width:100px"></div>`:''}
    <div class="mt8"><div class="label2">Deduct from Account (optional)</div>
      <select id="ef-acct" style="font-size:11px">${'<option value="">None</option>'+S.assets.filter(a=>ACCOUNT_TYPES.map(t=>t.id).includes(a.type)).map(a=>'<option value="'+a.id+'"'+(_expForm.accountId===a.id?' selected':'')+'>'+a.label+' ('+fmt$(a.value)+')</option>').join('')}</select>
    </div>
    <div class="flex gap8 mt10">
      <button class="btn-acc f1" onclick="saveExpense()">${_editExpId?'Save Changes':'Add Expense'}</button>
      <button class="btn-ghost" onclick="closeExpForm()">Cancel</button>
    </div>
  </div>`:'';

  content.innerHTML=`<div class="page">
    <div class="flex" style="align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="pill-row">
        ${['all','recurring','one-time'].map(f=>`<button class="pill${filter===f?' active':''}" onclick="_expFilter='${f}';render()">${f}</button>`).join('')}
      </div>
      <div class="flex gap6">
        <button class="btn-ghost btn-sm" style="color:var(--acc)" onclick="S.budgetTab='transactions';_txWizard.step='import';render()">⊞ Import</button>
        <button class="btn-acc btn-sm" onclick="openExpForm()">+ Add</button>
      </div>
    </div>
    ${formHTML}
    ${filtered.map(exp=>{
      const cat=catById[exp.category]||CATS[CATS.length-1];
      const lbl=exp.category==='custom'&&exp.customCategory?exp.customCategory:cat.label;
      const fq=FREQ.find(f=>f.id===exp.frequency);
      const inactive=exp.active===false;
      return`<div style="margin-bottom:8px;background:var(--surf);padding:12px 14px;border-left:2px solid ${inactive?'var(--mut2)':cat.color};opacity:${inactive?.5:1}">
        <div class="flex" style="justify-content:space-between;align-items:flex-start">
          <div style="flex:1"><div style="font-size:13px;margin-bottom:3px;color:${inactive?'var(--mut)':'var(--txt)'}"><span style="color:${cat.color};margin-right:6px">${cat.icon}</span>${exp.label}</div>
          <div style="font-size:9px;color:var(--mut)">${lbl} · ${fq?.label}${exp.frequency==='one-time'&&exp.oneTimeDate?` · ${exp.oneTimeDate}`:''}${exp.dayOfMonth&&exp.frequency!=='one-time'?` · Day ${exp.dayOfMonth}`:''}${exp.frequency!=='one-time'?` · ${fmt$(toMonthly(exp))}/mo`:''}</div></div>
          <div class="right" style="margin-left:12px"><div style="font-size:15px;font-weight:bold;color:${inactive?'var(--mut)':'var(--red)'}"><span style="font-size:9px;color:var(--mut)">${fq?.sl} </span>${fmt$(exp.amount)}</div></div>
        </div>
        <div class="flex gap8 mt10">
          <button class="btn-sm btn-ghost" onclick="openExpForm('${exp.id}')">Edit</button>
          <button class="btn-sm" style="border:1px solid var(--bdr);color:${inactive?'var(--grn)':'var(--mut)'}" onclick="toggleExp('${exp.id}')">${inactive?'Enable':'Pause'}</button>
          <button class="btn-sm" style="border:1px solid ${exp.paid?'var(--grn)':'var(--bdr)'};color:${exp.paid?'var(--grn)':'var(--mut)'}" onclick="markPaid('${exp.id}')">${exp.paid?'✓ Paid':'Mark Paid'}</button>
          <button class="btn-sm btn-red" onclick="delExp('${exp.id}')">Remove</button>
        </div>
      </div>`;
    }).join('')}
    ${archivedExps.length?`<div class="mt16">
      <div style="font-size:8px;letter-spacing:2px;color:var(--mut2);margin-bottom:8px;cursor:pointer" onclick="this.nextElementSibling.classList.toggle('hidden')">▾ ARCHIVED ONE-TIME (${archivedExps.length})</div>
      <div>
        ${archivedExps.map(exp=>{const cat=catById[exp.category]||CATS[CATS.length-1];return`<div style="margin-bottom:4px;background:var(--surf);padding:8px 12px;border-left:2px solid var(--mut2);opacity:.5;display:flex;justify-content:space-between;align-items:center"><div style="font-size:11px;color:var(--mut)"><span style="color:${cat.color};margin-right:4px">${cat.icon}</span>${exp.label}<span style="margin-left:6px;font-size:9px">${exp.oneTimeDate||''}</span></div><div class="flex gap6"><span style="font-size:12px;color:var(--mut)">−${fmt$(exp.amount)}</span><button class="btn-sm" style="color:var(--mut2)" onclick="S.expenses=S.expenses.map(e=>e.id==='${exp.id}'?{...e,paid:false,archived:false}:e);save('expenses');renderBudgetExpenses()">Restore</button></div></div>`;}).join('')}
      </div>
    </div>`:''}
    ${envHTML}
  </div>`;
}
function setExpCat(id){_expForm.category=id;renderBudgetExpenses();}
function openExpForm(id){
  _showExpForm=true;
  if(id){const e=S.expenses.find(x=>x.id===id);if(e){_editExpId=id;_expForm={label:e.label,category:e.category,customCategory:e.customCategory||'',amount:String(e.amount),frequency:e.frequency,oneTimeDate:e.oneTimeDate||'',dayOfMonth:e.dayOfMonth||'',note:e.note||'',accountId:e.accountId||''};}}
  else{_editExpId=null;_expForm={label:'',category:'housing',customCategory:'',amount:'',frequency:'monthly',oneTimeDate:'',dayOfMonth:'',note:'',accountId:''};}
  renderBudgetExpenses();
}
function closeExpForm(){_showExpForm=false;_editExpId=null;renderBudgetExpenses();}
function setEnvLimit(catId,val){const v=parseFloat(val)||0;if(v>0)S.envelopes[catId]=v;else delete S.envelopes[catId];save('envelopes');}
function saveExpense(){
  const lbl=document.getElementById('ef-label')?.value;
  const amt=document.getElementById('ef-amt')?.value;
  const freq=document.getElementById('ef-freq')?.value;
  const date=document.getElementById('ef-date')?.value||'';
  const dom=document.getElementById('ef-dom')?.value||'';
  const cc=document.getElementById('ef-cc')?.value||'';
  if(!lbl||!amt)return;
  const acctId=document.getElementById('ef-acct')?.value||'';
  const existing=_editExpId?S.expenses.find(x=>x.id===_editExpId):null;
  const e={id:_editExpId||Date.now().toString(),label:lbl,category:_expForm.category,customCategory:cc,amount:amt,frequency:freq,oneTimeDate:date,dayOfMonth:dom,active:existing?existing.active:true,accountId:acctId};
  if(_editExpId)S.expenses=S.expenses.map(x=>x.id===_editExpId?e:x);
  else S.expenses=[...S.expenses,e];
  save('expenses');_showExpForm=false;_editExpId=null;renderBudgetExpenses();
}
function delExp(id){S.expenses=S.expenses.filter(e=>e.id!==id);save('expenses');renderBudgetExpenses();}
function toggleExp(id){S.expenses=S.expenses.map(e=>e.id===id?{...e,active:e.active===false}:e);save('expenses');renderBudgetExpenses();}
function markPaid(id){
  const exp=S.expenses.find(e=>e.id===id);if(!exp)return;
  const wasPaid=exp.paid;
  S.expenses=S.expenses.map(e=>e.id===id?{...e,paid:!e.paid,paidDate:!e.paid?todayStr():''}:e);
  save('expenses');
  if(exp.accountId){
    const amt=parseFloat(exp.amount)||0;
    const acct=S.assets.find(a=>a.id===exp.accountId);
    if(acct&&amt>0){
      const prev=parseFloat(acct.value)||0;
      const nv=wasPaid?prev+amt:prev-amt;
      S.assets=S.assets.map(a=>a.id===exp.accountId?{...a,prevValue:String(prev),value:String(nv),updatedDate:todayStr()}:a);
      save('assets');
    }
  }
  renderBudgetExpenses();
}

// Auto-archive one-time expenses whose month has passed
function archiveOldOneTime(){
  const now=new Date();
  let changed=false;
  S.expenses=S.expenses.map(e=>{
    if(e.frequency!=='one-time'||e.archived||!e.oneTimeDate)return e;
    const d=parseLocal(e.oneTimeDate);
    // Archive if the expense month has fully passed (handles both paid and unpaid)
    if(d.getFullYear()<now.getFullYear()||(d.getFullYear()===now.getFullYear()&&d.getMonth()<now.getMonth())){
      changed=true;return{...e,paid:true,archived:true};
    }
    return e;
  });
  if(changed)save('expenses');
}

function renderBudgetForecastCalOnly(){
  const yr=_calYear,mo=_calMonth;
  const firstDay=new Date(yr,mo,1).getDay();
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);

  // Build expense-by-day: scheduled expenses + imported transaction expenses
  const expByDay={};
  for(const e of S.expenses.filter(x=>x.active!==false&&!x.archived)){
    if(e.frequency==='one-time'&&e.oneTimeDate&&!e.paid){
      const d=parseLocal(e.oneTimeDate);
      if(d.getFullYear()===yr&&d.getMonth()===mo){const day=d.getDate();if(!expByDay[day])expByDay[day]=[];expByDay[day].push({label:e.label,amount:parseFloat(e.amount)||0,source:'scheduled'});}
    } else if(e.frequency!=='one-time'&&e.dayOfMonth){
      const dom=parseInt(e.dayOfMonth);if(dom>=1&&dom<=daysInMonth){if(!expByDay[dom])expByDay[dom]=[];expByDay[dom].push({label:e.label,amount:parseFloat(e.amount)||0,source:'scheduled'});}
    }
  }
  // Add imported transaction expenses for this month
  for(const t of S.transactions){
    if(!t.date)continue;
    const d=parseLocal(t.date);
    if(d.getFullYear()!==yr||d.getMonth()!==mo)continue;
    const amt=parseFloat(t.amount)||0;
    const type=(t.type||'').toLowerCase();
    if(amt<0||(type==='purchase'||type==='direct debit')){
      const day=d.getDate();
      if(!expByDay[day])expByDay[day]=[];
      expByDay[day].push({label:t.description||t.type||'Purchase',amount:Math.abs(amt),source:'imported'});
    }
  }

  // Payday markers + amounts
  const paydays=new Set();
  const paydayAmts={};
  const rate=parseFloat(S.schedule.hourlyRate)||0;
  const offset=parseInt(S.earlyDepositDays)||0;
  const _oa=S.schedule.overtimeAfter,_om=S.schedule.overtimeMultiplier,_otMode=S.schedule.overtimeMode;
  if(rate){
    const seenWks=new Set();
    for(let d=1;d<=daysInMonth;d++){
      const dd=new Date(yr,mo,d);
      const ws=getWeekStart(dd,S.schedule.weekStartDay,S.schedule.weekStartTime);
      const wsKey=localStr(ws);
      if(seenWks.has(wsKey))continue;
      seenWks.add(wsKey);
      const we=wkEnd(ws);
      const payDate=new Date(we);payDate.setDate(payDate.getDate()+1-offset);
      const pc=S.paychecks[wsKey];
      const actualPay=pc?.date?parseLocal(pc.date):payDate;
      if(actualPay.getFullYear()===yr&&actualPay.getMonth()===mo){
        paydays.add(actualPay.getDate());
        // Calculate amount: actual if entered, else estimate from logged hours
        if(pc?.amount){
          paydayAmts[actualPay.getDate()]={amt:pc.amount,actual:true};
        } else {
          const dm=S.log[wsKey]||{};
          const cg=csInWeek(wsKey);
          const gross=weekGross(dm,'__x__',0,rate,_oa,_om,_otMode,cg,csCoveredDays(wsKey),S.pto[wsKey]);
          const net=applyDed(gross,S.deductions);
          if(gross>0)paydayAmts[actualPay.getDate()]={amt:net,actual:false};
        }
      }
    }
  }
  // Also mark imported deposit dates as income days
  const incDays=new Set();
  for(const t of S.transactions){
    if(!t.date)continue;
    const d=parseLocal(t.date);
    if(d.getFullYear()!==yr||d.getMonth()!==mo)continue;
    const amt=parseFloat(t.amount)||0;
    const type=(t.type||'').toLowerCase();
    if(amt>0&&(type==='deposit'||type==='direct deposit'||type==='cash bonus'))incDays.add(d.getDate());
  }

  const debtDays=new Set(S.debts.filter(d=>d.dayOfMonth).map(d=>parseInt(d.dayOfMonth)));
  const savingsDays=new Set(S.expenses.filter(e=>e.category==='savings'&&e.dayOfMonth&&e.active!==false).map(e=>parseInt(e.dayOfMonth)));
  const today=new Date(),isNow=today.getFullYear()===yr&&today.getMonth()===mo;

  const legend=S.calLegendHidden?'':
    `<div class="cal-legend">
      <div style="width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:8px;letter-spacing:3px;color:var(--mut);text-transform:uppercase">Legend</span>
        <button onclick="S.calLegendHidden=true;renderCalApp()" style="font-size:8px;color:var(--mut);border:none;background:transparent;padding:0;cursor:pointer">Hide</button>
      </div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#5b8de8"></div>PAYDAY</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--red)"></div>EXPENSE</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--org)"></div>DEBT DUE</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--grn)"></div>SAVINGS</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#9b7de8"></div>MULTIPLE</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--acc)"></div>TODAY</div>
    </div>`;
  const legendToggle=S.calLegendHidden?`<button onclick="S.calLegendHidden=false;renderCalApp()" style="font-size:8px;color:var(--mut);border:1px solid var(--bdrh);padding:3px 10px;cursor:pointer;margin-bottom:10px;display:block">Show Legend</button>`:'';

  content.innerHTML=`<div class="page">
    ${legend}${legendToggle}
    <div class="flex" style="align-items:center;justify-content:space-between;margin-bottom:12px">
      <button class="btn-ghost btn-sm" onclick="calPrev()">←</button>
      <div style="font-size:12px;letter-spacing:2px">${MONTHS[mo].toUpperCase()} ${yr}</div>
      <button class="btn-ghost btn-sm" onclick="calNext()">→</button>
    </div>
    <div class="cal-grid" style="margin-bottom:4px">${['S','M','T','W','T','F','S'].map(d=>`<div style="text-align:center;font-size:8px;color:var(--mut);padding:4px 0">${d}</div>`).join('')}</div>
    <div class="cal-grid">${cells.map((day)=>{
      if(!day)return'<div></div>';
      const dayExps=expByDay[day]||[];
      const total=dayExps.reduce((s,e)=>s+e.amount,0);
      const hasImported=dayExps.some(e=>e.source==='imported');
      const isToday=isNow&&today.getDate()===day;
      const isPay=paydays.has(day);
      const isInc=incDays.has(day);
      const isDebt=debtDays.has(day);
      const isSav=savingsDays.has(day);
      const typeCount=[dayExps.length>0,isPay||isInc,isDebt,isSav].filter(Boolean).length;
      let cls='cal-cell';
      if(isToday)cls+=' today';
      else if(typeCount>1)cls+=' cal-multi';
      else if(dayExps.length)cls+=' cal-expense';
      else if(isPay||isInc)cls+=' cal-payday';
      else if(isDebt)cls+=' cal-debt';
      else if(isSav)cls+=' cal-savings';
      return`<div class="${cls}">
        <div class="cal-day-num">${day}${(isPay||isInc)?'<span style="color:var(--blu);font-size:6px"> $</span>':''}</div>
        ${dayExps.length?`<div class="cal-lbl">${dayExps[0].label.slice(0,8)}${hasImported?'*':''}</div><div class="cal-amt">-$${total.toFixed(0)}</div>`:isPay&&paydayAmts[day]?`<div class="cal-lbl" style="color:var(--blu)">${paydayAmts[day].actual?'pay':'~pay'}</div><div style="font-size:7px;color:var(--blu);font-weight:500;margin-top:1px">$${Math.round(paydayAmts[day].amt)}</div>`:isDebt?'<div class="cal-lbl" style="color:var(--org)">debt</div>':''}
      </div>`;
    }).join('')}</div>
    ${(()=>{
      // One-time expenses in this month, sorted by highest amount
      const oneTimeExps=S.expenses.filter(e=>{
        if(e.frequency!=='one-time'||e.active===false||e.archived)return false;
        if(!e.oneTimeDate)return false;
        const d=parseLocal(e.oneTimeDate);
        return d.getFullYear()===yr&&d.getMonth()===mo;
      }).sort((a,b)=>(parseFloat(b.amount)||0)-(parseFloat(a.amount)||0));
      if(!oneTimeExps.length)return'';
      return'<div class="card mt16 bdr-l">'
        +'<div class="label2 mb8">One-Time Expenses This Month</div>'
        +oneTimeExps.map(e=>{const cat=catById[e.category]||CATS[CATS.length-1];const d=parseLocal(e.oneTimeDate);return'<div class="row"><span class="rl"><span style="color:'+cat.color+'">'+cat.icon+' </span>'+e.label+' <span style="font-size:9px;color:var(--mut)">('+MONTHS[d.getMonth()]+' '+d.getDate()+')</span>'+(e.paid?' <span style="font-size:8px;color:var(--grn)">✓ paid</span>':'')+'</span><span class="rr" style="color:var(--red)">-'+fmt$(parseFloat(e.amount)||0)+'</span></div>';}).join('')
        +'</div>';
    })()}
    ${S.transactions.filter(t=>{if(!t.date)return false;const d=parseLocal(t.date);return d.getFullYear()===yr&&d.getMonth()===mo&&(parseFloat(t.amount)||0)<0;}).length?`<div style="font-size:8px;color:var(--mut2);margin-top:8px">* includes imported transactions</div>`:''}
  </div>`;
}

function renderBudgetForecastForecastOnly(){
  const {wNet,mNet}=getBudgetIncome();
  const now=new Date();
  const activeExp=S.expenses.filter(e=>e.active!==false);

  // Imported + side income for current periods
  const curWkStart=getWeekStart(now,S.schedule.weekStartDay,S.schedule.weekStartTime);
  const curWkEnd=wkEnd(curWkStart);
  const curMoStart=new Date(now.getFullYear(),now.getMonth(),1);
  const curMoEnd=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59,999);
  const txIncCurWk=getTxIncome(curWkStart,curWkEnd);
  const txIncCurMo=getTxIncome(curMoStart,curMoEnd);
  const siCurWk=S.sideIncome.filter(s=>s.frequency==='one-time'&&s.date&&(()=>{const d=parseLocal(s.date);return d>=curWkStart&&d<=curWkEnd;})()).reduce((t,s)=>t+(parseFloat(s.amount)||0),0);
  const siCurMo=S.sideIncome.filter(s=>s.frequency==='one-time'&&s.date&&(()=>{const d=parseLocal(s.date);return d>=curMoStart&&d<=curMoEnd;})()).reduce((t,s)=>t+(parseFloat(s.amount)||0),0);
  const wNetEff=wNet+txIncCurWk+siCurWk;
  const mNetEff=mNet+txIncCurMo+siCurMo;

  const sunWs=getWeekStart(now,'0','00:00');
  const weeks=Array.from({length:4},(_,i)=>{
    const ws=new Date(sunWs);ws.setDate(sunWs.getDate()+i*7);
    const wExp=activeExp.reduce((s,e)=>s+(inWeek(e,ws)&&!e.paid?expWeekAmt(e,ws):0),0);
    const effInc=i===0?wNetEff:wNet;
    const bal=effInc-wExp;

    return{label:i===0?'THIS WEEK':`WK OF ${MONTHS[d.getMonth()].toUpperCase()} ${d.getDate()}`,income:effInc,expenses:wExp,balance:bal,hasOT:otAmt>0,otAmt,isCurrent:i===0};
  });
  const months=Array.from({length:6},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    const mExp=activeExp.reduce((s,e)=>inMonth(e,d.getFullYear(),d.getMonth())&&!e.paid?s+expMonthAmt(e,d.getFullYear(),d.getMonth()):s,0);
    const effInc=i===0?mNetEff:mNet;
    const bal=effInc-mExp;
    const otAmt=activeExp.filter(e=>e.frequency==='one-time'&&!e.paid&&inMonth(e,d.getFullYear(),d.getMonth())).reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
    return{label:MONTHS[d.getMonth()],year:d.getFullYear(),income:effInc,expenses:mExp,balance:bal,hasOT:otAmt>0,otAmt,isCurrent:i===0};
  });

  const barRow=(items,curKey,getKey)=>`<div class="flex" style="border:1px solid var(--bdr);margin-bottom:20px">
    ${items.map(w=>`<button style="flex:1;padding:9px;background:${getKey(w)===curKey?'var(--acc)':'transparent'};color:${w.balance>=0?'var(--grn)':'var(--red)'};border:none;font-size:8px;letter-spacing:0;font-weight:bold">${w.label.slice(0,6)}<br><span style="font-size:9px">${fmt$(w.balance,true)}</span></button>`).join('')}
  </div>`;

  content.innerHTML=`<div class="page">
    <div class="label mb12">4 Weeks</div>
    ${weeks.map(w=>`<div class="card mb10" style="border-left:2px solid ${w.balance>=0?'var(--grn)':'var(--red)'}">
      <div class="flex" style="justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div><div style="font-size:9px;letter-spacing:2px;color:var(--mut);margin-bottom:3px">${w.label}</div>
        <div class="flex" style="align-items:center;gap:8px"><div style="width:6px;height:6px;border-radius:50%;background:${w.balance>=0?'var(--grn)':'var(--red)'}"></div><span style="font-size:18px;font-weight:bold;color:${w.balance>=0?'var(--grn)':'var(--red)'}">${fmt$(w.balance,true)}</span></div></div>
        <div class="right"><div style="font-size:9px;color:var(--mut)">${fmt$(w.income)} in</div><div style="font-size:9px;color:var(--red)">-${fmt$(w.expenses)} out</div></div>
      </div>${w.hasOT?`<div style="font-size:9px;color:var(--acc)">⚠ Includes ${fmt$(w.otAmt)} one-time</div>`:''}</div>`).join('')}
    <div class="label mt16 mb12">6 Months</div>
    ${months.map(m=>`<div class="card mb10" style="border-left:2px solid ${m.balance>=0?'var(--grn)':'var(--red)'}">
      <div class="flex" style="justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div><div style="font-size:9px;letter-spacing:2px;color:${m.isCurrent?'var(--acc)':'var(--mut)'};margin-bottom:3px">${m.label.toUpperCase()} ${m.year}${m.isCurrent?' · NOW':''}</div>
        <div class="flex" style="align-items:center;gap:8px"><div style="width:6px;height:6px;border-radius:50%;background:${m.balance>=0?'var(--grn)':'var(--red)'}"></div><span style="font-size:18px;font-weight:bold;color:${m.balance>=0?'var(--grn)':'var(--red)'}">${fmt$(m.balance,true)}</span></div></div>

      </div>${m.hasOT?`<div style="font-size:9px;color:var(--acc)">⚠ Includes ${fmt$(m.otAmt)} one-time</div>`:''}</div>`).join('')}
  </div>`;

let _calHistMonth=new Date().getMonth(),_calHistYear=new Date().getFullYear();
function calHistPrev(){if(_calHistMonth===0){_calHistMonth=11;_calHistYear--;}else _calHistMonth--;renderCalApp();}
function calHistNext(){if(_calHistMonth===11){_calHistMonth=0;_calHistYear++;}else _calHistMonth++;renderCalApp();}

function renderCalHistory(){
  const yr=_calHistYear,mo=_calHistMonth;
  const moStart=new Date(yr,mo,1),moEnd=new Date(yr,mo+1,0,23,59,59,999);
  const daysInMonth=moEnd.getDate();

  // Collect all financial events for this month
  const events=[];

  // 1. Recurring expenses that fall in this month
  for(const e of S.expenses.filter(x=>x.active!==false)){
    if(e.frequency==='one-time'){
      if(e.oneTimeDate){
        const d=parseLocal(e.oneTimeDate);
        if(d.getFullYear()===yr&&d.getMonth()===mo){
          events.push({date:e.oneTimeDate,day:d.getDate(),label:e.label,amount:-(parseFloat(e.amount)||0),cat:e.category,source:'expense',sub:e.paid?'paid':'one-time'});
        }
      }
    } else if(e.dayOfMonth){
      const dom=parseInt(e.dayOfMonth);
      if(dom>=1&&dom<=daysInMonth){
        const dateStr=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(dom).padStart(2,'0');
        events.push({date:dateStr,day:dom,label:e.label,amount:-(parseFloat(e.amount)||0),cat:e.category,source:'expense',sub:e.frequency});
      }
    }
  }

  // 2. Debt payments due this month
  for(const d of S.debts){
    if(d.dayOfMonth){
      const dom=parseInt(d.dayOfMonth);
      if(dom>=1&&dom<=daysInMonth){
        const dateStr=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(dom).padStart(2,'0');
        events.push({date:dateStr,day:dom,label:d.label+' (min)',amount:-(parseFloat(d.minimum)||0),cat:'debt',source:'debt',sub:'monthly'});
      }
    }
  }

  // 3. Imported transactions for this month
  for(const t of S.transactions){
    if(!t.date)continue;
    const d=parseLocal(t.date);
    if(d.getFullYear()!==yr||d.getMonth()!==mo)continue;
    const amt=parseFloat(t.amount)||0;
    const type=(t.type||'').toLowerCase();
    const isIncome=amt>0&&(type==='deposit'||type==='direct deposit'||type==='cash bonus'||type==='income');
    const isExpense=amt<0||(type==='purchase'||type==='direct debit');
    if(isIncome){
      events.push({date:t.date,day:d.getDate(),label:t.description||'Deposit',amount:Math.abs(amt),cat:t.category||'income',source:'transaction',sub:'income'});
    } else if(isExpense){
      events.push({date:t.date,day:d.getDate(),label:t.description||'Purchase',amount:-Math.abs(amt),cat:t.category||'custom',source:'transaction',sub:'expense'});
    }
  }

  // 4. Side income for this month
  for(const si of S.sideIncome){
    if(si.frequency==='one-time'&&si.date){
      const d=parseLocal(si.date);
      if(d.getFullYear()===yr&&d.getMonth()===mo){
        events.push({date:si.date,day:d.getDate(),label:si.label||'Side Income',amount:parseFloat(si.amount)||0,cat:'income',source:'side-income',sub:'one-time'});
      }
    } else if(si.frequency!=='one-time'){
      // Recurring side income — show on day 1
      events.push({date:yr+'-'+String(mo+1).padStart(2,'0')+'-01',day:1,label:si.label||'Side Income',amount:toMonthly({amount:si.amount,frequency:si.frequency}),cat:'income',source:'side-income',sub:si.frequency});
    }
  }

  // 5. Paydays in this month
  const rate=parseFloat(S.schedule.hourlyRate)||0;
  const offset=parseInt(S.earlyDepositDays)||0;
  const oa=S.schedule.overtimeAfter,om=S.schedule.overtimeMultiplier,otMode=S.schedule.overtimeMode;
  if(rate){
    const seenWks=new Set();
    for(let dd=1;dd<=daysInMonth;dd++){
      const dt=new Date(yr,mo,dd);
      const ws=getWeekStart(dt,S.schedule.weekStartDay,S.schedule.weekStartTime);
      const wsKey=localStr(ws);
      if(seenWks.has(wsKey))continue;
      seenWks.add(wsKey);
      const we=wkEnd(ws);
      const payDate=new Date(we);payDate.setDate(payDate.getDate()+1-offset);
      const pc=S.paychecks[wsKey];
      const actualPay=pc?.date?parseLocal(pc.date):payDate;
      if(actualPay.getFullYear()===yr&&actualPay.getMonth()===mo){
        const dm=S.log[wsKey]||{};
        const cg=csInWeek(wsKey);
        const gross=weekGross(dm,'__x__',0,rate,oa,om,otMode,cg,csCoveredDays(wsKey),S.pto[wsKey]);
        const net=applyDed(gross,S.deductions);
        const amt=pc?.amount||net;
        events.push({date:localStr(actualPay),day:actualPay.getDate(),label:'Paycheck'+(pc?.amount?' (actual)':' (est)'),amount:amt,cat:'income',source:'paycheck',sub:'weekly'});
      }
    }
  }

  // Sort by day, then by amount descending (income first)
  events.sort((a,b)=>a.day-b.day||b.amount-a.amount);

  const totalIncome=events.filter(e=>e.amount>0).reduce((s,e)=>s+e.amount,0);
  const totalExpenses=events.filter(e=>e.amount<0).reduce((s,e)=>s+Math.abs(e.amount),0);
  const netFlow=totalIncome-totalExpenses;

  // Group by day
  const byDay={};
  for(const ev of events){
    if(!byDay[ev.day])byDay[ev.day]=[];
    byDay[ev.day].push(ev);
  }
  const dayKeys=Object.keys(byDay).map(Number).sort((a,b)=>a-b);

  const today=new Date();
  const isCurrentMonth=today.getFullYear()===yr&&today.getMonth()===mo;

  let eventsHTML='';
  for(const dk of dayKeys){
    const dayEvents=byDay[dk];
    const dayTotal=dayEvents.reduce((s,e)=>s+e.amount,0);
    const isPast=isCurrentMonth?dk<today.getDate():new Date(yr,mo,dk)<today;
    const isToday=isCurrentMonth&&dk===today.getDate();
    const dayLabel=DAYS[new Date(yr,mo,dk).getDay()];

    let rowsHTML='';
    for(const ev of dayEvents){
      const cat=catById[ev.cat]||catById['custom']||CATS[CATS.length-1];
      const isInc=ev.amount>0;

function calcFreedomFundTarget(){
  // Use average monthly spend from budget expenses if available
  const activeExp=S.expenses.filter(e=>e.active!==false&&e.frequency!=='one-time');
  const recM=activeExp.reduce((s,e)=>s+toMonthly(e),0);
  if(recM>0)return Math.round(recM*6);
  // Fall back: use actual spending from log (last 3 months of earnings as proxy)
  const now=new Date(),rate=parseFloat(S.schedule.hourlyRate)||0;
  if(!rate)return 0;
  let monthlyTotals=[];
  for(let i=1;i<=3;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const yr=d.getFullYear(),mo=d.getMonth();
    let secs=0;
    for(const[,dm]of Object.entries(S.log)){
      for(const[dk,sec]of Object.entries(dm)){const dd=parseLocal(dk);if(dd.getFullYear()===yr&&dd.getMonth()===mo)secs+=sec;}
    }
    if(secs>0)monthlyTotals.push(calcEarnings(secs,rate,S.schedule.overtimeAfter,S.schedule.overtimeMultiplier));
  }
  if(monthlyTotals.length){const avg=monthlyTotals.reduce((a,b)=>a+b,0)/monthlyTotals.length;return Math.round(avg*6*0.7);} // 70% of avg income as expense estimate
  return 0;
}
function openGoalFF(){
  const target=calcFreedomFundTarget();
  const activeExp=S.expenses.filter(e=>e.active!==false&&e.frequency!=='one-time');
  const recM=activeExp.reduce((s,e)=>s+toMonthly(e),0);
  const basis=recM>0?'based on your current monthly expenses':'estimated from past earnings';
  _goalForm={label:'Freedom Fund — Business Launch',target:String(target),saved:'',ffBasis:basis};
  _showGoalForm=true;render();
}
function saveGoal(){
  const l=document.getElementById('gf-label')?.value,t=document.getElementById('gf-target')?.value,s=document.getElementById('gf-saved')?.value;
  const acctId=document.getElementById('gf-acct')?.value||'';
  if(!l||!t)return;
  S.goals=[...S.goals,{id:Date.now().toString(),label:l,target:t,saved:s||'0',accountId:acctId}];

function updateGoalSaved(id,val){S.goals=S.goals.map(g=>g.id===id?{...g,saved:val}:g);save('goals');}

// ─── BUDGET DEBT ─────────────────────────────────────────────────────────────
let _showDebtForm=false,_debtForm={label:'',balance:'',rate:'',minimum:'',dayOfMonth:''},_debtMethod='snowball',_debtExtra='';
let _debtEditing=null; // id of debt being edited, or null
function runDebtPlan(debts,extra,method){
  if(!debts.length)return{months:0,totalInterest:0,events:[]};
  let ds=debts.map(d=>({...d,bal:parseFloat(d.balance)||0,r:parseFloat(d.rate)||0,min:parseFloat(d.minimum)||0,done:false})).filter(d=>d.bal>0);
  if(method==='snowball')ds.sort((a,b)=>a.bal-b.bal);else ds.sort((a,b)=>b.r-a.r);
  let months=0,interest=0,xtra=parseFloat(extra)||0,events=[];
  while(ds.some(d=>d.bal>0.01)&&months<600){
    months++;
    const ti=ds.findIndex(d=>d.bal>0.01);
    for(let i=0;i<ds.length;i++){
      if(ds[i].bal<=0.01)continue;
      const int=ds[i].bal*(ds[i].r/100/12);interest+=int;ds[i].bal+=int;
      let pay=ds[i].min+(i===ti?xtra:0);pay=Math.min(ds[i].bal,Math.max(pay,ds[i].min));
      ds[i].bal=Math.max(0,ds[i].bal-pay);
      if(ds[i].bal<0.01&&!ds[i].done){ds[i].done=true;events.push({id:ds[i].id,label:ds[i].label,month:months});xtra+=ds[i].min;}
    }
  }
  return{months,totalInterest:interest,events};
}

  const effExtra=parseFloat(_debtExtra)||Math.max(0,mBal-goalRes);
  const plan=runDebtPlan(S.debts,effExtra,_debtMethod);

function saveDebt(){
  const l=document.getElementById('df-label')?.value,b=document.getElementById('df-bal')?.value;
  if(!l||!b)return;
  const r=document.getElementById('df-rate')?.value||'0',m=document.getElementById('df-min')?.value||'0',dom=document.getElementById('df-dom')?.value||'';
  const debtId=Date.now().toString();
  S.debts=[...S.debts,{id:debtId,label:l,balance:b,rate:r,minimum:m,dayOfMonth:dom}];
  // Auto-create recurring expense for minimum payment
  if(parseFloat(m)>0){
    const autoExp={id:'debt-exp-'+debtId,label:l+' (min payment)',category:'debt',customCategory:'',
      amount:m,frequency:'monthly',oneTimeDate:'',dayOfMonth:dom,active:true,_debtId:debtId};
    S.expenses=[...S.expenses,autoExp];
    save('expenses');
  }
  save('debts');_showDebtForm=false;renderBudgetDebt();
}
function delDebt(id){
  S.debts=S.debts.filter(d=>d.id!==id);
  // Remove associated auto-expense
  S.expenses=S.expenses.filter(e=>e._debtId!==id);
  save('debts');save('expenses');_debtEditing=null;renderBudgetDebt();
}
function updateDebt(id){
  const l=document.getElementById('ded-label-'+id)?.value;
  const b=document.getElementById('ded-bal-'+id)?.value;
  if(!l||!b)return;
  const r=document.getElementById('ded-rate-'+id)?.value||'0';
  const m=document.getElementById('ded-min-'+id)?.value||'0';
  const dom=document.getElementById('ded-dom-'+id)?.value||'';
  S.debts=S.debts.map(d=>d.id===id?{...d,label:l,balance:b,rate:r,minimum:m,dayOfMonth:dom}:d);
  // Update the linked auto-expense amount + dayOfMonth if it exists
  S.expenses=S.expenses.map(e=>{
    if(e._debtId!==id)return e;
    return{...e,label:l+' (min payment)',amount:m,dayOfMonth:dom};
  });
  // If minimum changed to >0 and no linked expense exists, create one
  const hasLinked=S.expenses.some(e=>e._debtId===id);
  if(!hasLinked&&parseFloat(m)>0){
    S.expenses=[...S.expenses,{id:'debt-exp-'+id,label:l+' (min payment)',category:'debt',
      customCategory:'',amount:m,frequency:'monthly',oneTimeDate:'',dayOfMonth:dom,
      active:true,_debtId:id}];
  }
  save('debts');save('expenses');_debtEditing=null;renderBudgetDebt();
}

function saveAcctContrib(id,perPaycheck,anchorAmt,anchorDate){
  S.assets=S.assets.map(a=>{

  });
  save('assets');renderAccounts();

let _snapConfirm=false;

  if(!_snapConfirm){_snapConfirm=true;renderNetWorth();return;}
  const totalAssets=S.assets.reduce((s,a)=>s+(parseFloat(a.value)||0),0);
  const totalDebts=S.debts.reduce((s,d)=>s+(parseFloat(d.balance)||0),0);
  const nw=totalAssets-totalDebts;
  const note=document.getElementById('snap-note')?.value||'';
  S.snapshots=[...S.snapshots,{id:Date.now().toString(),date:todayStr(),netWorth:nw,assets:totalAssets,debts:totalDebts,note:note}];

}
function cancelSnapshot(){_snapConfirm=false;renderNetWorth();}
function delSnapshot(id){S.snapshots=S.snapshots.filter(s=>s.id!==id);save('snapshots');renderSnapshots();}

function renderSnapshots(){
  const snaps=[...S.snapshots].sort((a,b)=>b.date.localeCompare(a.date));
  const totalAssets=S.assets.reduce((s,a)=>s+(parseFloat(a.value)||0),0);
  const totalDebts=S.debts.reduce((s,d)=>s+(parseFloat(d.balance)||0),0);
  const curNW=totalAssets-totalDebts;

  // Mini SVG line chart
  let chartHTML='';
  if(snaps.length>=2){
    const vals=snaps.slice(0,12).reverse().map(s=>s.netWorth);
    const mn=Math.min(...vals),mx=Math.max(...vals),range=mx-mn||1;
    const W=280,H=60,pad=6,pts=vals.map((v,i)=>{
      const x=pad+(i/(vals.length-1))*(W-pad*2);
      const y=pad+(1-(v-mn)/range)*(H-pad*2);
      return`${x},${y}`;
    }).join(' ');
    const lastPos=snaps.slice(0,12).length;
    chartHTML=`<svg viewBox="0 0 ${W} ${H+20}" style="width:100%;display:block;margin-bottom:16px">
      <polyline points="${pts}" fill="none" stroke="var(--grn)" stroke-width="1.5"/>
      ${vals.map((v,i)=>{
        const x=pad+(i/(vals.length-1))*(W-pad*2);
        const y=pad+(1-(v-mn)/range)*(H-pad*2);
        return`<circle cx="${x}" cy="${y}" r="3" fill="${v===vals[vals.length-1]?'var(--acc)':'var(--grn)'}"/>`;
      }).join('')}
      <text x="${pad}" y="${H+16}" fill="var(--mut)" font-size="7" font-family="monospace">${snaps[Math.min(11,snaps.length-1)].date}</text>
      <text x="${W-pad}" y="${H+16}" text-anchor="end" fill="var(--mut)" font-size="7" font-family="monospace">${snaps[0].date}</text>
    </svg>`;
  }

  content.innerHTML=`<div class="page">
    <div class="flex" style="justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="label" style="margin:0">Net Worth History</div>
      <button class="btn-acc btn-sm" onclick="takeSnapshot()">+ Snapshot Today</button>
    </div>
    <div class="card accent-l mb20">
      <div class="label2">Current</div>
      <div style="font-size:28px;font-weight:bold;color:${curNW>=0?'var(--grn)':'var(--red)'}">${fmt$(curNW,true)}</div>
      ${snaps.length>0?(()=>{
        const last=snaps[0];
        const diff=curNW-last.netWorth;
        return`<div style="font-size:10px;color:${diff>=0?'var(--grn)':'var(--red)'};margin-top:4px">${diff>=0?'▲':'▼'} ${fmt$(Math.abs(diff))} since last snapshot (${last.date})</div>`;
      })():''}
    </div>
    ${chartHTML}
    ${snaps.length===0?`<div style="text-align:center;padding:40px 0;color:var(--mut);font-size:9px;letter-spacing:2px">Tap "+ Snapshot Today" to start tracking your net worth over time</div>`:''}
    ${snaps.map(s=>{
      const d=parseLocal(s.date);
      return`<div class="card bdr-l mb8">
        <div class="flex" style="justify-content:space-between;align-items:flex-start">
          <div>
            <div style="font-size:9px;color:var(--mut);letter-spacing:1px;margin-bottom:3px">${MONTHS[d.getMonth()].toUpperCase()} ${d.getDate()}, ${d.getFullYear()}</div>
            <div style="font-size:18px;font-weight:bold;color:${s.netWorth>=0?'var(--grn)':'var(--red)'}">${fmt$(s.netWorth,true)}</div>
            <div style="font-size:9px;color:var(--mut);margin-top:3px">Assets ${fmt$(parseFloat(s.assets)||0)} · Debts ${fmt$(parseFloat(s.debts)||0)}</div>
            ${s.note?`<div style="font-size:9px;color:var(--acc);margin-top:4px;font-style:italic">"${s.note}"</div>`:''}
          </div>
          <button class="btn-sm btn-red" onclick="delSnapshot('${s.id}')">✕</button>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// MILESTONES TAB
// ════════════════════════════════════════════════════════════════
const DEFAULT_MILESTONES=[
  {label:'First $1,000 saved',target:1000},{label:'Emergency fund ($5k)',target:5000},
  {label:'Net worth $10,000',target:10000},{label:'Net worth $25,000',target:25000},
  {label:'Net worth $50,000',target:50000},{label:'Debt free',target:0,debtFree:true},
  {label:'Net worth $100,000',target:100000},{label:'Net worth $250,000',target:250000},
];
function checkMilestones(){
  const totalAssets=S.assets.reduce((s,a)=>s+(parseFloat(a.value)||0),0);
  const totalDebts=S.debts.reduce((s,d)=>s+(parseFloat(d.balance)||0),0);
  const nw=totalAssets-totalDebts;
  let changed=false;
  for(const m of S.milestones){
    if(m.achieved)continue;
    const hit=m.debtFree?(totalDebts<=0&&totalAssets>0):nw>=m.target;
    if(hit){m.achieved=true;m.achievedDate=todayStr();changed=true;}
  }
  if(changed)save('milestones');
}
function renderMilestones(){
  // Init default milestones if empty
  if(!S.milestones.length){
    S.milestones=DEFAULT_MILESTONES.map((m,i)=>({...m,id:String(i),achieved:false,achievedDate:null,custom:false}));
    save('milestones');
  }
  const totalAssets=S.assets.reduce((s,a)=>s+(parseFloat(a.value)||0),0);
  const totalDebts=S.debts.reduce((s,d)=>s+(parseFloat(d.balance)||0),0);
  const nw=totalAssets-totalDebts;
  checkMilestones();
  const achieved=S.milestones.filter(m=>m.achieved);
  const upcoming=S.milestones.filter(m=>!m.achieved);

  content.innerHTML=`<div class="page">
    <div class="label">Milestones</div>
    ${achieved.length?`<div style="font-size:9px;color:var(--grn);letter-spacing:2px;margin-bottom:12px">● ${achieved.length} ACHIEVED</div>`:''}
    ${achieved.map(m=>`<div class="card mb8" style="border-left:2px solid var(--grn);opacity:.8">
      <div class="flex" style="justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:13px;color:var(--grn)">✓ ${m.label}</div>
          ${m.achievedDate?`<div style="font-size:9px;color:var(--mut);margin-top:2px">Achieved ${m.achievedDate}</div>`:''}
        </div>
        <div style="font-size:12px;color:var(--grn);font-weight:bold">${m.debtFree?'DEBT FREE':fmt$(m.target)}</div>
      </div>
    </div>`).join('')}
    ${upcoming.length?`<div style="font-size:9px;color:var(--mut);letter-spacing:2px;margin:14px 0 10px">UPCOMING</div>`:''}
    ${upcoming.map(m=>{
      const pct=m.debtFree?(totalDebts<=0?100:Math.max(0,100-Math.round((totalDebts/Math.max(totalAssets,1))*100))):nw>0?Math.min(100,Math.round((nw/m.target)*100)):0;
      const remaining=m.debtFree?totalDebts:Math.max(0,m.target-nw);
      return`<div class="card bdr-l mb8">
        <div class="flex" style="justify-content:space-between;margin-bottom:8px">
          <div style="font-size:12px">${m.label}</div>
          <div style="font-size:11px;font-weight:bold;color:var(--acc)">${m.debtFree?'DEBT FREE':fmt$(m.target)}</div>
        </div>
        <div class="prog mb6"><div class="prog-fill" style="width:${pct}%;background:${pct>80?'var(--grn)':pct>40?'var(--acc)':'var(--blu)'}"></div></div>
        <div class="flex" style="justify-content:space-between;font-size:9px;color:var(--mut)">
          <span>${pct}% there</span>
          <span>${m.debtFree?`${fmt$(remaining)} to pay off`:`${fmt$(remaining)} to go`}</span>
        </div>
      </div>`;
    }).join('')}
    <button class="btn-ghost mt14" style="width:100%;border:1px dashed var(--bdrh)" onclick="addCustomMilestone()">+ Custom Milestone</button>
  </div>`;
}
let _showMsForm=false,_msForm={label:'',target:''};

  _showMsForm=true;_msForm={label:'',target:''};renderMilestones();
}

let _retForm={target:'1000000',returnRate:'7',years:'30',monthly:'0'};
function renderRetirement(){
  const {mNet}=getBudgetIncome();
  const activeExp=S.expenses.filter(e=>e.active!==false&&e.frequency!=='one-time');
  const mBal=mNet-activeExp.reduce((s,e)=>s+toMonthly(e),0);
  const totalAssets=S.assets.reduce((s,a)=>s+(parseFloat(a.value)||0),0);
  const totalDebts=S.debts.reduce((s,d)=>s+(parseFloat(d.balance)||0),0);
  const curNW=totalAssets-totalDebts;
  const f=_retForm;

  // Calculate: FV = P*(1+r)^n + PMT*(((1+r)^n - 1)/r)
  const target=parseFloat(f.target)||1000000;
  const r=(parseFloat(f.returnRate)||7)/100/12; // monthly rate
  const n=(parseFloat(f.years)||30)*12;          // months
  const monthly=parseFloat(f.monthly)||0;
  const P=Math.max(0,curNW);
  const fv=P*Math.pow(1+r,n)+monthly*(Math.pow(1+r,n)-1)/r;
  const pct=Math.min(100,Math.round((fv/target)*100));

  // How many months to reach target
  let monthsToTarget=null;
  if(monthly>0||P>0){
    let bal=P,mo=0;
    while(bal<target&&mo<600){bal=bal*(1+r)+monthly;mo++;}
    if(bal>=target)monthsToTarget=mo;
  }

  // Required monthly to hit target in n months
  const reqMonthly=P>0?(target-P*Math.pow(1+r,n))/(((Math.pow(1+r,n)-1)/r)):target/((Math.pow(1+r,n)-1)/r);

  content.innerHTML=`<div class="page">
    <div class="label">Retirement Projection</div>
    <div class="card accent-l mb20">
      <div class="label2">Projected Value in ${f.years||30} Years</div>
      <div style="font-size:32px;font-weight:bold;color:var(--acc);line-height:1;margin-bottom:8px">${fmt$(fv)}</div>
      <div class="prog mb8"><div class="prog-fill" style="width:${pct}%;background:${pct>=100?'var(--grn)':'var(--acc)'}"></div></div>
      <div style="font-size:10px;color:var(--mut)">${pct}% of ${fmt$(target)} target</div>
      ${monthsToTarget?`<div style="font-size:10px;color:var(--grn);margin-top:6px">● Reach target in ~${Math.floor(monthsToTarget/12)}y ${monthsToTarget%12}mo at current pace</div>`:''}
    </div>

    <div class="card mb20">
      <div class="label">Inputs</div>
      <div class="flex gap8 mb10">
        <div class="f1"><div class="label2">Target ($)</div><div class="inp-row"><span class="pre">$</span><input id="ret-target" type="number" min="0" step="10000" value="${f.target}" inputmode="decimal" oninput="_retForm.target=this.value" style="border:none;background:transparent;font-size:15px;padding:7px 4px"></div></div>
        <div class="f1"><div class="label2">Return Rate</div><div class="inp-row"><input id="ret-rate" type="number" min="0" max="30" step="0.5" value="${f.returnRate}" inputmode="decimal" oninput="_retForm.returnRate=this.value" style="border:none;background:transparent;font-size:15px;padding:7px 4px"><span style="padding:0 8px;color:var(--mut)">%</span></div></div>
      </div>
      <div class="flex gap8 mb10">
        <div class="f1"><div class="label2">Time Horizon (yrs)</div><input id="ret-years" type="number" min="1" max="60" value="${f.years}" inputmode="numeric" oninput="_retForm.years=this.value"></div>
        <div class="f1"><div class="label2">Monthly Contribution</div><div class="inp-row"><span class="pre">$</span><input id="ret-monthly" type="number" min="0" step="50" placeholder="0" value="${f.monthly}" inputmode="decimal" oninput="_retForm.monthly=this.value" style="border:none;background:transparent;font-size:15px;padding:7px 4px"></div></div>
      </div>
      <button class="btn-acc" style="width:100%;margin-bottom:10px" onclick="renderRetirement()">Recalculate</button>
      <div style="font-size:9px;color:var(--mut);line-height:1.6">Starting from current net worth ${fmt$(curNW)}. Return rate uses compound monthly growth.</div>
    </div>

    <div class="card bdr-l">
      <div class="label2 mb10">Breakdown</div>
      <div class="row"><span class="rl">Starting Net Worth</span><span class="rr">${fmt$(P)}</span></div>
      <div class="row"><span class="rl">Monthly Contribution</span><span class="rr">${fmt$(monthly)}</span></div>
      <div class="row"><span class="rl">Annual Return Rate</span><span class="rr">${f.returnRate||7}%</span></div>
      <div class="row"><span class="rl">Growth from Returns</span><span class="rr" style="color:var(--grn)">${fmt$(fv-P-monthly*n)}</span></div>

function calc401k(){
  const r=S.retirement401k;
  const{mGross}=getBudgetIncome();
  const annualGross=mGross*12;
  const grossPerCheck=annualGross/26;
  let empPerCheck=0;
  if(r.employeeType==='percent'){empPerCheck=grossPerCheck*(parseFloat(r.employeeAmount)||0)/100;}
  else{empPerCheck=parseFloat(r.employeeAmount)||0;}
  const empAnnual=empPerCheck*26;
  const matchPct=(parseFloat(r.matchFormula)||0)/100;
  const matchCap=(parseFloat(r.matchUpTo)||0)/100;
  const empFrac=grossPerCheck>0?empPerCheck/grossPerCheck:0;
  const actualMatchFrac=Math.min(empFrac,matchCap)*matchPct;
  const matchPerCheck=grossPerCheck*actualMatchFrac;
  const matchAnnual=matchPerCheck*26;
  const totalAnnual=empAnnual+matchAnnual;
  const balance=parseFloat(r.accountBalance)||0;
  const taxRate=parseFloat(S.taxRate)||0;
  const preTaxSaving=r.rothOrPretax==='pretax'?empAnnual*(taxRate/100):0;
  const empPct=empFrac*100;
  return{empPerCheck,empAnnual,matchPerCheck,matchAnnual,totalAnnual,balance,preTaxSaving,empPct,annualGross,grossPerCheck};
}
function estimate401kBalance(){
  // Estimate 401k balance from contribution history in the log.
  // If a balanceAnchor exists, use it as the starting point and
  // only sum contributions from shifts AFTER the anchor date.
  const r=S.retirement401k;
  const empType=r.employeeType||'percent';
  const empAmt=parseFloat(r.employeeAmount)||0;
  const matchPct=(parseFloat(r.matchFormula)||0)/100;
  const matchCap=(parseFloat(r.matchUpTo)||0)/100;
  const rate=parseFloat(S.schedule.hourlyRate)||0;
  const oa=S.schedule.overtimeAfter,om=S.schedule.overtimeMultiplier;

  if(!rate||!empAmt)return{estimated:0,fromAnchor:false,anchor:r.balanceAnchor,contributions:0};

  const anchor=r.balanceAnchor;
  const anchorDate=anchor?.date||null;
  const anchorAmount=parseFloat(anchor?.amount)||0;

  // Sum contributions from all logged shifts (or only after anchor date)
  let totalContrib=0;
  for(const[wkStr,dayMap]of Object.entries(S.log)){
    for(const[dk,sec]of Object.entries(dayMap)){
      if(anchorDate&&dk<=anchorDate)continue; // only count shifts after anchor
      const gross=calcEarnings(sec,rate,oa,om);
      // Per-paycheck gross approximation: treat each shift as a fraction of a paycheck
      // Use gross directly with contribution rate
      let empContrib=0;
      if(empType==='percent'){empContrib=gross*(empAmt/100);}
      else{
        // Flat per paycheck: prorate by shift gross vs expected per-paycheck gross
        const {grossPerCheck}=calc401k();
        empContrib=grossPerCheck>0?(sec/3600/8)*empAmt:0; // rough: per 8h worked
      }
      const empFrac=gross>0?empContrib/gross:0;
      const actualMatchFrac=Math.min(empFrac,matchCap)*matchPct;
      const matchContrib=gross*actualMatchFrac;
      totalContrib+=empContrib+matchContrib;
    }
  }

  // Also add custom shifts after anchor
  for(const cs of S.customShifts){
    if(anchorDate&&cs.date<=anchorDate)continue;
    const csGrossAmt=csGross(cs);
    let empContrib=0;
    if(empType==='percent'){empContrib=csGrossAmt*(empAmt/100);}
    else{const{grossPerCheck}=calc401k();empContrib=grossPerCheck>0?(parseFloat(cs.hours||0)/8)*empAmt:0;}
    const empFrac=csGrossAmt>0?empContrib/csGrossAmt:0;
    const actualMatchFrac=Math.min(empFrac,matchCap)*matchPct;
    totalContrib+=empContrib+csGrossAmt*actualMatchFrac;
  }

  const estimated=anchorAmount+totalContrib;
  return{estimated,fromAnchor:!!anchor,anchor,contributions:totalContrib};
}

function sync401kAsset(balance){

}

  const oa=parseFloat(S.schedule.overtimeAfter)||8;

  // Collect daily spend from transactions + paid one-time expenses
  const dailySpend={};
  S.transactions.forEach(t=>{
    if(!t.date)return;
    const d=parseLocal(t.date);
    if(d<thirtyDaysAgo||d>now)return;
    const amt=parseFloat(t.amount)||0;
    if(amt>=0&&!((t.type||'').toLowerCase()==='purchase'||(t.type||'').toLowerCase()==='direct debit'))return;
    const dk=localStr(d);
    dailySpend[dk]=(dailySpend[dk]||0)+Math.abs(amt);
  });

  // Also include paid one-time expenses from the period
  S.expenses.filter(e=>e.paid&&e.frequency==='one-time'&&e.oneTimeDate).forEach(e=>{
    const d=parseLocal(e.oneTimeDate);
    if(d<thirtyDaysAgo||d>now)return;
    const dk=e.oneTimeDate;
    dailySpend[dk]=(dailySpend[dk]||0)+(parseFloat(e.amount)||0);
  });

  const days=[];
  for(let i=29;i>=0;i--){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const dk=localStr(d);
    days.push({date:dk,day:d.getDate(),dow:d.getDay(),spend:dailySpend[dk]||0});
  }

  const totalSpend=days.reduce((s,d)=>s+d.spend,0);
  if(totalSpend<=0)return'';

  const avgDaily=totalSpend/30;
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const dayOfMonth=now.getDate();
  const spentThisMonth=days.filter(d=>parseLocal(d.date).getMonth()===now.getMonth()).reduce((s,dd)=>s+dd.spend,0);
  const projectedMonthly=dayOfMonth>0?(spentThisMonth/dayOfMonth)*daysInMonth:0;
  const maxDay=Math.max(...days.map(d=>d.spend),1);

  // Category velocity (top 5 from last 30 days)
  const catSpend={};
  S.transactions.forEach(t=>{
    if(!t.date)return;
    const d=parseLocal(t.date);
    if(d<thirtyDaysAgo||d>now)return;
    const amt=parseFloat(t.amount)||0;
    if(amt>=0&&!((t.type||'').toLowerCase()==='purchase'||(t.type||'').toLowerCase()==='direct debit'))return;
    const c=t.category||'custom';
    catSpend[c]=(catSpend[c]||0)+Math.abs(amt);
  });
  const topCats=Object.entries(catSpend).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Build SVG spark chart
  const W=10,G=1,H=40,TW=days.length*(W+G)-G;

  let h='<div class="mb20">';
  h+='<div class="label">Spending Velocity</div>';

  // Stat boxes
  h+='<div class="stat-row mb12">';
  h+='<div class="stat-box" style="border-top:2px solid var(--red)"><div class="sl">Daily Avg</div><div class="sv" style="color:var(--red)">'+fmt$(avgDaily)+'</div></div>';
  h+='<div class="stat-box" style="border-top:2px solid var(--org)"><div class="sl">'+MONTHS[now.getMonth()]+' Pace</div><div class="sv" style="color:var(--org)">'+fmt$(projectedMonthly)+'</div></div>';
  h+='<div class="stat-box" style="border-top:2px solid var(--acc)"><div class="sl">30-Day Total</div><div class="sv">'+fmt$(totalSpend)+'</div></div>';
  h+='</div>';

  // Bar chart — daily spend bars
  h+='<svg viewBox="0 0 '+TW+' '+(H+14)+'" style="width:100%;display:block;margin-bottom:8px">';
  // Average line
  const avgY=H-Math.max(1,(avgDaily/maxDay)*H);
  h+='<line x1="0" y1="'+avgY+'" x2="'+TW+'" y2="'+avgY+'" stroke="var(--org)" stroke-width="0.5" stroke-dasharray="3,2" opacity="0.6"/>';

  days.forEach((d,i)=>{
    const bh=Math.max(0,(d.spend/maxDay)*H);
    const x=i*(W+G),y=H-bh;
    const isWeekend=d.dow===0||d.dow===6;
    const isToday=i===days.length-1;
    const fill=isToday?'var(--acc)':d.spend>avgDaily*1.5?'var(--red)':isWeekend?'rgba(196,160,255,0.5)':'rgba(255,107,122,0.4)';
    h+='<rect x="'+x+'" y="'+y+'" width="'+W+'" height="'+Math.max(0.5,bh)+'" fill="'+fill+'" rx="1"/>';
    // Show day number every 5th day
    if(i%5===0||isToday)h+='<text x="'+(x+W/2)+'" y="'+(H+10)+'" text-anchor="middle" fill="var(--mut)" font-size="5" font-family="monospace">'+d.day+'</text>';
  });
  h+='</svg>';

  // Legend
  h+='<div class="flex gap10" style="justify-content:center;margin-bottom:12px">';
  h+='<div style="display:flex;align-items:center;gap:3px;font-size:7px;color:var(--mut)"><div style="width:8px;height:1px;background:var(--org);border-top:1px dashed var(--org)"></div>avg</div>';
  h+='<div style="display:flex;align-items:center;gap:3px;font-size:7px;color:var(--mut)"><div style="width:8px;height:5px;background:rgba(255,107,122,0.4);border-radius:1px"></div>weekday</div>';
  h+='<div style="display:flex;align-items:center;gap:3px;font-size:7px;color:var(--mut)"><div style="width:8px;height:5px;background:rgba(196,160,255,0.5);border-radius:1px"></div>weekend</div>';
  h+='<div style="display:flex;align-items:center;gap:3px;font-size:7px;color:var(--mut)"><div style="width:8px;height:5px;background:var(--red);border-radius:1px"></div>high</div>';
  h+='</div>';

  // Category velocity — top 5
  if(topCats.length){
    h+='<div style="font-size:8px;letter-spacing:2px;color:var(--mut);margin-bottom:6px">CATEGORY VELOCITY (30 DAYS)</div>';
    topCats.forEach(([catId,amt])=>{
      const cat=catById[catId]||CATS[CATS.length-1];
      const dailyAvg=amt/30;
      const moProj=dailyAvg*daysInMonth;
      const envLimit=S.envelopes[catId]||0;
      const pct=envLimit>0?Math.round((moProj/envLimit)*100):0;
      h+='<div style="margin-bottom:6px">';
      h+='<div class="flex" style="justify-content:space-between;margin-bottom:2px">';
      h+='<span style="font-size:10px"><span style="color:'+cat.color+'">'+cat.icon+'</span> '+cat.label+'</span>';
      h+='<span style="font-size:9px;color:var(--mut)">'+fmt$(dailyAvg)+'/day → '+fmt$(moProj)+'/mo'+(envLimit>0?' ('+pct+'%)':'')+'</span>';
      h+='</div>';
      if(envLimit>0){
        h+='<div class="prog"><div class="prog-fill" style="width:'+Math.min(100,pct)+'%;background:'+(pct>100?'var(--red)':pct>80?'var(--org)':cat.color)+'"></div></div>';
      }
      h+='</div>';
    });
  }
  h+='</div>';
  return h;
}

// The AI prompt for the user to copy
const TX_IMPORT_PROMPT=`You are a bank statement parser. I will attach or paste a bank statement (PDF, image, or text). Extract every real transaction and output lines in this exact format with NO other text:

For money RECEIVED (deposits, paychecks, refunds, credits, interest):
TX+>YYYY-MM-DD|amount|category|description

For money SPENT (purchases, payments, withdrawals, debits):
TX->YYYY-MM-DD|amount|category|description

Every transaction line MUST start with either TX+> or TX-> — this is required. Amount is always a positive number (the prefix handles the sign). No $ sign, no commas in amount.

Rules:
- YYYY-MM-DD: transaction date, 4-digit year
- amount: always positive plain number. Examples: 16.71, 333.53, 9.99
- category: MUST be exactly one of: housing, utilities, groceries, transport, phone, internet, streaming, insurance, gym, debt, savings, dining, entertain, medical, personal, clothing, income, transfer, custom
- description: short clean merchant/payee name. Strip card numbers, bank codes, phone numbers, state abbreviations, and raw merchant IDs. Examples: "Shell" not "SHELL57544208705 WEYERS CAVE VA", "Spotify" not "SPOTIFY 877 778 1161 NY", "Amazon Payroll" not "AMAZON.COM SVCS PAYROLL"

Category guidance:
- income: paychecks, direct deposits, payroll, tax refunds, interest earned, cash bonuses
- transfer: internal bank transfers, Zelle, Cash App, Venmo, PayPal sends, savings transfers, paycheck percentage transfers
- transport: gas stations (Shell, Sheetz, BP, Exxon), car maintenance, parking, tolls, Uber, Lyft
- debt: credit card payments (Capital One, Chase, Discover), loan payments, Affirm, Klarna, Afterpay, collections, Flexible Finance
- savings: transfers specifically labeled as savings deposits
- groceries: Food Lion, Walmart, Kroger, Aldi, supermarkets
- dining: restaurants, fast food, DoorDash, Uber Eats, GrubHub, coffee shops
- utilities: electric, gas (Columbia Gas, Dominion), water, sewer
- phone: phone bills, US Mobile, T-Mobile, Verizon, AT&T
- internet: internet service providers, Comcast, Spectrum
- streaming: Netflix, Hulu, Spotify, YouTube Premium, Disney+, Audible, Snapchat subscriptions
- insurance: Progressive, GEICO, State Farm, MetLife, health/dental/vision/pet insurance
- medical: hospitals, clinics, vet/animal clinics, pharmacies, CVS, Walgreens
- gym: gym memberships, fitness classes, Peloton
- housing: rent, mortgage, HOA
- personal: haircuts, beauty, vape shops, tobacco
- clothing: clothing stores, shoes, accessories
- entertain: movies, gaming, concerts, amusement, ticketing
- custom: anything that doesn't clearly fit above (subscriptions like Acorns, misc purchases)

SKIP these — do NOT output them:
- Opening/closing balance lines
- Rejected/failed withdrawal attempts
- Lines that are just running balance or account summary info
- Page headers, footers, statement metadata

Output ONLY TX+> and TX-> lines, one per transaction. No blank lines, no commentary, no markdown.`;

// Parse AI-formatted output — only lines starting with TX+> or TX-> are transactions
function parseImportText(raw){
  const validCats=new Set(['housing','utilities','groceries','transport','phone','internet','streaming','insurance','gym','debt','savings','dining','entertain','medical','personal','clothing','income','transfer','custom']);
  const lines=raw.trim().split('\n').filter(l=>l.trim());
  const rows=[];

  for(const line of lines){
    const trimmed=line.trim();
    // Only process lines starting with TX+> or TX->
    let sign=0;
    if(trimmed.startsWith('TX+>'))sign=1;
    else if(trimmed.startsWith('TX->'))sign=-1;
    else continue;
    const payload=trimmed.slice(4); // strip 4-char prefix

    const parts=payload.split('|');
    if(parts.length<4)continue;

    const[dateStr,amtStr,cat,...descParts]=parts;
    const date=dateStr.trim();
    if(!/^\d{4}-\d{2}-\d{2}$/.test(date))continue;

    const amtClean=amtStr.trim().replace(/[\s$,\-+]/g,'');
    let amount=parseFloat(amtClean);
    if(isNaN(amount)||amount===0)continue;

    // Apply sign from prefix
    amount=sign*amount;

    const category=cat.trim().toLowerCase();
    const description=descParts.join('|').trim();

    // Derive type for backward compat
    let type='';
    if(amount>0)type='deposit';
    else type='purchase';
    if(category==='transfer')type=amount>0?'deposit':'transfer';

    const finalCat=validCats.has(category)?category:'custom';

    rows.push({date,description,amount,type,category:finalCat,raw:line});
  }
  return rows;
}

        <button class="btn-ghost" onclick="_txWizard.step='history';renderTransactions()">View All</button>
      </div>

function copyTxPrompt(){
  navigator.clipboard.writeText(TX_IMPORT_PROMPT).then(()=>{
    const btn=document.getElementById('copy-prompt-btn');
    if(btn){btn.textContent='✓ Copied!';setTimeout(()=>{btn.textContent='📋 Copy Prompt to Clipboard';},2000);}
  }).catch(()=>{
    // Fallback: show prompt in a textarea for manual copy
    const ta=document.createElement('textarea');
    ta.value=TX_IMPORT_PROMPT;ta.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;font-size:11px;padding:16px';
    document.body.appendChild(ta);ta.select();
    const close=document.createElement('button');
    close.textContent='✕ Close';close.style.cssText='position:fixed;top:8px;right:8px;z-index:10000;padding:8px 16px;background:var(--acc);color:#000;border:none;border-radius:8px;font-size:12px';
    close.onclick=()=>{ta.remove();close.remove();};
    document.body.appendChild(close);

function handleTxPaste(){
  const ta=document.getElementById('tx-paste');
  if(!ta||!ta.value.trim())return;
  _txWizard.rawText=ta.value;
  processTxRaw();
}

function processTxRaw(){
  const rows=parseImportText(_txWizard.rawText);
  if(!rows.length){
    const t=document.getElementById('save-toast'),m=document.getElementById('toast-msg');if(t&&m){t.classList.remove('manual');t.classList.add('manual');m.textContent='No TX+> or TX-> lines found';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),4000);}
    return;
  }

  // Deduplicate against existing transactions
  const existing=new Set(S.transactions.map(t=>t.date+'|'+t.amount+'|'+t.description));
  const newOnes=rows.filter(r=>!existing.has(r.date+'|'+r.amount+'|'+r.description));

  if(!newOnes.length){
    const t2=document.getElementById('save-toast'),m2=document.getElementById('toast-msg');if(t2&&m2){t2.classList.remove('manual');t2.classList.add('manual');m2.textContent='All '+rows.length+' transactions already imported';t2.classList.add('show');setTimeout(()=>t2.classList.remove('show'),4000);}
    return;
  }

  // Build transaction objects and import directly
  const txns=newOnes.map(r=>({
    id:Date.now().toString()+Math.random().toString(36).slice(2,8),
    date:r.date,
    description:r.description,
    amount:r.amount,
    category:r.category,
    type:r.type,
    imported:true,
    source:'ai-import',
  }));

  S.transactions=[...S.transactions,...txns];
  save('transactions');

  _txWizard.parsedRows=txns;
  _txWizard.step='summary';
  renderTransactions();
}

function delTx(id){S.transactions=S.transactions.filter(t=>t.id!==id);save('transactions');renderTransactions();}
