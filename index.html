function exportCSV(){
  const rate=parseFloat(S.schedule.hourlyRate)||0,oa=S.schedule.overtimeAfter,om=S.schedule.overtimeMultiplier,otMode=S.schedule.overtimeMode;
  const rows=[['Week Start','Hours','Gross','Deductions','Est Net','Actual','Date Received','Variance']];
  const seenWks=new Set();
  Object.entries(S.log).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([wk,dm])=>{
    seenWks.add(wk);
    const sec=Object.values(dm).reduce((a,b)=>a+b,0);
    const ptoSec=S.pto[wk]?Object.values(S.pto[wk]).reduce((a,b)=>a+b,0):0;
    const totalHrs=(sec+ptoSec)/3600;
    const cg=csInWeek(wk);
    const g=weekGross(dm,'__x__',0,rate,oa,om,otMode,cg,csCoveredDays(wk),S.pto[wk]);
    const ded=g-applyDed(g,S.deductions),net=g-ded;
    const pc=S.paychecks[wk];
    rows.push([wk,totalHrs.toFixed(2),g.toFixed(2),ded.toFixed(2),net.toFixed(2),pc?.amount||'',pc?.date||'',pc?.amount?(pc.amount-net).toFixed(2):'']);
  });
  // Include weeks that only have custom shifts or PTO (no log entries)
  for(const cs of S.customShifts){
    const wk=localStr(getWeekStart(parseLocal(cs.date),S.schedule.weekStartDay,S.schedule.weekStartTime));
    if(seenWks.has(wk))continue;
    seenWks.add(wk);
    const cg=csInWeek(wk);
    const ptoSec=S.pto[wk]?Object.values(S.pto[wk]).reduce((a,b)=>a+b,0):0;
    const ptoEarn=(ptoSec/3600)*rate;
    const g=cg.reduce((s,c)=>s+csGross(c),0)+ptoEarn;
    const ded=g-applyDed(g,S.deductions),net=g-ded;
    const pc=S.paychecks[wk];
    rows.push([wk,(ptoSec/3600).toFixed(2),g.toFixed(2),ded.toFixed(2),net.toFixed(2),pc?.amount||'',pc?.date||'',pc?.amount?(pc.amount-net).toFixed(2):'']);
  }
  // Include weeks that only have PTO (no log or custom shifts)
  for(const wk of Object.keys(S.pto)){
    if(seenWks.has(wk))continue;
    seenWks.add(wk);
    const ptoSec=Object.values(S.pto[wk]).reduce((a,b)=>a+b,0);
    const ptoEarn=(ptoSec/3600)*rate;
    const ded=ptoEarn-applyDed(ptoEarn,S.deductions),net=ptoEarn-ded;
    const pc=S.paychecks[wk];
    rows.push([wk,(ptoSec/3600).toFixed(2),ptoEarn.toFixed(2),ded.toFixed(2),net.toFixed(2),pc?.amount||'',pc?.date||'',pc?.amount?(pc.amount-net).toFixed(2):'']);
  }
  rows.sort((a,b)=>a===rows[0]?-1:b===rows[0]?1:a[0].localeCompare(b[0]));
  const csv=rows.map(r=>r.join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='pay-ledger.csv';a.click();URL.revokeObjectURL(url);
}

// ─── Quick Add FAB ──────────────────────────────────────────────────────────
let _fabOpen=false,_fabPanelOpen=false;
function toggleFab(){
  _fabOpen=!_fabOpen;
  document.getElementById('fab-btn').classList.toggle('open',_fabOpen);
  document.getElementById('fab-menu').classList.toggle('open',_fabOpen);
  if(!_fabOpen)closeFabPanel();
}
function closeFab(){
  _fabOpen=false;
  document.getElementById('fab-btn').classList.toggle('open',false);
  document.getElementById('fab-menu').classList.toggle('open',false);
}
function openFabPanel(type){
  closeFab();
  _fabPanelOpen=true;
  const panel=document.getElementById('fab-panel');
  panel.classList.add('open');
  if(type==='shift')renderFabShift(panel);
  else renderFabExpense(panel);
}
function closeFabPanel(){
  _fabPanelOpen=false;
  const panel=document.getElementById('fab-panel');
  panel.classList.remove('open');
  panel.innerHTML='';
}

let _fabShift={label:'',date:todayStr(),type:'hourly',hours:'',rate:'',gross:''};
function fabShiftType(t){_fabShift.type=t;renderFabShift(document.getElementById('fab-panel'));}
function renderFabShift(panel){
  const defRate=String(parseFloat(S.schedule.hourlyRate)||'');
  if(!_fabShift.rate)_fabShift.rate=defRate;
  let previewGross=0;
  if(_fabShift.type==='hourly')previewGross=(parseFloat(_fabShift.hours)||0)*(parseFloat(_fabShift.rate)||0);
  else previewGross=parseFloat(_fabShift.gross)||0;
  const isH=_fabShift.type==='hourly';
  let h='<div style="margin-bottom:6px">';
  h+='<div class="flex" style="justify-content:space-between;align-items:center;margin-bottom:12px">';
  h+='<div class="label" style="margin:0;color:var(--pur)">\u25C9 Log Shift</div>';
  h+='<button class="btn-ghost btn-sm" onclick="closeFabPanel()">\u2715</button></div>';
  h+='<div class="form-row">';
  h+='<div><div class="label2">Label</div><input id="fab-cs-label" placeholder="e.g. OT Saturday" value="'+_fabShift.label+'" oninput="_fabShift.label=this.value"></div>';
  h+='<div><div class="label2">Date</div><input type="date" id="fab-cs-date" value="'+_fabShift.date+'" onchange="_fabShift.date=this.value"></div>';
  h+='</div>';
  h+='<div class="flex gap8 mb10">';
  h+='<button style="flex:1;padding:7px;border:1px solid '+(isH?'var(--pur)':'var(--bdr)')+';background:'+(isH?'var(--purd)':'transparent')+';color:'+(isH?'var(--pur)':'var(--mut)')+'" onclick="fabShiftType(&quot;hourly&quot;)">Hourly</button>';
  h+='<button style="flex:1;padding:7px;border:1px solid '+(!isH?'var(--pur)':'var(--bdr)')+';background:'+(!isH?'var(--purd)':'transparent')+';color:'+(!isH?'var(--pur)':'var(--mut)')+'" onclick="fabShiftType(&quot;flat&quot;)">Flat Amount</button>';
  h+='</div>';
  if(isH){
    h+='<div class="form-row"><div><div class="label2">Hours</div><input id="fab-cs-hrs" type="number" inputmode="decimal" min="0" step=".25" placeholder="8.0" value="'+_fabShift.hours+'" oninput="_fabShift.hours=this.value"></div>';
    h+='<div><div class="label2">Rate ($/hr)</div><div class="inp-row"><span class="pre">$</span><input id="fab-cs-rate" type="number" inputmode="decimal" min="0" step=".25" placeholder="'+defRate+'" value="'+_fabShift.rate+'" oninput="_fabShift.rate=this.value" style="border:none;background:transparent;font-size:14px;padding:7px 4px"></div></div></div>';
  } else {
    h+='<div class="mb10"><div class="label2">Gross Pay</div><div class="inp-row"><span class="pre" style="font-size:16px">$</span><input id="fab-cs-gross" type="number" min="0" step=".01" inputmode="decimal" placeholder="0.00" value="'+_fabShift.gross+'" oninput="_fabShift.gross=this.value" style="border:none;background:transparent;font-size:20px;padding:8px 4px"></div></div>';
  }
  if(previewGross>0) h+='<div style="font-size:11px;color:var(--pur);margin-bottom:10px">\u2192 '+fmt$(previewGross)+' gross</div>';
  h+='<div class="flex gap8">';
  h+='<button class="btn-acc f1" style="background:var(--pur)" onclick="saveFabShift()">Save Shift</button>';
  h+='<button class="btn-ghost" onclick="closeFabPanel()">Cancel</button>';
  h+='</div></div>';
  panel.innerHTML=h;
}
function saveFabShift(){
  const f=_fabShift;
  if(!f.date)return;
  if(f.type==='hourly'&&(!f.hours||!f.rate))return;
  if(f.type==='flat'&&!f.gross)return;
  purgeLogDay(f.date);
  S.customShifts=[...S.customShifts,{...f,id:Date.now().toString()}];
  save('customShifts');
  _fabShift={label:'',date:todayStr(),type:'hourly',hours:'',rate:String(parseFloat(S.schedule.hourlyRate)||''),gross:''};
  closeFabPanel();showToast(true);render();
}

let _fabExpCat='custom';
function fabExpCat(c){_fabExpCat=c;renderFabExpense(document.getElementById('fab-panel'));}
function fabSetAcct(id){
  S.lastFabAccount=id;
  save('lastFabAccount');
  renderFabExpense(document.getElementById('fab-panel'));
}
function renderFabExpense(panel){
  // Deductible accounts: checking + savings assets
  const acctAssets=S.assets.filter(a=>a.type==='checking'||a.type==='savings');
  // Auto-pick default on first open: remembered > first checking > first savings
  if(S.lastFabAccount===''&&acctAssets.length){
    const defChk=acctAssets.find(a=>a.type==='checking');
    S.lastFabAccount=(defChk||acctAssets[0]).id;
  }
  let h='<div style="margin-bottom:6px">';
  h+='<div class="flex" style="justify-content:space-between;align-items:center;margin-bottom:12px">';
  h+='<div class="label" style="margin:0;color:var(--red)">\u2212$ Quick Expense</div>';
  h+='<button class="btn-ghost btn-sm" onclick="closeFabPanel()">\u2715</button></div>';
  h+='<div class="flex gap8 mb10">';
  h+='<div class="f1"><div class="label2">Amount</div><div class="inp-row"><span class="pre">$</span>';
  h+='<input id="fab-exp-amt" type="number" min="0" step=".01" inputmode="decimal" placeholder="0.00" style="border:none;background:transparent;font-size:18px;padding:8px 4px"></div></div>';
  h+='<div class="f1"><div class="label2">Description</div><input id="fab-exp-desc" placeholder="e.g. Coffee, Gas"></div>';
  h+='</div>';
  h+='<div class="label2">Category</div>';
  h+='<div class="chips mb10">';
  for(let ci=0;ci<Math.min(CATS.length,10);ci++){
    const c=CATS[ci];
    const act=_fabExpCat===c.id;
    h+='<button class="chip'+(act?' active':'')+'" style="'+(act?'border-color:'+c.color+';background:'+c.color+'22;color:'+c.color:'color:var(--mut)')+'" onclick="fabExpCat(&quot;'+c.id+'&quot;)">'+c.icon+' '+c.label+'</button>';
  }
  h+='</div>';
  if(acctAssets.length){
    h+='<div class="label2">Deduct from Account</div>';
    h+='<div class="chips mb10">';
    const noneAct=!S.lastFabAccount;
    h+='<button class="chip'+(noneAct?' active':'')+'" style="'+(noneAct?'border-color:var(--mut);background:var(--surf2);color:var(--txt)':'color:var(--mut)')+'" onclick="fabSetAcct(&quot;&quot;)">None</button>';
    for(const a of acctAssets){
      const act2=S.lastFabAccount===a.id;
      const tc=a.type==='checking'?'#5baae8':'#4dba6e';
      h+='<button class="chip'+(act2?' active':'')+'" style="'+(act2?'border-color:'+tc+';background:'+tc+'22;color:'+tc:'color:var(--mut)')+'" onclick="fabSetAcct(&quot;'+a.id+'&quot;)">'+a.label+' \u2014 '+fmt$(parseFloat(a.value)||0)+'</button>';
    }
    h+='</div>';
  }
  h+='<div class="flex gap8">';
  h+='<button class="btn-acc f1" onclick="saveFabExpense()">Add Expense</button>';
  h+='<button class="btn-ghost" onclick="closeFabPanel()">Cancel</button>';
  h+='</div></div>';
  panel.innerHTML=h;
}
function saveFabExpense(){
  const amt=parseFloat(document.getElementById('fab-exp-amt')?.value);
  const desc=document.getElementById('fab-exp-desc')?.value||'Manual entry';
  if(!amt)return;
  const txId=Date.now().toString();
  S.transactions=[...S.transactions,{id:txId,date:todayStr(),description:desc,amount:-Math.abs(amt),category:_fabExpCat,type:'purchase',imported:false}];
  save('transactions');
  S.expenses=[...S.expenses,{id:'fab-'+txId,label:desc,category:_fabExpCat,customCategory:'',amount:String(Math.abs(amt)),frequency:'one-time',oneTimeDate:todayStr(),dayOfMonth:'',active:true,paid:true,archived:false,accountId:S.lastFabAccount||''}];
  save('expenses');
  // Deduct from chosen account if selected
  if(S.lastFabAccount){
    const acct=S.assets.find(a=>a.id===S.lastFabAccount);
    if(acct){
      const prev=parseFloat(acct.value)||0;
      S.assets=S.assets.map(a=>a.id===acct.id?{...a,prevValue:String(prev),value:String(prev-Math.abs(amt)),updatedDate:todayStr()}:a);
      save('assets');
    }
  }
  _fabExpCat='custom';
  closeFabPanel();showToast(true);
}
