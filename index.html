<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ledge">
<meta name="theme-color" content="#080a14">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Ledge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@300;400;500&display=swap');

:root{
  /* Deep space base */
  --bg:#07080f;
  --bg2:#0b0d18;

  /* Glass surfaces — translucent layered */
  --surf:rgba(255,255,255,0.055);
  --surf2:rgba(255,255,255,0.032);
  --surf3:rgba(255,255,255,0.08);
  --surf-solid:#0e1120;

  /* Borders — barely-there glass edges */
  --bdr:rgba(255,255,255,0.09);
  --bdrh:rgba(255,255,255,0.18);
  --bdr-glow:rgba(120,160,255,0.22);

  /* Accent — liquid iridescent blue-white */
  --acc:#a8c7ff;
  --acc2:#7eb4ff;
  --accd:rgba(168,199,255,0.12);
  --acc-glow:rgba(168,199,255,0.35);

  /* Semantic colors — luminous glass tints */
  --grn:#5de8a0;  --grnd:rgba(93,232,160,0.1);
  --red:#ff6b7a;  --redd:rgba(255,107,122,0.1);
  --org:#ffad6b;  --orgd:rgba(255,173,107,0.1);
  --blu:#7eb4ff;  --blud:rgba(126,180,255,0.1);
  --pur:#c4a0ff;  --purd:rgba(196,160,255,0.1);
  --cya:#6be8e8;

  /* Text */
  --txt:rgba(255,255,255,0.92);
  --txt2:rgba(255,255,255,0.6);
  --mut:rgba(255,255,255,0.35);
  --mut2:rgba(255,255,255,0.15);

  /* Glass effects */
  --glass-blur:blur(24px) saturate(180%);
  --glass-blur-sm:blur(12px) saturate(160%);
  --shadow-card:0 4px 24px rgba(0,0,0,0.3),0 1px 0 rgba(255,255,255,0.06) inset;

  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);

  --radius:16px;
  --radius-sm:10px;
  --radius-xs:7px;
}

/* ── Theme: AMOLED / True Black ────────────────────── */
[data-theme="amoled"]{
  --bg:#000000;
  --bg2:#000000;
  --surf:rgba(255,255,255,0.045);
  --surf2:rgba(255,255,255,0.025);
  --surf3:rgba(255,255,255,0.07);
  --surf-solid:#080808;
  --bdr:rgba(255,255,255,0.07);
  --bdrh:rgba(255,255,255,0.14);
  --shadow-card:0 2px 12px rgba(0,0,0,0.6),0 1px 0 rgba(255,255,255,0.04) inset;
}
[data-theme="amoled"] body,
[data-theme="amoled"] html{background:#000000!important}
[data-theme="amoled"] body::before{
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(var(--acc-rgb,168,199,255),0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 85% 30%, rgba(var(--acc-rgb,168,199,255),0.05) 0%, transparent 55%),
    linear-gradient(160deg,#000 0%,#000 100%)!important;
}
[data-theme="amoled"] #app-switch{background:rgba(0,0,0,0.85)}
[data-theme="amoled"] #bottom-nav{background:rgba(0,0,0,0.85)}
[data-theme="amoled"] #splash{background:#000!important}

/* ── Theme: Light ──────────────────────────────────── */
[data-theme="light"]{
  --bg:#f0f2f7;
  --bg2:#e8eaf0;
  --surf:rgba(255,255,255,0.75);
  --surf2:rgba(255,255,255,0.55);
  --surf3:rgba(255,255,255,0.85);
  --surf-solid:#ffffff;
  --bdr:rgba(0,0,0,0.08);
  --bdrh:rgba(0,0,0,0.15);
  --bdr-glow:rgba(var(--acc-rgb,168,199,255),0.3);
  --txt:rgba(0,0,0,0.88);
  --txt2:rgba(0,0,0,0.55);
  --mut:rgba(0,0,0,0.35);
  --mut2:rgba(0,0,0,0.15);
  --grn:#1a9956;  --grnd:rgba(26,153,86,0.1);
  --red:#d93025;  --redd:rgba(217,48,37,0.1);
  --org:#e67700;  --orgd:rgba(230,119,0,0.1);
  --blu:#1a73e8;  --blud:rgba(26,115,232,0.1);
  --pur:#8430ce;  --purd:rgba(132,48,206,0.1);
  --cya:#0d7377;
  --glass-blur:blur(20px) saturate(140%);
  --glass-blur-sm:blur(10px) saturate(120%);
  --shadow-card:0 2px 8px rgba(0,0,0,0.06),0 1px 0 rgba(255,255,255,0.8) inset;
}
[data-theme="light"] body,
[data-theme="light"] html{background:#f0f2f7!important}
[data-theme="light"] body::before{
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(var(--acc-rgb,168,199,255),0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 85% 30%, rgba(var(--acc-rgb,168,199,255),0.08) 0%, transparent 55%),
    linear-gradient(160deg,#f0f2f7 0%,#e8eaf0 50%,#f0f2f7 100%)!important;
}
[data-theme="light"] #app-switch{background:rgba(240,242,247,0.8)}
[data-theme="light"] #bottom-nav{background:rgba(240,242,247,0.85)}
[data-theme="light"] #data-panel{background:rgba(240,242,247,0.95)}
[data-theme="light"] #fab-panel{background:rgba(240,242,247,0.97)}
[data-theme="light"] #pin-overlay{background:rgba(240,242,247,0.98)}
[data-theme="light"] #splash{background:#f0f2f7!important}
[data-theme="light"] select option{background:#fff;color:rgba(0,0,0,0.88)}
[data-theme="light"] input,
[data-theme="light"] select,
[data-theme="light"] textarea{background:rgba(0,0,0,0.03);border-color:rgba(0,0,0,0.1)}
[data-theme="light"] input:focus,
[data-theme="light"] select:focus,
[data-theme="light"] textarea:focus{border-color:rgba(var(--acc-rgb,168,199,255),0.5);box-shadow:0 0 0 3px rgba(var(--acc-rgb,168,199,255),0.1);background:rgba(var(--acc-rgb,168,199,255),0.04)}
[data-theme="light"] .inp-row{background:rgba(0,0,0,0.03);border-color:rgba(0,0,0,0.1)}
[data-theme="light"] .tab-row{background:rgba(0,0,0,0.04)}
[data-theme="light"] .tab-row button.active{color:#fff}
[data-theme="light"] .btn-acc{color:#fff}
[data-theme="light"] .btn-ghost{background:rgba(255,255,255,0.6);border-color:rgba(0,0,0,0.12)}
[data-theme="light"] .card::before{background:linear-gradient(90deg,transparent,rgba(255,255,255,0.5),transparent)}
[data-theme="light"] .fab-opt{background:rgba(255,255,255,0.9)}
[data-theme="light"] .hdr{background:rgba(240,242,247,0.7)}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

html{
  height: 100%;
  background:#080a14;
}
body{
  height: 100%;
  background:#080a14;
  overflow:hidden;
  font-family:'DM Sans',system-ui,-apple-system,sans-serif;
  color:var(--txt);
  position:fixed;top:0;left:0;right:0;bottom:0;width:100%;
}

/* Animated background — slow shifting nebula */
body::before{
  content:'';
  position:fixed;top:0;left:0;right:0;bottom:0;
  z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(80,120,255,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 85% 30%, rgba(168,100,255,0.12) 0%, transparent 55%),
    radial-gradient(ellipse 70% 50% at 50% 90%, rgba(60,180,255,0.10) 0%, transparent 60%),
    linear-gradient(160deg, #07080f 0%, #0b0d1a 50%, #080c14 100%);
  pointer-events:none;
}

#app-outer{
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;align-items:stretch;justify-content:center;
  background:transparent;
  z-index:1;
}

#app{
  display:flex;flex-direction:column;
  position:fixed;
  top:0;bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;max-width:560px;
  overflow:hidden;
  padding-top:env(safe-area-inset-top,0px);
}

/* ── App Switcher (top) ─────────────────────────────── */
#app-switch{
  display:flex;
  background:rgba(10,12,24,0.7);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border-bottom:1px solid var(--bdr);
  flex-shrink:0;
  position:relative;
  z-index:10;
}
#app-switch::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(168,199,255,0.2),transparent);
}
#app-switch button{
  flex:1;padding:11px 4px 9px;
  background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  font-family:inherit;
  transition:opacity 0.2s;
}
#app-switch button .sw-icon{font-size:16px;color:var(--mut);transition:all 0.25s}
#app-switch button .sw-lbl{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);font-family:'DM Mono',monospace;transition:all 0.25s}
#app-switch button.active .sw-icon{color:var(--acc);filter:drop-shadow(0 0 8px var(--acc-glow))}
#app-switch button.active .sw-lbl{color:var(--acc)}
#app-switch button.active{
  background:linear-gradient(180deg,rgba(168,199,255,0.08) 0%,transparent 100%);
  border-bottom:1.5px solid var(--acc);
}

/* ── Scroll content ─────────────────────────────────── */
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:none;margin-left:40px;transition:margin-left 0.3s ease}
#content.nav-collapsed{margin-left:0}
#content::-webkit-scrollbar{display:none}

/* ── Side Nav (Left Vertical Pill) ──────────────────── */
#bottom-nav{
  position:absolute;
  left:4px;
  bottom:calc(15% + env(safe-area-inset-bottom,0px));
  z-index:9999;
  width:44px;
  /* Glass pill */
  background:rgba(8,10,20,0.72);
  backdrop-filter:blur(28px) saturate(180%);
  -webkit-backdrop-filter:blur(28px) saturate(180%);
  border:1px solid var(--bdr);
  border-radius:26px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5),0 1px 0 rgba(255,255,255,0.06) inset;
  /* No overflow:hidden — it clips the bottom button */
  overflow:visible;
  transition:width 0.3s ease, border-radius 0.3s ease;
}
#bottom-nav.collapsed{
  width:40px;
  border-radius:20px;
}
#bottom-nav::before{
  content:'';position:absolute;top:8px;bottom:8px;right:0;width:1px;
  background:linear-gradient(180deg,transparent,rgba(168,199,255,0.18),transparent);
  pointer-events:none;
}
/* Vertical button column */
#bottom-nav .nav-wrap{
  display:flex;flex-direction:column;
  width:100%;
  border-radius:26px;
  overflow:hidden;
}
#bottom-nav .nav-tabs{
  display:flex;flex-direction:column;
  width:100%;
  align-items:center;
  transition:opacity 0.2s ease, max-height 0.3s ease;
  max-height:400px;
}
#bottom-nav.collapsed .nav-tabs{
  opacity:0;
  pointer-events:none;
  max-height:0;
  overflow:hidden;
}
#bottom-nav .nav-toggle{
  width:100%;
  min-height:40px;
  padding:0 4px;
  background:none;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--mut);
  transition:all 0.2s;
  flex-shrink:0;
}
#bottom-nav .nav-toggle:active{opacity:0.6}
#bottom-nav button{
  width:100%;
  min-height:44px;
  padding:6px 4px;
  background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  font-family:inherit;
  transition:all 0.2s;
  position:relative;
  box-sizing:border-box;
}
#bottom-nav button .n-icon{font-size:18px;color:var(--mut);transition:all 0.25s;line-height:1}
#bottom-nav button .n-lbl{font-size:6px;letter-spacing:1px;text-transform:uppercase;color:var(--mut);font-family:'DM Mono',monospace;transition:all 0.25s;white-space:nowrap}
#bottom-nav button.active .n-icon{color:var(--acc);filter:drop-shadow(0 0 8px var(--acc-glow))}
#bottom-nav button.active .n-lbl{color:var(--acc)}
#bottom-nav button.active{
  background:linear-gradient(90deg,rgba(168,199,255,0.10) 0%,transparent 100%);
  box-shadow:inset 3px 0 0 0 var(--acc), inset 6px 0 12px -4px var(--acc-glow);
}

/* ── Splash ─────────────────────────────────────────── */
#splash{
  position:fixed;top:0;left:0;right:0;bottom:0;
  z-index:99998;
  background:linear-gradient(160deg,#07080f,#0b0d1a);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  font-family:'DM Sans',sans-serif;
  transition:opacity 0.6s ease;
}
#splash.fade{opacity:0;pointer-events:none}
#splash.gone{display:none}
.splash-ring{
  width:52px;height:52px;border-radius:50%;
  border:1.5px solid rgba(168,199,255,0.15);
  border-top-color:var(--acc);
  animation:spin 1s linear infinite;
  filter:drop-shadow(0 0 12px rgba(168,199,255,0.4));
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PIN overlay ────────────────────────────────────── */
#pin-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(160deg,rgba(7,8,15,0.96),rgba(11,13,26,0.98));
  backdrop-filter:blur(40px);
  -webkit-backdrop-filter:blur(40px);
  z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  padding-bottom:env(safe-area-inset-bottom,0px);
  padding-top:env(safe-area-inset-top,0px);
  font-family:'DM Sans',sans-serif;
}
#pin-overlay.hidden{display:none}
.pin-dots{display:flex;gap:14px}
.pin-dot{
  width:13px;height:13px;border-radius:50%;
  border:1.5px solid var(--bdrh);
  background:transparent;
  transition:all 0.2s;
}
.pin-dot.filled{
  background:var(--acc);
  border-color:var(--acc);
  box-shadow:0 0 14px var(--acc-glow);
}
.pin-dot.error{background:var(--red);border-color:var(--red);box-shadow:0 0 14px rgba(255,107,122,0.5)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:248px}
.pin-btn{
  padding:20px;font-size:22px;font-weight:400;
  background:var(--surf);
  backdrop-filter:var(--glass-blur-sm);
  -webkit-backdrop-filter:var(--glass-blur-sm);
  border:1px solid var(--bdr);
  color:var(--txt);border-radius:var(--radius);
  cursor:pointer;letter-spacing:0;
  box-shadow:var(--shadow-card);
  transition:all 0.15s;
  font-family:'DM Sans',sans-serif;
}
.pin-btn:active{
  background:rgba(168,199,255,0.12);
  border-color:var(--bdr-glow);
  transform:scale(0.95);
}

/* ── Toast ──────────────────────────────────────────── */
#save-toast{
  position:fixed;left:50%;transform:translateX(-50%);
  bottom:max(24px,calc(env(safe-area-inset-bottom,0px) + 16px));
  background:rgba(93,232,160,0.12);
  backdrop-filter:var(--glass-blur-sm);
  -webkit-backdrop-filter:var(--glass-blur-sm);
  border:1px solid rgba(93,232,160,0.25);
  color:var(--grn);
  font-size:9px;letter-spacing:2px;
  padding:7px 16px;
  display:flex;align-items:center;gap:7px;
  border-radius:20px;
  opacity:0;transition:opacity 0.3s,transform 0.3s;
  transform:translateX(-50%) translateY(6px);
  pointer-events:none;z-index:100;
  white-space:nowrap;
  font-family:'DM Mono',monospace;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
#save-toast.manual{
  background:rgba(168,199,255,0.1);
  border-color:rgba(168,199,255,0.3);
  color:var(--acc);
}
#save-toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
#save-toast .toast-dot{width:5px;height:5px;border-radius:50%;background:currentColor}

/* ── Page container ─────────────────────────────────── */
.page{padding:16px 16px calc(80px + env(safe-area-inset-bottom,0px)) 20px;max-width:560px;margin:0 auto}
#content.nav-collapsed{--nav-pad:16px;margin-left:0}
#content{--nav-pad:60px}

/* ── Typography ─────────────────────────────────────── */
.label{
  font-size:10px;letter-spacing:2px;
  color:var(--mut);text-transform:uppercase;
  margin-bottom:8px;
  font-family:'DM Mono',monospace;
  font-weight:400;
}
.label2{
  font-size:9px;letter-spacing:1.5px;
  color:var(--mut);text-transform:uppercase;
  margin-bottom:6px;
  font-family:'DM Mono',monospace;
}
.hero{font-size:40px;font-weight:300;color:var(--acc);line-height:1;letter-spacing:-0.5px}
.section{margin-bottom:20px}

/* ── Cards ──────────────────────────────────────────── */
.card{
  background:var(--surf);
  border:1px solid var(--bdr);
  border-radius:var(--radius);
  padding:14px 16px;
  margin-bottom:12px;
  box-shadow:var(--shadow-card);
  position:relative;
  overflow:hidden;
}
/* Apply glass blur only to prominent single cards, not grids */
.card.glass{
  backdrop-filter:var(--glass-blur-sm);
  -webkit-backdrop-filter:var(--glass-blur-sm);
}
/* Specular top edge on cards */
.card::before{
  content:'';position:absolute;top:0;left:8px;right:8px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);
}
.card.accent-l{border-left:2px solid var(--acc);box-shadow:var(--shadow-card),-3px 0 20px rgba(168,199,255,0.08)}
.card.green-l{border-left:2px solid var(--grn);box-shadow:var(--shadow-card),-3px 0 20px rgba(93,232,160,0.08)}
.card.red-l{border-left:2px solid var(--red);box-shadow:var(--shadow-card),-3px 0 20px rgba(255,107,122,0.08)}
.card.blue-l{border-left:2px solid var(--blu);box-shadow:var(--shadow-card),-3px 0 20px rgba(126,180,255,0.08)}
.card.bdr-l{border-left:2px solid var(--bdrh)}

/* ── Form elements ──────────────────────────────────── */
input,select,textarea{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--bdr);
  color:var(--txt);
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  padding:9px 12px;
  outline:none;
  width:100%;
  -webkit-appearance:none;
  border-radius:var(--radius-xs);
  transition:border-color 0.2s,box-shadow 0.2s;
}
input:focus,select:focus,textarea:focus{
  border-color:rgba(168,199,255,0.4);
  box-shadow:0 0 0 3px rgba(168,199,255,0.08);
  background:rgba(168,199,255,0.04);
}
select option{background:#0e1120;color:var(--txt)}
.inp-row{
  display:flex;align-items:center;
  border:1px solid var(--bdr);
  background:rgba(255,255,255,0.04);
  border-radius:var(--radius-xs);
  overflow:hidden;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.inp-row:focus-within{
  border-color:rgba(168,199,255,0.4);
  box-shadow:0 0 0 3px rgba(168,199,255,0.08);
}
.inp-row .pre{
  padding:0 11px;
  color:var(--mut);
  font-size:16px;
  flex-shrink:0;
  border-right:1px solid var(--bdr);
}
.inp-row input{
  border:none;flex:1;
  font-size:18px;padding:9px 8px;
  background:transparent;
  border-radius:0;
  box-shadow:none;
}
.inp-row input:focus{box-shadow:none;border:none}

/* ── Buttons ────────────────────────────────────────── */
button{
  cursor:pointer;
  font-family:'DM Sans',sans-serif;
  font-size:11px;letter-spacing:1px;
  text-transform:uppercase;
  padding:9px 18px;
  border:none;
  background:transparent;
  color:var(--mut);
  border-radius:var(--radius-xs);
  transition:all 0.18s;
  font-weight:500;
}
.btn-acc{
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  color:#07080f;
  font-weight:600;
  box-shadow:0 2px 16px rgba(168,199,255,0.25);
  border-radius:var(--radius-sm);
}
.btn-acc:active{transform:scale(0.97);box-shadow:0 1px 8px rgba(168,199,255,0.2)}
.btn-ghost{
  border:1px solid var(--bdrh);
  color:var(--txt2);
  background:var(--surf);
  backdrop-filter:var(--glass-blur-sm);
  -webkit-backdrop-filter:var(--glass-blur-sm);
}
.btn-ghost:active{background:var(--surf3)}
.btn-red{border:1px solid rgba(255,107,122,0.3);color:var(--red)}
.btn-grn{border:1px solid rgba(93,232,160,0.3);color:var(--grn)}
.btn-sm{font-size:9px;padding:7px 13px;letter-spacing:0.5px;min-height:32px}

/* ── Tabs row ───────────────────────────────────────── */
.tab-row{
  display:flex;
  border:1px solid var(--bdr);
  border-radius:var(--radius-sm);
  margin-bottom:16px;
  background:var(--surf2);
  overflow:hidden;
  padding:3px;
  gap:2px;
}
.tab-row button{
  flex:1;padding:7px 4px;
  background:transparent;border:none;
  font-size:9px;letter-spacing:1px;
  color:var(--mut);font-weight:500;
  border-radius:8px;
  transition:all 0.2s;
  font-family:'DM Mono',monospace;
}
.tab-row button.active{
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  color:#07080f;
  font-weight:600;
  box-shadow:0 2px 10px rgba(168,199,255,0.2);
}

/* ── Rows ───────────────────────────────────────────── */
.row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.row .rl{font-size:12px;color:var(--txt2);letter-spacing:0.2px}
.row .rr{font-size:13px;color:var(--txt)}
.row.bold .rl{color:var(--txt)}
.row.bold .rr{font-size:16px;font-weight:600}

/* ── Toggle ─────────────────────────────────────────── */
.toggle{
  width:36px;height:20px;border-radius:10px;
  border:none;position:relative;flex-shrink:0;
  transition:all 0.25s;
  cursor:pointer;
}
.toggle.on{
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  box-shadow:0 0 12px rgba(168,199,255,0.3);
}
.toggle.off{background:rgba(255,255,255,0.1)}
.toggle::after{
  content:'';position:absolute;top:3px;
  width:14px;height:14px;border-radius:50%;
  background:rgba(255,255,255,0.5);
  transition:left 0.25s,background 0.25s;
  box-shadow:0 1px 4px rgba(0,0,0,0.3);
}
.toggle.on::after{left:19px;background:white}
.toggle.off::after{left:3px}

/* ── Progress bars ──────────────────────────────────── */
.bar-wrap{
  height:5px;
  background:rgba(255,255,255,0.06);
  position:relative;border-radius:3px;overflow:hidden;
}
.bar-fill{height:100%;border-radius:3px;transition:width 0.4s ease}
.prog{
  height:4px;
  background:rgba(255,255,255,0.06);
  border-radius:2px;overflow:hidden;margin-top:5px;
}
.prog-fill{height:100%;border-radius:2px}

/* ── Chips ──────────────────────────────────────────── */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{
  padding:6px 11px;
  border:1px solid var(--bdr);
  background:var(--surf);
  color:var(--mut);
  font-size:9px;letter-spacing:0.5px;
  cursor:pointer;border-radius:20px;
  transition:all 0.18s;
  font-family:'DM Sans',sans-serif;
}
.chip:active{transform:scale(0.96)}
.chip.active{
  border-color:rgba(168,199,255,0.5);
  background:rgba(168,199,255,0.12);
  color:var(--acc);
}

/* ── Pills ──────────────────────────────────────────── */
.pill-row{display:flex;gap:6px;flex-wrap:wrap}
.pill{
  padding:5px 12px;
  border:1px solid var(--bdr);
  background:var(--surf2);
  color:var(--mut);
  font-size:9px;letter-spacing:0.5px;
  border-radius:20px;cursor:pointer;
  transition:all 0.18s;
}
.pill.active{
  border-color:rgba(168,199,255,0.45);
  background:rgba(168,199,255,0.1);
  color:var(--acc);
}

/* ── Chart ──────────────────────────────────────────── */

/* ── Header ─────────────────────────────────────────── */
.hdr{
  background:rgba(8,10,20,0.6);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border-bottom:1px solid var(--bdr);
  padding:14px 18px;
  display:flex;justify-content:space-between;align-items:flex-start;
  max-width:560px;margin:0 auto;
  position:relative;
}
.hdr::after{
  content:'';position:absolute;bottom:0;left:12px;right:12px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(168,199,255,0.12),transparent);
}
.hdr-left .sub{
  font-size:9px;letter-spacing:3px;color:var(--mut);text-transform:uppercase;
  font-family:'DM Mono',monospace;
}
.hdr-left .title{
  font-size:22px;font-weight:300;letter-spacing:3px;
  color:var(--acc);
  text-shadow:0 0 30px rgba(168,199,255,0.4);
}
.hdr-left .countdown{font-size:9px;letter-spacing:1.5px;color:var(--mut);margin-top:3px;font-family:'DM Mono',monospace}

/* ── Live counter ───────────────────────────────────── */
.live-badge{
  display:inline-flex;align-items:center;gap:7px;
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  font-family:'DM Mono',monospace;
}
.live-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--grn);
  box-shadow:0 0 0 3px rgba(93,232,160,0.15),0 0 12px var(--grn);
  animation:pulse-live 2s ease infinite;
}
.live-dot.paused{
  background:var(--acc);
  box-shadow:0 0 0 3px rgba(168,199,255,0.15),0 0 12px var(--acc);
  animation:none;
}
.live-dot.on-break{
  background:var(--red);
  box-shadow:0 0 0 3px rgba(255,107,122,0.15),0 0 12px var(--red);
}
@keyframes pulse-live{
  0%,100%{box-shadow:0 0 0 3px rgba(93,232,160,0.15),0 0 12px var(--grn)}
  50%{box-shadow:0 0 0 6px rgba(93,232,160,0.08),0 0 20px var(--grn)}
}
.earnings-big{font-size:52px;font-weight:300;line-height:1;letter-spacing:-1px}

/* ── Day dot row ────────────────────────────────────── */
.day-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.05);
}
.day-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.08)}
.day-dot.live{background:var(--grn);box-shadow:0 0 8px var(--grn)}
.day-dot.done{background:rgba(93,232,160,0.25)}

/* ── Stat boxes ─────────────────────────────────────── */
.stat-row{display:flex;gap:8px;margin-bottom:14px}
.stat-box{
  flex:1;
  background:var(--surf);
  border:1px solid var(--bdr);
  border-radius:var(--radius-sm);
  padding:11px 13px;
  box-shadow:var(--shadow-card);
  position:relative;overflow:hidden;
}
.stat-box::before{
  content:'';position:absolute;top:0;left:4px;right:4px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);
}
.stat-box .sl{
  font-size:8px;letter-spacing:2px;
  color:var(--mut);text-transform:uppercase;
  margin-bottom:5px;
  font-family:'DM Mono',monospace;
}
.stat-box .sv{font-size:15px;font-weight:500;line-height:1}

/* ── Expandable week ────────────────────────────────── */
.wk-row{
  background:var(--surf);
  border:1px solid var(--bdr);
  border-radius:var(--radius);
  margin-bottom:8px;cursor:pointer;
  overflow:hidden;
  box-shadow:var(--shadow-card);
}
.wk-hdr{padding:13px 16px;display:flex;justify-content:space-between;align-items:center}
.wk-body{border-top:1px solid var(--bdr);padding:10px 16px 13px}

/* ── Data panel ─────────────────────────────────────── */
#data-panel{
  position:fixed;
  bottom:0;
  left:50%;transform:translateX(-50%);
  width:100%;max-width:560px;
  background:rgba(10,12,22,0.92);
  backdrop-filter:blur(40px);
  -webkit-backdrop-filter:blur(40px);
  border-top:1px solid var(--bdrh);
  border-radius:var(--radius) var(--radius) 0 0;
  padding:18px 20px;
  padding-bottom:max(18px,calc(env(safe-area-inset-bottom,0px) + 8px));
  z-index:99;
  box-sizing:border-box;display:none;
  box-shadow:0 -8px 40px rgba(0,0,0,0.5);
}
#data-panel.open{display:block}

/* ── Calendar ───────────────────────────────────────── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-cell{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:6px;
  padding:4px;min-height:36px;
  transition:background 0.2s;
}
.cal-cell.cal-payday{
  background:rgba(126,180,255,0.1);
  border-color:rgba(126,180,255,0.3);
}
.cal-cell.cal-expense{
  background:rgba(255,107,122,0.09);
  border-color:rgba(255,107,122,0.25);
}
.cal-cell.cal-debt{
  background:rgba(255,173,107,0.08);
  border-color:rgba(255,173,107,0.25);
}
.cal-cell.cal-savings{
  background:rgba(93,232,160,0.08);
  border-color:rgba(93,232,160,0.25);
}
.cal-cell.cal-multi{
  background:rgba(196,160,255,0.09);
  border-color:rgba(196,160,255,0.3);
}
.cal-legend{
  display:flex;flex-wrap:wrap;gap:8px;
  margin-bottom:12px;padding:10px 14px;
  background:var(--surf);
  backdrop-filter:var(--glass-blur-sm);
  -webkit-backdrop-filter:var(--glass-blur-sm);
  border:1px solid var(--bdr);
  border-radius:var(--radius-sm);
}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:8px;color:var(--txt2);letter-spacing:0.5px;font-family:'DM Mono',monospace}
.cal-legend-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0}
.cal-cell.today{
  background:rgba(168,199,255,0.12);
  border-color:rgba(168,199,255,0.4);
  box-shadow:0 0 0 1px rgba(168,199,255,0.15) inset;
}
.cal-cell.has-exp{background:rgba(255,107,122,0.09);border-color:rgba(255,107,122,0.25)}
.cal-day-num{font-size:9px;color:var(--mut);font-family:'DM Mono',monospace}
.cal-cell.today .cal-day-num{color:var(--acc);font-weight:600}
.cal-amt{font-size:7px;color:var(--red);font-weight:500;margin-top:1px}
.cal-lbl{font-size:6px;color:var(--red);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── OT badge ───────────────────────────────────────── */
.ot-badge{
  font-size:8px;color:var(--org);
  background:rgba(255,173,107,0.1);
  padding:2px 8px;
  border:1px solid rgba(255,173,107,0.25);
  border-radius:20px;
}

/* ── Inline form ────────────────────────────────────── */
.inline-form{
  background:rgba(255,255,255,0.03);
  border:1px solid var(--bdrh);
  border-radius:var(--radius);
  padding:16px;margin-bottom:14px;
  box-shadow:var(--shadow-card);
}
.form-row{display:flex;gap:8px;margin-bottom:10px}
.form-row > *{flex:1}

/* ── Surplus/deficit badge ──────────────────────────── */
.bal-badge{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.bal-dot{width:9px;height:9px;border-radius:50%}
.bal-num{font-size:38px;font-weight:300;line-height:1;letter-spacing:-1px}

/* ── Debt payoff ────────────────────────────────────── */
.payoff-num{
  width:22px;height:22px;border-radius:50%;
  background:rgba(93,232,160,0.1);
  border:1.5px solid rgba(93,232,160,0.4);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:var(--grn);font-weight:600;
  flex-shrink:0;
}

/* ── Goal bar ───────────────────────────────────────── */
.goal-bar{
  height:6px;background:rgba(255,255,255,0.06);
  border-radius:3px;overflow:hidden;margin-bottom:8px;
}
.goal-fill{
  height:100%;
  background:linear-gradient(90deg,var(--acc2),var(--acc));
  border-radius:3px;
  box-shadow:0 0 10px rgba(168,199,255,0.3);
}

/* ── Freedom fund box ───────────────────────────────── */
.ff-box{
  background:rgba(168,199,255,0.06);
  border:1px solid rgba(168,199,255,0.2);
  border-left:2px solid var(--acc);
  border-radius:var(--radius);
  padding:16px;margin-bottom:20px;
  box-shadow:-3px 0 20px rgba(168,199,255,0.06);
}

/* ── Gap helpers ────────────────────────────────────── */
.mt4{margin-top:4px}.mt6{margin-top:6px}.mt8{margin-top:8px}.mt10{margin-top:10px}.mt12{margin-top:12px}.mt14{margin-top:14px}.mt16{margin-top:16px}.mt18{margin-top:18px}.mt20{margin-top:20px}
.mb4{margin-bottom:4px}.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
.flex{display:flex}.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}.gap14{gap:14px}
.f1{flex:1}.bold{font-weight:600}.items-center{align-items:center}

/* ── Color helpers ──────────────────────────────────── */
.green{color:var(--grn)}.red{color:var(--red)}.acc{color:var(--acc)}.blue{color:var(--blu)}.pur{color:var(--pur)}.org{color:var(--org)}.mut{color:var(--mut)}
.right{text-align:right}.center{text-align:center}

/* ── Scrollbar hide ─────────────────────────────────── */
*::-webkit-scrollbar{display:none}
*{scrollbar-width:none}

/* ── Quick Add FAB ─────────────────────────────────── */
#fab-wrap{
  position:fixed;
  bottom:max(24px,calc(env(safe-area-inset-bottom,0px) + 16px));right:max(24px,calc((100vw - 560px)/2 + 16px));
  z-index:98;
  display:flex;flex-direction:column-reverse;align-items:flex-end;gap:10px;
}
#fab-btn{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  color:#07080f;font-size:24px;font-weight:300;
  border:none;cursor:pointer;
  box-shadow:0 4px 20px rgba(168,199,255,0.35),0 0 0 4px rgba(168,199,255,0.08);
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.2s,box-shadow 0.2s;
}
#fab-btn:active{transform:scale(0.92)}
#fab-btn.open{transform:rotate(45deg);background:var(--surf3);color:var(--acc);box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.fab-menu{display:none;flex-direction:column;gap:8px;align-items:flex-end}
.fab-menu.open{display:flex}
.fab-opt{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;
  background:rgba(10,12,24,0.88);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid var(--bdrh);
  border-radius:26px;
  cursor:pointer;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
  white-space:nowrap;
  transition:all 0.15s;
}
.fab-opt:active{transform:scale(0.96);background:rgba(168,199,255,0.1)}
.fab-opt .fab-icon{font-size:14px}
.fab-opt .fab-lbl{font-size:10px;letter-spacing:1px;color:var(--txt);font-family:'DM Mono',monospace}
#fab-panel{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:560px;
  background:rgba(10,12,22,0.95);
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border-top:1px solid var(--bdrh);
  border-radius:var(--radius) var(--radius) 0 0;
  padding:18px 20px;
  padding-bottom:max(18px,env(safe-area-inset-bottom,0px));
  z-index:99;display:none;
  box-shadow:0 -8px 40px rgba(0,0,0,0.5);
  max-height:70vh;overflow-y:auto;
}
#fab-panel.open{display:block}

/* ── Setup Wizard ───────────────────────────────────── */
#wizard-overlay.hidden{display:none!important}
#wizard-overlay{
  background:var(--bg);
  overflow:hidden;
}
.wiz-step{animation:wizFadeIn 0.3s ease}
@keyframes wizFadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.wiz-title{font-size:20px;font-weight:300;color:var(--acc);margin-bottom:6px;letter-spacing:1px}
.wiz-sub{font-size:11px;color:var(--mut);margin-bottom:20px;line-height:1.6}
.wiz-progress{display:flex;gap:4px;margin-bottom:24px}
.wiz-dot{height:3px;flex:1;border-radius:2px;background:var(--surf3);transition:background 0.3s}
.wiz-dot.done{background:var(--acc)}
.wiz-dot.active{background:var(--acc);box-shadow:0 0 8px var(--acc-glow)}
.wiz-nav{display:flex;gap:10px;margin-top:24px}
.wiz-nav button{flex:1}
</style>
</head>

<script>
'use strict';

// ─── Storage ─────────────────────────────────────────────────────────────────
function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch(e){return null}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true}catch(e){return false}}

// ─── State ───────────────────────────────────────────────────────────────────
const DEFAULT_SCH={
  hourlyRate:'',overtimeAfter:'8',overtimeMultiplier:'1.5',overtimeMode:'shift',
  weekStartDay:'0',weekStartTime:'00:00',annualGoal:'',breakRules:[],
  shifts:Object.fromEntries([0,1,2,3,4,5,6].map(d=>[d,{active:d>=1&&d<=5,start:'22:00',end:'06:00'}]))
};

let S={
  app:'tracker',
  trackerTab:'tracker',
  budgetTab:'overview',
  worthTab:'networth',
  histMode:'weeks',
  forecastMode:'4weeks',
  calTab:'calendar',
  expandedWk:null,
  schedule:{...DEFAULT_SCH,shifts:{...DEFAULT_SCH.shifts}},
  deductions:[],
  log:{},
  customShifts:[],
  paychecks:{},
  envelopes:{}, // {catId: monthlyLimit}
  assets:[],    // [{id,label,value,type}] for net worth
  snapshots:[],  // [{id,date,netWorth,note}]
  milestones:[], // [{id,label,target,achieved,achievedDate}]
  retirement401k:{
    accountBalance:'',      // legacy / manual override (kept for compat)
    balanceAnchor:null,     // {amount, date} — user-confirmed actual balance on a date
    employeeType:'percent',
    employeeAmount:'',
    matchFormula:'100',
    matchUpTo:'3',
    rothOrPretax:'pretax',
  },
  sideIncome:[],
  savingsChallenge:null,
  taxRate:'',   // estimated tax % for YTD
  earlyDepositDays:0, // 0=no early deposit, 1=1 day early, 2=2 days early
  pin:'',       // 4-digit PIN ('' = disabled)
  calLegendHidden:false,
  expenses:[],
  goals:[],
  debts:[],
  transactions:[], // [{id,date,description,amount,category,source,imported}]
  incomeSafetyThresholds:{monthlyFloor:'',notifyOnShortfall:true}, // income threshold alerts
  autoCatRules:[], // [{id,keyword,category}] user-defined auto-categorize rules
  theme:'midnight',
  accentColor:'',
  wizardSeen:false,
  achievements:{},
  pause:{paused:false,pausedAt:null,dayKey:null,accBreakSec:0,onBreak:false,breakStart:null,breakLog:[]},
  breakLog:{},
  pto:{},
  shiftTimes:{},
  lastFabAccount:'',
};

function loadState(){
  const sch=lsGet('sch_v3'),ded=lsGet('ded_v3'),log=lsGet('log_v3'),
        ps=lsGet('pause_v3'),cs=lsGet('custom_shifts_v1'),pc=lsGet('paychecks_v1'),
        exp=lsGet('budget_expenses_v1'),gls=lsGet('budget_goals_v1'),dbs=lsGet('budget_debts_v1'),
        env=lsGet('envelopes_v1'),ast=lsGet('assets_v1'),txr=lsGet('tax_rate_v1'),pn=lsGet('pin_v1'),
        snp=lsGet('snapshots_v1'),mls=lsGet('milestones_v1'),
        r401=lsGet('ret401k_v1'),si=lsGet('side_income_v1'),sc=lsGet('savings_challenge_v1'),
        txns=lsGet('transactions_v1');
  const ist=lsGet('income_thresholds_v1'),acr=lsGet('auto_cat_rules_v1');
  const bkl=lsGet('break_log_v1');
  if(sch)S.schedule={...DEFAULT_SCH,...sch,shifts:{...DEFAULT_SCH.shifts,...sch.shifts}};
  if(ded)S.deductions=ded;
  if(log)S.log=log;
  if(cs)S.customShifts=cs;
  if(pc)S.paychecks=pc;
  if(exp)S.expenses=exp;
  if(gls)S.goals=gls;
  if(dbs)S.debts=dbs;
  if(env)S.envelopes=env;
  if(ast)S.assets=ast;
  if(txr)S.taxRate=txr;
  if(pn)S.pin=pn;
  if(snp)S.snapshots=snp;
  if(mls)S.milestones=mls;
  if(r401)S.retirement401k={...S.retirement401k,...r401};
  if(si)S.sideIncome=si;
  if(sc)S.savingsChallenge=sc;
  if(txns)S.transactions=txns;
  if(ist)S.incomeSafetyThresholds={...S.incomeSafetyThresholds,...ist};
  if(acr)S.autoCatRules=acr;
  if(bkl)S.breakLog=bkl;
  const ptoData=lsGet('pto_v1');if(ptoData)S.pto=ptoData;
  const stData=lsGet('shift_times_v1');if(stData)S.shiftTimes=stData;
  const lfaData=lsGet('last_fab_account_v1');if(lfaData!=null)S.lastFabAccount=lfaData;
  const edd=lsGet('early_deposit_v1');if(edd!=null)S.earlyDepositDays=edd;
  const thm=lsGet('theme_v1');if(thm)S.theme=thm;
  const wiz=lsGet('wizard_seen_v1');if(wiz)S.wizardSeen=wiz;
  const ach=lsGet('achievements_v1');if(ach)S.achievements=ach;
  const acclr=lsGet('accent_color_v1');if(acclr)S.accentColor=acclr;
  if(ps&&ps.dayKey){
    const today=dayKey(new Date());
    const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
    const yestKey=dayKey(yesterday);
    // Check if there's a currently active shift whose date matches the saved pause dayKey
    // (handles overnight shifts where dayKey is yesterday but shift is still live)
    const _loadShift=getActiveShift(new Date());
    const _loadShiftDk=_loadShift?dayKey(_loadShift.date):null;
    if(ps.dayKey===today||ps.dayKey===_loadShiftDk){
      // Today or active overnight shift — fully restore pause state including breaks
      S.pause={...ps,breakLog:ps.breakLog||[]};
    }else if(ps.dayKey===yestKey){
      // Yesterday's pause, no active shift matching — stale, clear break data
      S.pause={...ps,breakLog:[],accBreakSec:0,onBreak:false,breakStart:null};
    }
  }
  // On load: remove log entries only for the specific dates covered by custom shifts
  let logChanged=false;
  for(const cs of S.customShifts){
    const csDate=cs.date;
    const wkStr=localStr(getWeekStart(parseLocal(csDate),S.schedule.weekStartDay,S.schedule.weekStartTime));
    if(S.log[wkStr]&&S.log[wkStr][csDate]){
      const wkMap={...S.log[wkStr]};
      delete wkMap[csDate];
      if(Object.keys(wkMap).length>0)S.log={...S.log,[wkStr]:wkMap};
      else{const l={...S.log};delete l[wkStr];S.log=l;}
      logChanged=true;
    }
  }
  if(logChanged)lsSet('log_v3',S.log);
  S.app=localStorage.getItem('__activeApp__')||'tracker';
}

function save(key){
  const map={
    schedule:'sch_v3',deductions:'ded_v3',log:'log_v3',pause:'pause_v3',
    customShifts:'custom_shifts_v1',paychecks:'paychecks_v1',
    expenses:'budget_expenses_v1',goals:'budget_goals_v1',debts:'budget_debts_v1',
    envelopes:'envelopes_v1',assets:'assets_v1',taxRate:'tax_rate_v1',pin:'pin_v1',
    snapshots:'snapshots_v1',milestones:'milestones_v1',
    transactions:'transactions_v1',
    incomeSafetyThresholds:'income_thresholds_v1',autoCatRules:'auto_cat_rules_v1',
    retirement401k:'ret401k_v1',sideIncome:'side_income_v1',savingsChallenge:'savings_challenge_v1',
    earlyDepositDays:'early_deposit_v1',
    theme:'theme_v1',
    wizardSeen:'wizard_seen_v1',
    achievements:'achievements_v1',
    accentColor:'accent_color_v1',
    breakLog:'break_log_v1',
    pto:'pto_v1',
    shiftTimes:'shift_times_v1',
    lastFabAccount:'last_fab_account_v1'
  };
  lsSet(map[key],S[key]);
  showToast(false);
}

// ─── PIN ─────────────────────────────────────────────────────────────────────
let _pinEntry='',_pinSetting=false,_pinSettingStep=0,_pinFirst='';
function initPin(){
  if(S.pin){document.getElementById('pin-overlay').classList.remove('hidden');}
}
function pinPress(k){
  if(k==='back'){_pinEntry=_pinEntry.slice(0,-1);updatePinDots();return;}
  if(k==='')return;
  if(_pinEntry.length>=4)return;
  _pinEntry+=k;
  updatePinDots();
  if(_pinEntry.length===4){
    setTimeout(()=>{
      if(_pinSetting){
        if(_pinSettingStep===0){_pinFirst=_pinEntry;_pinEntry='';_pinSettingStep=1;document.getElementById('pin-prompt').textContent='Confirm PIN';updatePinDots();}
        else if(_pinFirst===_pinEntry){S.pin=_pinEntry;save('pin');_pinSetting=false;_pinSettingStep=0;_pinFirst='';_pinEntry='';document.getElementById('pin-overlay').classList.add('hidden');showToast(true);render();}
        else{_pinEntry='';_pinFirst='';_pinSettingStep=0;flashPinError('PINs did not match');document.getElementById('pin-prompt').textContent='Set New PIN';}
      } else {
        if(_pinEntry===S.pin){_pinEntry='';document.getElementById('pin-overlay').classList.add('hidden');}
        else{_pinEntry='';flashPinError('Incorrect PIN');}
      }
    },100);
  }
}
function updatePinDots(){
  for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(d){d.classList.toggle('filled',i<_pinEntry.length);d.classList.remove('error');}}
}
function flashPinError(msg){
  for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(d)d.classList.add('error');}
  document.getElementById('pin-prompt').textContent=msg;
  setTimeout(()=>{updatePinDots();document.getElementById('pin-prompt').textContent=_pinSetting?'Set New PIN':'Enter PIN';},900);
}
function startSetPin(){_pinSetting=true;_pinSettingStep=0;_pinFirst='';_pinEntry='';document.getElementById('pin-prompt').textContent='Set New PIN';document.getElementById('pin-overlay').classList.remove('hidden');}
function clearPin(){S.pin='';save('pin');showToast(true);render();}

// ─── Toast ───────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(manual=true,msg=''){
  const t=document.getElementById('save-toast'),m=document.getElementById('toast-msg');
  if(!t)return;
  t.classList.remove('manual');
  if(manual)t.classList.add('manual');
  m.textContent=msg||(manual?'SAVED':'AUTO-SAVED');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

// ─── Math helpers ─────────────────────────────────────────────────────────────
function fmt$(n,sign=false){
  const s=Math.abs(n).toLocaleString('en-US',{style:'currency',currency:'USD'});
  return(sign&&n>0?'+':sign&&n<0?'−':n<0?'−':'')+s;
}
function fmtTime(sec){
  const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=Math.floor(sec%60);
  return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function toMin(t){const[h,m]=(t||'00:00').split(':').map(Number);return h*60+m;}
function localStr(d){const x=new Date(d);x.setHours(0,0,0,0);return`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;}
function parseLocal(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function dayKey(d){return localStr(d);}
function todayStr(){return localStr(new Date());}
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const FULL_DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function getWeekStart(date,startDay,startTime){
  const sd=parseInt(startDay)||0,sm=toMin(startTime||'00:00');
  const nowMin=date.getHours()*60+date.getMinutes(),nowDay=date.getDay();
  let back=(nowDay-sd+7)%7;
  if(back===0&&nowMin<sm)back=7;
  const r=new Date(date);r.setDate(r.getDate()-back);r.setHours(Math.floor(sm/60),sm%60,0,0);
  return r;
}
function wkKey(date){return localStr(getWeekStart(date,S.schedule.weekStartDay,S.schedule.weekStartTime));}
function wkEnd(ws){const we=new Date(ws);we.setDate(we.getDate()+7);we.setSeconds(we.getSeconds()-1);return we;}
// Pay date = week end + 8 days - early deposit offset
// Hours worked in one week are paid the following week (standard weekly payroll)
// If a paycheck was actually received (S.paychecks[wkStr].date), use that instead
function payDateForWeek(wkStr){
  const pc=S.paychecks[wkStr];
  if(pc?.date)return parseLocal(pc.date);
  const ws=parseLocal(wkStr);
  const we=wkEnd(ws);
  const pd=new Date(we);
  pd.setDate(pd.getDate()+8); // next week's payday (7 days after week end + 1)
  const offset=parseInt(S.earlyDepositDays)||0;
  pd.setDate(pd.getDate()-offset);
  return pd;
}
function timeLeft(now,ws){
  const diff=wkEnd(ws)-now;if(diff<=0)return null;
  const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000);
  return d>0?`${d}d ${h}h left`:h>0?`${h}h ${m}m left`:`${m}m left`;
}

function calcEarnings(sec,rate,otA,otM){
  if(!rate||sec<=0)return 0;
  const h=sec/3600,oa=parseFloat(otA)||Infinity,om=parseFloat(otM)||1.5;
  return h<=oa?h*rate:(oa*rate)+((h-oa)*rate*om);
}

// Global live shift earnings — usable from any part of the app
function getLiveEarned(){
  const now=new Date(),rate=parseFloat(S.schedule.hourlyRate)||0;
  if(!rate)return 0;
  const shift=getActiveShift(now);
  if(!shift)return 0;
  const p=S.pause;
  let liveSec=p.paused&&p.pausedAt!=null?p.pausedAt:secsIntoShift(now,toMin(shift.shift.start));
  const brkLive=p.onBreak&&p.breakStart?Math.floor((now-p.breakStart)/1000):0;
  const netSec=Math.max(0,liveSec-(p.accBreakSec+brkLive));
  const ws=getWeekStart(shift.date,S.schedule.weekStartDay,S.schedule.weekStartTime);
  const wk=localStr(ws);
  const todayDk=dayKey(shift.date);
  const thisWk=S.log[wk]||{};
  const priorSec=Object.entries(thisWk).reduce((s,[k,v])=>k===todayDk?s:s+v,0);
  const covDays=csCoveredDays(wk);
  const oa=S.schedule.overtimeAfter,om=S.schedule.overtimeMultiplier,otMode=S.schedule.overtimeMode;
  const csHrSecLive=csInWeek(wk).filter(c=>c.type==='hourly'&&c.date!==todayDk).reduce((s,c)=>s+(parseFloat(c.hours)||0)*3600,0);
  const priorPool=priorSec+csHrSecLive;
  if(otMode==='week')return calcEarnings(priorPool+netSec,rate,oa,om)-calcEarnings(priorPool,rate,oa,om);
  return calcEarnings(netSec,rate,oa,om);
}
function weekGross(dayMap,skipDk,liveSec,rate,otA,otM,otMode,csGrossAmt,coveredDays,ptoMap){
  // csGrossAmt may be a number (legacy flat sum) or a CS array (preferred for OT accuracy)
  const covered=coveredDays||new Set();
  const pto=ptoMap||{};
  const ptoEarn=Object.values(pto).reduce((s,sec)=>s+(sec/3600)*rate,0);
  const effLive=covered.has(skipDk)?0:liveSec;
  // Split CS list: hourly hours flow into OT pool, flat gross added directly
  let csHrSec=0,csFlatGross=0;
  if(Array.isArray(csGrossAmt)){
    for(const c of csGrossAmt){
      if(c.type==='hourly'){csHrSec+=(parseFloat(c.hours)||0)*3600;}
      else{csFlatGross+=parseFloat(c.gross)||0;}
    }
  }else{csFlatGross=csGrossAmt||0;}
  function filteredMap(){return Object.fromEntries(Object.entries(dayMap).filter(([k])=>k!==skipDk&&!covered.has(k)));}
  if(otMode==='week'){
    const s=Object.values(filteredMap()).reduce((a,b)=>a+b,0);
    // Hourly CS seconds join the OT pool; flat CS gross added directly
    return calcEarnings(s+effLive+csHrSec,rate,otA,otM)+csFlatGross+ptoEarn;
  }
  // Shift-mode: each unit calculated independently
  let t=csFlatGross+ptoEarn;
  if(csHrSec>0)t+=calcEarnings(csHrSec,rate,otA,otM);
  for(const[k,v]of Object.entries(filteredMap()))t+=calcEarnings(v,rate,otA,otM);
  return t+calcEarnings(effLive,rate,otA,otM);
}
function applyDed(gross,deds){
  let t=0;for(const d of(deds||[])){const v=parseFloat(d.value)||0;t+=d.type==='flat'?v:gross*(v/100);}
  // Auto-include tax rate as an additional percent deduction if set
  const tr=parseFloat(S.taxRate)||0;
  if(tr>0)t+=gross*(tr/100);
  return Math.max(0,gross-Math.min(t,gross));
}
function csGross(cs){return cs.type==='flat'?parseFloat(cs.gross)||0:(parseFloat(cs.hours)||0)*(parseFloat(cs.rate)||0);}
function csInWeek(wkStr){
  const ws=parseLocal(wkStr),we=new Date(ws.getTime()+7*24*3600*1000-1);
  return S.customShifts.filter(cs=>{const d=parseLocal(cs.date);return d>=ws&&d<=we;});
}
// Days covered by custom shifts in a week (these replace logged hours)
function csCoveredDays(wkStr){
  return new Set(csInWeek(wkStr).map(cs=>cs.date));
}

function getActiveShift(now){
  const sch=S.schedule,dowNow=now.getDay(),minNow=now.getHours()*60+now.getMinutes();
  for(const offset of[0,-1]){
    const dow=((dowNow+offset)+7)%7,sh=sch.shifts[dow];if(!sh?.active)continue;
    const sm=toMin(sh.start),em=toMin(sh.end),ov=em<sm;
    let ok=false;
    if(ov)ok=offset===0?minNow>=sm:minNow<em;
    else if(offset===0)ok=minNow>=sm&&minNow<em;
    if(ok){const d=new Date(now);d.setDate(d.getDate()+offset);return{dow,date:d,shift:sh};}
  }
  return null;
}
function secsIntoShift(now,startMin){const n=now.getHours()*60+now.getMinutes()+now.getSeconds()/60;let d=n-startMin;if(d<0)d+=1440;return d*60;}

// Budget helpers
function toWeekly(e){const a=parseFloat(e.amount)||0;switch(e.frequency){case'weekly':return a;case'biweekly':return a/2;case'monthly':return a*12/52;case'yearly':return a/52;default:return 0;}}
function toMonthly(e){const a=parseFloat(e.amount)||0;switch(e.frequency){case'weekly':return a*52/12;case'biweekly':return a*26/12;case'monthly':return a;case'yearly':return a/12;default:return 0;}}
function daysUntil(s){const d=parseLocal(s),t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/86400000);}

// Get actual spend from imported transactions by category for a month (alias)
function txSpendByCatForMonth(catId,yr,mo){
  const from=new Date(yr,mo,1),to=new Date(yr,mo+1,0,23,59,59,999);
  return S.transactions
    .filter(t=>{const d=parseLocal(t.date);return d>=from&&d<=to&&t.category===catId&&(t.amount<0||(t.type&&(t.type.toLowerCase()==='purchase'||t.type.toLowerCase()==='direct debit')));})
    .reduce((s,t)=>s+Math.abs(parseFloat(t.amount)||0),0);
}
function inWeek(e,ws){
  if(e.frequency==='one-time'){if(!e.oneTimeDate||e.paid)return false;const d=parseLocal(e.oneTimeDate),we=new Date(ws);we.setDate(we.getDate()+6);we.setHours(23,59,59,999);return d>=ws&&d<=we;}
  // Recurring: check if dayOfMonth falls in this week
  if(e.dayOfMonth){const dom=parseInt(e.dayOfMonth);for(let i=0;i<7;i++){const dd=new Date(ws);dd.setDate(dd.getDate()+i);if(dd.getDate()===dom)return true;}return false;}
  return true; // recurring with no day: always in week
}
function inMonth(e,yr,mo){
  if(e.frequency==='one-time'){if(!e.oneTimeDate||e.paid)return false;const d=parseLocal(e.oneTimeDate);return d.getFullYear()===yr&&d.getMonth()===mo;}
  return true; // recurring always in month
}
function expWeekAmt(e,ws){
  if(e.frequency==='one-time')return parseFloat(e.amount)||0;
  if(e.dayOfMonth){const dom=parseInt(e.dayOfMonth);for(let i=0;i<7;i++){const dd=new Date(ws);dd.setDate(dd.getDate()+i);if(dd.getDate()===dom)return parseFloat(e.amount)||0;}return 0;}
  return toWeekly(e);
}
function expMonthAmt(e,yr,mo){
  if(e.frequency==='one-time')return parseFloat(e.amount)||0;
  return toMonthly(e);
}

// ─── Routing ──────────────────────────────────────────────────────────────────
const TRACKER_TABS=[{id:'tracker',icon:'◉',lbl:'Tracker'},{id:'history',icon:'▦',lbl:'History'},{id:'income',icon:'◈',lbl:'Income'},{id:'deductions',icon:'−$',lbl:'Deductions'},{id:'setup',icon:'⚙',lbl:'Setup'}];

function setTab(tab){
  if(S.app==='tracker')S.trackerTab=tab;

let _wizStep=0;
const WIZ_STEPS=['welcome','tour_ledger','tour_budget','tour_networth','tour_calendar','schedule','deductions','annual','theme','done'];

function shouldShowWizard(){
  if(S.wizardSeen)return false;
  if(S.schedule.hourlyRate||Object.keys(S.log).length>0||S.expenses.length>0)return false;
  return true;
}
function openWizard(){_wizStep=0;document.getElementById('wizard-overlay').classList.remove('hidden');renderWizard();}
function closeWizard(){document.getElementById('wizard-overlay').classList.add('hidden');S.wizardSeen=true;save('wizardSeen');}
function wizNext(){wizSaveStep();_wizStep++;if(_wizStep>=WIZ_STEPS.length){closeWizard();render();return;}renderWizard();}
function wizBack(){wizSaveStep();if(_wizStep>0)_wizStep--;renderWizard();}
function wizSkip(){closeWizard();render();}

function wizSaveStep(){
  const step=WIZ_STEPS[_wizStep];
  if(step==='schedule'){
    const rate=document.getElementById('wiz-rate')?.value||'';
    const wsd=document.getElementById('wiz-wsd')?.value||'0';
    S.schedule.hourlyRate=rate;S.schedule.weekStartDay=wsd;
    for(let d=0;d<7;d++){
      const cb=document.getElementById('wiz-day-'+d);if(cb)S.schedule.shifts[d].active=cb.checked;
      const st=document.getElementById('wiz-start-'+d),en=document.getElementById('wiz-end-'+d);
      if(st)S.schedule.shifts[d].start=st.value;if(en)S.schedule.shifts[d].end=en.value;
    }
    save('schedule');
  } else if(step==='deductions'){
    const tax=document.getElementById('wiz-tax')?.value||'';S.taxRate=tax;save('taxRate');
  } else if(step==='annual'){
    const goal=document.getElementById('wiz-annual')?.value||'';S.schedule.annualGoal=goal;save('schedule');
  }
}

// ── Annual Goal Auto-Calculator ──────────────────────────────────────────────
function calcAnnualGoalEstimate(){
  const rate=parseFloat(S.schedule.hourlyRate)||0;
  if(!rate)return null;
  let wkHrs=0;
  for(let d=0;d<7;d++){
    const sh=S.schedule.shifts[d];
    if(!sh.active)continue;
    const parts=sh.start.split(':'),eParts=sh.end.split(':');
    const sm=parseInt(parts[0])*60+parseInt(parts[1]||0);
    const em=parseInt(eParts[0])*60+parseInt(eParts[1]||0);
    const dur=em<sm?em+1440-sm:em-sm;
    wkHrs+=dur/60;
  }
  const siWeekly=S.sideIncome.filter(s=>s.frequency!=='one-time').reduce((t,s)=>t+toWeekly({amount:s.amount,frequency:s.frequency}),0);
  const wkGross=wkHrs*rate+siWeekly;
  const annGross=wkGross*52;
  const taxPct=parseFloat(S.taxRate)||0;
  const annNet=annGross*(1-taxPct/100);
  return{wkHrs,annGross,annNet,taxPct,siWeekly};
}

// ── Backup Size Tracking ─────────────────────────────────────────────────────
function getStorageInfo(){
  let totalBytes=0;
  const breakdown={};
  const labels={
    'sch_v3':'Schedule','ded_v3':'Deductions','log_v3':'Shift Log',
    'pause_v3':'Pause','custom_shifts_v1':'Custom Shifts','paychecks_v1':'Paychecks',
    'budget_expenses_v1':'Expenses','budget_goals_v1':'Goals','budget_debts_v1':'Debts',
    'envelopes_v1':'Envelopes','assets_v1':'Accounts','tax_rate_v1':'Tax Rate',
    'pin_v1':'PIN','snapshots_v1':'Snapshots','milestones_v1':'Milestones',
    'ret401k_v1':'401k','side_income_v1':'Side Income','savings_challenge_v1':'Challenge',
    'transactions_v1':'Transactions','early_deposit_v1':'Early Deposit',
    'income_thresholds_v1':'Thresholds','auto_cat_rules_v1':'Auto-Cat Rules',
    'theme_v1':'Theme','accent_color_v1':'Accent','wizard_seen_v1':'Wizard'
  };
  for(const[k,label] of Object.entries(labels)){
    const v=localStorage.getItem(k);
    if(v){
      const bytes=new Blob([v]).size;
      totalBytes+=bytes;
      breakdown[label]=bytes;
    }
  }
  // localStorage limit is typically 5-10MB
  const limitMB=5;
  return{totalBytes,breakdown,limitMB,pct:((totalBytes/(limitMB*1024*1024))*100)};
}

function fmtBytes(b){
  if(b<1024)return b+' B';
  if(b<1024*1024)return(b/1024).toFixed(1)+' KB';
  return(b/(1024*1024)).toFixed(2)+' MB';
}

function updateStorageStatus(){
  const el=document.getElementById('storage-status');
  if(!el)return;
  const info=getStorageInfo();
  const color=info.pct>80?'var(--red)':info.pct>50?'var(--org)':'var(--grn)';
  el.innerHTML='<span style="color:'+color+'">'+fmtBytes(info.totalBytes)+'</span> / '+info.limitMB+'MB used ('+info.pct.toFixed(1)+'%)'

function tickTracker(){
  const now=new Date(),rate=parseFloat(S.schedule.hourlyRate)||0;
  if(!rate)return;
  const shift=getActiveShift(now);
  const p=S.pause;

  let liveSec=0;
  if(shift){
    if(p.paused&&p.pausedAt!=null)liveSec=p.pausedAt;
    else liveSec=secsIntoShift(now,toMin(shift.shift.start));
  }
  const brkLive=p.onBreak&&p.breakStart?Math.floor((now-p.breakStart)/1000):0;
  const totalBrk=p.accBreakSec+brkLive;
  const netSec=Math.max(0,liveSec-totalBrk);
  const oa=S.schedule.overtimeAfter,om=S.schedule.overtimeMultiplier,otMode=S.schedule.overtimeMode;

  const ws=getWeekStart(shift?shift.date:now,S.schedule.weekStartDay,S.schedule.weekStartTime);
  const wk=localStr(ws);
  const thisWk=S.log[wk]||{};
  const todayDk=shift?dayKey(shift.date):dayKey(now);
  const priorSec=Object.entries(thisWk).reduce((s,[k,v])=>k===todayDk?s:s+v,0);
  const covDays=csCoveredDays(wk);
  const todayCov=covDays.has(todayDk);
  // Include hourly CS hours (not on today) in prior pool for week-mode OT
  const csForWkTick=csInWeek(wk);
  const csHrSecTick=csForWkTick.filter(c=>c.type==='hourly'&&c.date!==todayDk).reduce((s,c)=>s+(parseFloat(c.hours)||0)*3600,0);
  const priorPool=priorSec+csHrSecTick;

  let earned=0;
  if(todayCov&&!shift) earned=csInWeek(wk).filter(c=>c.date===todayDk).reduce((s,c)=>s+csGross(c),0);
  else if(otMode==='week')earned=calcEarnings(priorPool+netSec,rate,oa,om)-calcEarnings(priorPool,rate,oa,om);
  else earned=calcEarnings(netSec,rate,oa,om);

  const ot=otMode==='week'?
    {inOT:(priorPool+netSec)>(parseFloat(oa)||Infinity)*3600,otHours:Math.max(0,(priorPool+netSec)/3600-(parseFloat(oa)||Infinity)),otRate:rate*(parseFloat(om)||1.5)}:
    {inOT:netSec/3600>(parseFloat(oa)||Infinity),otHours:Math.max(0,netSec/3600-(parseFloat(oa)||Infinity)),otRate:rate*(parseFloat(om)||1.5)};

  const el=document.getElementById('live-earned');if(el)el.textContent=fmt$(earned);
  const et=document.getElementById('live-time');if(et)et.textContent=fmtTime(netSec)+' worked'+(p.onBreak?` · ON BREAK ${fmtTime(brkLive)}`:'')+(totalBrk>0&&!p.onBreak?` · ${fmtTime(totalBrk)} breaks`:'');
  const otEl=document.getElementById('live-ot');if(otEl)otEl.style.display=ot.inOT?'inline-flex':'none';
  if(ot.inOT&&otEl)otEl.textContent=`OT (${otMode}) +${ot.otHours.toFixed(1)}h`;

  // color
  const bigEl=document.getElementById('live-earned');
  if(bigEl)bigEl.style.color=p.paused?'var(--acc)':ot.inOT?'var(--org)':'var(--grn)';

  // progress bar
  if(shift){
    const sm=toMin(shift.shift.start),em=toMin(shift.shift.end),tot=em<sm?em+1440-sm:em-sm;
    const pct=Math.min(100,(liveSec/60/tot)*100);
    const pb=document.getElementById('shift-bar');if(pb)pb.style.width=pct+'%';
    if(pb)pb.style.background=p.paused?'var(--acc)':ot.inOT?'var(--org)':'var(--grn)';
    const pp=document.getElementById('shift-pct');if(pp)pp.textContent=Math.round(pct)+'% shift complete';
  }

  // weekly OT bar
  if(S.schedule.overtimeMode==='week'&&S.schedule.overtimeAfter){
    const otAfterSec=(parseFloat(S.schedule.overtimeAfter)||0)*3600;
    const wpct=Math.min(100,((priorPool+netSec)/otAfterSec)*100);
    const wb=document.getElementById('week-ot-bar');if(wb){wb.style.width=wpct+'%';wb.style.background=ot.inOT?'var(--org)':'var(--blu)';}
    const wt=document.getElementById('week-ot-txt');if(wt)wt.textContent=`${((priorPool+netSec)/3600).toFixed(1)}h / ${S.schedule.overtimeAfter}h${ot.inOT?' · IN OT':''}`;
  }

  // dot badge
  const dot=document.getElementById('live-dot');
  if(dot){dot.className='live-dot'+(p.paused?' paused':p.onBreak?' on-break':'');}

  // break btn
  const bb=document.getElementById('break-btn');
  if(bb){bb.textContent=p.onBreak?'■ End Break':'⏱ Break';bb.style.color=p.onBreak?'var(--red)':'#c08050';bb.style.borderColor=p.onBreak?'rgba(192,80,80,.5)':'rgba(192,128,80,.3)';}

  // live day row gradient
  const ldr=document.getElementById('live-day-row');
  if(ldr&&shift){
    const shSm=toMin(shift.shift.start),shEm=toMin(shift.shift.end);
    const ov=shEm<shSm;
    const nowMin=now.getHours()*60+now.getMinutes();
    const nP=(nowMin/1440*100).toFixed(1);
    const sP=(shSm/1440*100).toFixed(1);
    const eP=(shEm/1440*100).toFixed(1);
    const g='rgba(93,232,160,',o='rgba(255,173,107,';
    if(ov){
      // Overnight live: this row is the starting day — show pre-midnight portion only.
      // If past midnight, clamp to 100% so gradient doesn't collapse backwards.
      const pastMid=nowMin<shSm;
      const nPcap=pastMid?'100':nP;
      ldr.style.background=p.onBreak
        ?'linear-gradient(180deg,transparent '+sP+'%,'+g+'0.18) '+sP+'%,'+g+'0.12) '+nPcap+'%,'+o+'0.15) '+nPcap+'%,'+o+'0.06) 100%)'
        :'linear-gradient(180deg,transparent '+sP+'%,'+g+'0.2) '+sP+'%,'+g+'0.1) '+nPcap+'%,transparent '+nPcap+'%)';
    }else{
      ldr.style.background=p.onBreak
        ?'linear-gradient(180deg,transparent '+sP+'%,'+g+'0.18) '+sP+'%,'+g+'0.12) '+nP+'%,'+o+'0.15) '+nP+'%,'+o+'0.06) '+eP+'%,transparent '+eP+'%)'
        :'linear-gradient(180deg,transparent '+sP+'%,'+g+'0.2) '+sP+'%,'+g+'0.1) '+nP+'%,transparent '+nP+'%)';
    }
  }

  // auto-log full shift when it ends (shift was active, now it's not)
  // This is handled in a separate interval — see autoLogCheck()

  // auto-save every 60s
  if(!p.paused&&shift&&netSec>0&&Math.floor(netSec)%60===0&&netSec>0){
    const todayDkNow=dayKey(shift.date);
    S.log={...S.log,[wk]:{...(S.log[wk]||{}),[todayDkNow]:netSec}};
    commitBreakLog(wk,todayDkNow);
    lsSet('log_v3',S.log);
    showToast(false);
  }
}

  const brkLive=p.onBreak&&p.breakStart?Math.floor((now-p.breakStart)/1000):0;

  const netSec=Math.max(0,liveSec-totalBrk);

  const priorPool=priorSec+csHrSecWk;

  else if(field==='depositAcct'){S.paychecks[wk].depositAcct=val;save('paychecks');return;}
  else S.paychecks[wk][field]=val;
  if(!S.paychecks[wk].amount)delete S.paychecks[wk];
  save('paychecks');
}

}

// Commit live break log from S.pause into persistent S.breakLog for a given shift day
function commitBreakLog(wk,dk){
  const bl=S.pause.breakLog||[];
  if(!bl.length)return;
  // Only commit breaks if they belong to this day (prevent cross-day phantom breaks)
  if(S.pause.dayKey&&S.pause.dayKey!==dk)return;
  const existing=(S.breakLog[wk]&&S.breakLog[wk][dk])||[];
  const ids=new Set(existing.map(b=>b.id));
  const merged=[...existing,...bl.filter(b=>!ids.has(b.id))];
  S.breakLog={...S.breakLog,[wk]:{...(S.breakLog[wk]||{}),[dk]:merged}};
  save('breakLog');
}

function handlePause(){
  const now=new Date(),shift=getActiveShift(now),p=S.pause;
  if(!shift)return;
  const liveSec=p.paused&&p.pausedAt!=null?p.pausedAt:secsIntoShift(now,toMin(shift.shift.start));
  const brkLive=p.onBreak&&p.breakStart?Math.floor((now-p.breakStart)/1000):0;
  const netSec=Math.max(0,liveSec-(p.accBreakSec+brkLive));
  const ws=getWeekStart(shift.date,S.schedule.weekStartDay,S.schedule.weekStartTime);
  const wk=localStr(ws);
  if(!p.paused){
    // LEFT EARLY: save netSec as final for this shift day, freeze it
    const dk=dayKey(shift.date);
    S.log={...S.log,[wk]:{...(S.log[wk]||{}),[dk]:netSec}};
    commitBreakLog(wk,dk);
    S.pause={...p,paused:true,pausedAt:netSec,dayKey:dk};
    save('log');save('pause');
  }else{
    // Resume: clear pause but keep the saved log value — don't let live time grow beyond saved
    S.pause={...p,paused:false,pausedAt:null,dayKey:dayKey(now)};
    save('pause');
  }
  render();
}

function handleManualSave(){
  const now=new Date(),shift=getActiveShift(now),p=S.pause;
  if(!shift)return;
  const liveSec=p.paused&&p.pausedAt!=null?p.pausedAt:secsIntoShift(now,toMin(shift.shift.start));
  const brkLive=p.onBreak&&p.breakStart?Math.floor((now-p.breakStart)/1000):0;
  const netSec=Math.max(0,liveSec-(p.accBreakSec+brkLive));
  const ws=getWeekStart(shift.date,S.schedule.weekStartDay,S.schedule.weekStartTime);
  const wk=localStr(ws);
  const dk=dayKey(shift.date);
  S.log={...S.log,[wk]:{...(S.log[wk]||{}),[dk]:netSec}};
  commitBreakLog(wk,dk);
  save('log');showToast(true);
}

let _breakLock=0;
function handleBreak(){
  const now=Date.now();if(now-_breakLock<500)return;_breakLock=now;
  const nd=new Date(),p=S.pause;
  // Use active shift date as dayKey so overnight shifts correctly attribute breaks to shift start day
  const activeShift=getActiveShift(nd);
  const dk=p.dayKey||(activeShift?dayKey(activeShift.date):dayKey(nd));
  if(!p.onBreak){
    S.pause={...p,onBreak:true,breakStart:now,dayKey:dk};
  }else{
    const elapsed=p.breakStart?Math.floor((now-p.breakStart)/1000):0;
    const log=[...(p.breakLog||[]),{id:Date.now().toString(),type:'manual',sec:elapsed,time:now}];
    S.pause={...p,onBreak:false,breakStart:null,accBreakSec:(p.accBreakSec||0)+elapsed,dayKey:dk,breakLog:log};
  }
  save('pause');
  // Immediately commit breaks to persistent breakLog so they survive app restart
  if(!S.pause.onBreak&&S.pause.breakLog?.length){
    const activeShift2=getActiveShift(new Date());
    if(activeShift2){
      const ws2=getWeekStart(activeShift2.date,S.schedule.weekStartDay,S.schedule.weekStartTime);
      commitBreakLog(localStr(ws2),dk);
    }
  }
  // Re-render to show updated break list immediately
  if(S.app==='tracker'&&S.trackerTab==='tracker')render();
}

function removeBreak(id){
  const p=S.pause;
  const log=[...(p.breakLog||[])];
  const idx=log.findIndex(b=>b.id===id);
  if(idx<0)return;
  const entry=log[idx];
  log.splice(idx,1);
  S.pause={...p,accBreakSec:Math.max(0,(p.accBreakSec||0)-entry.sec),breakLog:log};
  save('pause');render();
}

// Delete a committed break entry from history and add its seconds back to net log
function delBreakEntry(wk,dk,id){
  const dayBreaks=(S.breakLog[wk]&&S.breakLog[wk][dk])||[];
  const removed=dayBreaks.find(b=>b.id===id);
  if(!removed)return;
  const updated=dayBreaks.filter(b=>b.id!==id);
  S.breakLog={...S.breakLog,[wk]:{...(S.breakLog[wk]||{}),[dk]:updated}};
  if(S.log[wk]&&S.log[wk][dk]!=null){
    S.log={...S.log,[wk]:{...(S.log[wk]||{}),[dk]:(S.log[wk][dk]||0)+removed.sec}};
    save('log');
  }
  save('breakLog');
  renderHistoryTab(parseFloat(S.schedule.hourlyRate)||0);
}

// Auto-log full shift at shift end
function autoLogCheck(){
  const now=new Date(),rate=parseFloat(S.schedule.hourlyRate)||0;
  if(!rate)return;
  const sch=S.schedule;
  for(let dow=0;dow<7;dow++){
    const sh=sch.shifts[dow];if(!sh?.active)continue;
    const sm=toMin(sh.start),em=toMin(sh.end),overnight=em<sm;
    if(overnight){
      const endMin=now.getHours()*60+now.getMinutes();
      if(now.getDay()===((dow+1)%7)&&endMin>=em&&endMin<em+15){
        const sd=new Date(now);sd.setDate(sd.getDate()-1);
        if(sd.getDay()===dow){
          const ws=getWeekStart(sd,sch.weekStartDay,sch.weekStartTime);
          const wk=localStr(ws),dk=dayKey(sd);
          if(!(S.log[wk]&&S.log[wk][dk])){
            const dur=em+1440-sm;
            const _cbl=(S.breakLog[wk]&&S.breakLog[wk][dk])||[];
            const _cblIds=new Set(_cbl.map(b=>b.id));
            const _pbl=(S.pause.dayKey===dk)?(S.pause.breakLog||[]).filter(b=>!_cblIds.has(b.id)):[];
            const _brkSec=[..._cbl,..._pbl].reduce((s,b)=>s+b.sec,0);
            const _netDur=Math.max(0,dur*60-_brkSec);
            S.log={...S.log,[wk]:{...(S.log[wk]||{}),[dk]:_netDur}};
            commitBreakLog(wk,dk);
            lsSet('log_v3',S.log);showToast(false);
          }
        }
      }
    } else {
      if(now.getDay()===dow){
        const nowMin=now.getHours()*60+now.getMinutes();
        if(nowMin>=em&&nowMin<em+15){
          const ws=getWeekStart(now,sch.weekStartDay,sch.weekStartTime);
          const wk=localStr(ws),dk=dayKey(now);
          if(!(S.log[wk]&&S.log[wk][dk])){
            const dur=em-sm;
            const _cbl=(S.breakLog[wk]&&S.breakLog[wk][dk])||[];
            const _cblIds=new Set(_cbl.map(b=>b.id));
            const _pbl=(S.pause.dayKey===dk)?(S.pause.breakLog||[]).filter(b=>!_cblIds.has(b.id)):[];
            const _brkSec=[..._cbl,..._pbl].reduce((s,b)=>s+b.sec,0);
            const _netDur=Math.max(0,dur*60-_brkSec);
            S.log={...S.log,[wk]:{...(S.log[wk]||{}),[dk]:_netDur}};
            commitBreakLog(wk,dk);
            lsSet('log_v3',S.log);showToast(false);
          }
        }
      }
    }
  }
}

// On app launch: back-fill any missed shifts from the last 2 days
function backfillMissedShifts(){
  const now=new Date(),rate=parseFloat(S.schedule.hourlyRate)||0;
  if(!rate)return;
  const sch=S.schedule;
  let changed=false;
  // Check yesterday and day before for shifts that ended but were never logged
  for(let daysBack=0;daysBack<=2;daysBack++){
    const checkDate=new Date(now);checkDate.setDate(checkDate.getDate()-daysBack);
    const dow=checkDate.getDay();
    const sh=sch.shifts[dow];if(!sh?.active)continue;
    const sm=toMin(sh.start),em=toMin(sh.end),overnight=em<sm;
    const dur=overnight?em+1440-sm:em-sm;
    // Determine when this shift ended
    const shiftEnd=new Date(checkDate);
    if(overnight){
      shiftEnd.setDate(shiftEnd.getDate()+1);
      shiftEnd.setHours(Math.floor(em/60),em%60,0,0);
    } else {
      shiftEnd.setHours(Math.floor(em/60),em%60,0,0);
    }
    // Only back-fill if the shift has fully ended (not currently active)
    if(now<shiftEnd)continue;
    const ws=getWeekStart(checkDate,sch.weekStartDay,sch.weekStartTime);
    const wk=localStr(ws),dk=dayKey(checkDate);
    // Skip if covered by custom shift
    if(csCoveredDays(wk).has(dk))continue;
    // Skip if the pause state shows this shift was explicitly paused (Left Early)
    // — pausedAt contains the actual worked seconds
    const ps=lsGet('pause_v3');
    if(ps&&ps.paused&&ps.dayKey===dk&&ps.pausedAt!=null)continue;
    const fullSec=dur*60;
    const _cbl=(S.breakLog[wk]&&S.breakLog[wk][dk])||[];
    const _cblIds=new Set(_cbl.map(b=>b.id));
    const _pbl=(ps&&ps.dayKey===dk)?(ps.breakLog||[]).filter(b=>!_cblIds.has(b.id)):[];
    const _brkSec=[..._cbl,..._pbl].reduce((s,b)=>s+b.sec,0);
    const netFullSec=Math.max(0,fullSec-_brkSec);
    const existingSec=S.log[wk]&&S.log[wk][dk];
    if(existingSec&&existingSec>=netFullSec)continue;
    S.log={...S.log,[wk]:{...(S.log[wk]||{}),[dk]:netFullSec}};
    // Commit any pending pause breaks for this day into persistent breakLog
    if(_pbl.length){
      const merged=[..._cbl,..._pbl];
      S.breakLog={...S.breakLog,[wk]:{...(S.breakLog[wk]||{}),[dk]:merged}};
      lsSet('break_log_v1',S.breakLog);
      // Clear committed breaks from pause state to prevent re-application
      if(ps&&ps.dayKey===dk){
        const clearedPause={...ps,breakLog:[],accBreakSec:0,onBreak:false,breakStart:null};
        lsSet('pause_v3',clearedPause);
        if(S.pause.dayKey===dk)S.pause=clearedPause;
      }
    }
    changed=true;
  }
  if(changed){lsSet('log_v3',S.log);}
}

function purgeLogDay(dateStr){
  // Remove a single day's log entry so a custom shift can't double-count
  const wkStr=localStr(getWeekStart(parseLocal(dateStr),S.schedule.weekStartDay,S.schedule.weekStartTime));
  if(!S.log[wkStr]||!S.log[wkStr][dateStr])return;
  const wkMap={...S.log[wkStr]};
  delete wkMap[dateStr];
  if(Object.keys(wkMap).length>0)S.log={...S.log,[wkStr]:wkMap};
  else{const l={...S.log};delete l[wkStr];S.log=l;}
  lsSet('log_v3',S.log);
}
function saveCS(){
  if(!_csForm.date)return;
  if(_csForm.type==='hourly'){
    if(!_csForm.start||!_csForm.end||!_csForm.rate)return;
    const sm=toMin(_csForm.start),em=toMin(_csForm.end);
    const grossHrs=(em<sm?em+1440-sm:em-sm)/60;
    const brkHrs=(parseFloat(_csForm.breakMins)||0)/60;
    _csForm.hours=String(Math.max(0,grossHrs-brkHrs).toFixed(4));
  }
  if(_csForm.type==='flat'&&!_csForm.gross)return;
  purgeLogDay(_csForm.date);
  S.customShifts=[...S.customShifts,{..._csForm,id:Date.now().toString()}];
  save('customShifts');_csFormOpen=false;render();
}

const _hdtStart={};

function editHistDayStart(wk,dk,v){

function applyHistDayEdit(wk,dk){
  // Read current values directly from DOM inputs (onchange may not have fired on iOS)
  const startEl=document.getElementById('hdt-start-'+dk);
  const endEl=document.getElementById('hdt-end-'+dk);
  const startVal=startEl?startEl.value:_hdtStart[dk];
  const endVal=endEl?endEl.value:(_hdtEnd[dk]?_hdtEnd[dk].v:null);
  if(!startVal||!endVal)return;
  const sm=toMin(startVal),em=toMin(endVal);
  const grossSec=(em<sm?em+1440-sm:em-sm)*60;
  if(grossSec<=0)return;
  const breaks=(S.breakLog[wk]&&S.breakLog[wk][dk])||[];
  const breakSec=breaks.reduce((s,b)=>s+b.sec,0);
  const netSec=Math.max(0,grossSec-breakSec);
  // Check for hourly custom shift on this day — update it instead of S.log
  const csMatch=S.customShifts.find(c=>c.date===dk&&c.type==='hourly');
  if(csMatch){
    const grossHrs=(grossSec/3600);
    const brkMins=Math.round(breakSec/60);
    csMatch.start=startVal;
    csMatch.end=endVal;
    csMatch.breakMins=String(brkMins);
    csMatch.hours=String(Math.max(0,grossHrs-(brkMins/60)).toFixed(4));
    save('customShifts');
  }else{
    S.log={...S.log,[wk]:{...(S.log[wk]||{}),[dk]:netSec}};
    save('log');
  }
  S.shiftTimes={...S.shiftTimes,[wk]:{...(S.shiftTimes[wk]||{}),[dk]:startVal}};
  save('shiftTimes');
  delete _hdtEnd[dk];
  delete _hdtStart[dk];
  renderHistoryTab(parseFloat(S.schedule.hourlyRate)||0);
}

    const activeDayCount=Object.values(S.schedule.shifts).filter(s=>s.active).length||1;
    const impliedHrsPerDay=r>0?(g/r/activeDayCount):0;
    grossPreview=`<div style="font-size:11px;color:var(--acc);margin-bottom:10px;letter-spacing:1px">→ ${fmt$(g)} gross${th>0?` · ${fmt$(th)} take-home`:''}${impliedHrsPerDay>0?` · ~${impliedHrsPerDay.toFixed(1)}h/day avg`:''}</div>`;
  }
  if(secs&&r){
    const netSecs=Math.max(0,secs-brkSec);
    const brkNote=brkSec>0?` &minus; ${fmtTime(brkSec)} breaks = ${(netSecs/3600).toFixed(2)}h net`:'';
    preview=`<div style="font-size:11px;color:var(--acc);margin-bottom:10px;letter-spacing:1px">→ ${f.inputType==='weekly'?`${(secs/3600).toFixed(1)}h week`:`${(secs/3600).toFixed(2)}h`}${brkNote} · ${fmt$(calcEarnings(netSecs,r,S.schedule.overtimeAfter,S.schedule.overtimeMultiplier))} gross at $${r.toFixed(2)}/hr</div>`;
  }
  return`<div class="inline-form mb14" id="hist-form-area">
    <div class="label">New Historical Entry</div>
    <div class="form-row">
      <div><div class="label2">${f.inputType==='weekly'||f.inputType==='gross'?'Any Date in That Week':'Date'}</div><input type="date" value="${f.date}" onchange="hff('date',this.value)"></div>

    ${f.inputType==='gross'?`<div class="mb12"><div class="form-row">
      <div><div class="label2">Gross Pay</div><div class="inp-row"><span class="pre">$</span><input type="number" min="0" step=".01" placeholder="0.00" value="${f.gross}" inputmode="decimal" oninput="hffStore('gross',this.value)" onblur="hff('gross',this.value)" style="border:none;background:transparent;font-size:18px;padding:8px 4px"></div></div>
      <div><div class="label2">Take-Home (optional)</div><div class="inp-row"><span class="pre">$</span><input type="number" min="0" step=".01" placeholder="0.00" value="${f.takehome}" inputmode="decimal" oninput="hffStore('takehome',this.value)" onblur="hff('takehome',this.value)" style="border:none;background:transparent;font-size:18px;padding:8px 4px"></div></div>
    </div>${grossPreview}</div>`:''}
    ${f.inputType==='hours'?`<div class="form-row mb12">
      <div><div class="label2">Hours Worked</div><input type="number" min="0" step=".25" placeholder="10.5" value="${f.hours}" inputmode="decimal" oninput="hffStore('hours',this.value)" onblur="hff('hours',this.value)"></div>
      <div><div class="label2">Break (min, optional)</div><input type="number" min="0" step="5" placeholder="0" value="${f.breakMins}" inputmode="numeric" oninput="hffStore('breakMins',this.value)" onblur="hff('breakMins',this.value)"></div>
    </div>`:''}
    ${f.inputType==='times'?`<div class="flex gap8 mb10 items-center"><div class="f1"><div class="label2">Start</div><input type="time" value="${f.start}" onchange="hff('start',this.value)"></div><span class="mut" style="margin-top:14px">→</span><div class="f1"><div class="label2">End</div><input type="time" value="${f.end}" onchange="hff('end',this.value)"></div></div>
    <div class="mb12"><div class="label2">Break (min, optional)</div><input type="number" min="0" step="5" placeholder="0" value="${f.breakMins}" inputmode="numeric" oninput="hffStore('breakMins',this.value)" onblur="hff('breakMins',this.value)" style="width:120px"></div>`:''}
    ${f.inputType==='weekly'?`<div class="mb12"><div class="label2">Total Hours for the Week</div><input type="number" min="0" step=".25" placeholder="40.0" value="${f.weekHours}" inputmode="decimal" oninput="hffStore('weekHours',this.value)" onblur="hff('weekHours',this.value)"><div style="font-size:9px;color:var(--mut);margin-top:6px;line-height:1.6">Split proportionally across ${Object.values(S.schedule.shifts).filter(s=>s.active).length} active days by shift length.</div></div>`:''}
    ${f.inputType!=='gross'?`<div class="mb14"><div class="label2">Rate Override (blank = $${rate.toFixed(2)}/hr)</div><div class="inp-row"><span class="pre">$</span><input type="number" min="0" step=".25" placeholder="${rate.toFixed(2)}" value="${f.rate}" inputmode="decimal" oninput="hffStore('rate',this.value)" onblur="hff('rate',this.value)" style="border:none;background:transparent;font-size:15px;padding:7px 4px"><span style="padding:0 10px;color:var(--mut);font-size:11px">/hr</span></div></div>`:''}
    ${preview}
    <button class="btn-acc" style="width:100%" onclick="saveHistEntry()">Save Entry</button>
  </div>`;
}
function saveHistEntry(){
  const f=_hForm,rate=parseFloat(S.schedule.hourlyRate)||0,er=parseFloat(f.rate)||rate;
  if(!f.date)return;
  const brkSec=(parseFloat(f.breakMins)||0)*60;

  if(f.inputType==='gross'){
    const g=parseFloat(f.gross)||0;if(g<=0)return;
    const th=parseFloat(f.takehome)||0;
    const activeDays=Object.values(S.schedule.shifts).filter(s=>s.active).length||1;
    const impliedHrsPerDay=er>0?(g/er/activeDays):0;
    const ref=parseLocal(f.date);
    const wkStr=localStr(getWeekStart(ref,S.schedule.weekStartDay,S.schedule.weekStartTime));
    purgeLogDay(f.date);
    S.customShifts=[...S.customShifts,{id:Date.now().toString(),label:f.note||(impliedHrsPerDay>0?`~${impliedHrsPerDay.toFixed(1)}h/day avg`:'Weekly pay'),date:f.date,type:'flat',gross:String(g)}];
    if(th>0){if(!S.paychecks[wkStr])S.paychecks[wkStr]={};S.paychecks[wkStr].amount=th;S.paychecks[wkStr].date=f.date;save('paychecks');}
    save('customShifts');_hFormOpen=false;render();return;
  }

  if(f.inputType==='weekly'){
    const totalHrs=parseFloat(f.weekHours)||0;if(totalHrs<=0)return;
    const ref=parseLocal(f.date);
    const usedRate=er>0?er:rate;
    S.customShifts=[...S.customShifts,{id:Date.now().toString(),label:f.note||'Weekly historical',date:f.date,type:'hourly',hours:String(totalHrs),rate:String(usedRate)}];
    save('customShifts');_hFormOpen=false;render();return;
  }

  let grossSecs=0;
  if(f.inputType==='hours')grossSecs=(parseFloat(f.hours)||0)*3600;
  else{const sm=toMin(f.start),em=toMin(f.end);grossSecs=em<sm?(em+1440-sm)*60:(em-sm)*60;}
  if(grossSecs<=0)return;
  const netSecs=Math.max(0,grossSecs-brkSec);
  const d=parseLocal(f.date),ewk=localStr(getWeekStart(d,S.schedule.weekStartDay,S.schedule.weekStartTime)),dk=dayKey(d);

  if(er!==rate&&er>0){
    // Rate override — store as custom shift (no break log for custom shifts)
    S.customShifts=[...S.customShifts,{id:Date.now().toString(),label:f.note||'Historical entry',date:f.date,type:'hourly',hours:String(netSecs/3600),rate:String(er)}];
    save('customShifts');_hFormOpen=false;render();return;
  }

  S.log={...S.log,[ewk]:{...(S.log[ewk]||{}),[dk]:netSecs}};
  // Store break as a log entry if break minutes were entered
  if(brkSec>0){
    const bl=(S.breakLog[ewk]&&S.breakLog[ewk][dk])||[];
    S.breakLog={...S.breakLog,[ewk]:{...(S.breakLog[ewk]||{}),[dk]:[...bl,{id:Date.now().toString(),type:'manual',sec:brkSec,label:'Break (entered)'}]}};
    save('breakLog');
  }
  save('log');_hFormOpen=false;render();
}
