<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ledge">
<meta name="theme-color" content="#080a14">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Ledge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@300;400;500&display=swap');

:root{
  /* Deep space base */
  --bg:#07080f;
  --bg2:#0b0d18;

  /* Glass surfaces — translucent layered */
  --surf:rgba(255,255,255,0.055);
  --surf2:rgba(255,255,255,0.032);
  --surf3:rgba(255,255,255,0.08);
  --surf-solid:#0e1120;

  /* Borders — barely-there glass edges */
  --bdr:rgba(255,255,255,0.09);
  --bdrh:rgba(255,255,255,0.18);
  --bdr-glow:rgba(120,160,255,0.22);

  /* Accent — liquid iridescent blue-white */
  --acc:#a8c7ff;
  --acc2:#7eb4ff;
  --accd:rgba(168,199,255,0.12);
  --acc-glow:rgba(168,199,255,0.35);

  /* Semantic colors — luminous glass tints */
  --grn:#5de8a0;  --grnd:rgba(93,232,160,0.1);
  --red:#ff6b7a;  --redd:rgba(255,107,122,0.1);
  --org:#ffad6b;  --orgd:rgba(255,173,107,0.1);
  --blu:#7eb4ff;  --blud:rgba(126,180,255,0.1);
  --pur:#c4a0ff;  --purd:rgba(196,160,255,0.1);
  --cya:#6be8e8;

  /* Text */
  --txt:rgba(255,255,255,0.92);
  --txt2:rgba(255,255,255,0.6);
  --mut:rgba(255,255,255,0.35);
  --mut2:rgba(255,255,255,0.15);

  /* Glass effects */
  --glass-blur:blur(24px) saturate(180%);
  --glass-blur-sm:blur(12px) saturate(160%);
  --shadow-glass:0 8px 32px rgba(0,0,0,0.4),0 1px 0 rgba(255,255,255,0.08) inset;
  --shadow-card:0 4px 24px rgba(0,0,0,0.3),0 1px 0 rgba(255,255,255,0.06) inset;
  --shadow-glow:0 0 40px rgba(168,199,255,0.15);

  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);

  --radius:16px;
  --radius-sm:10px;
  --radius-xs:7px;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

html{
  height: 100%;
  background:#080a14;
}
body{
  height: 100%;
  background:#080a14;
  overflow:hidden;
  font-family:'DM Sans',system-ui,-apple-system,sans-serif;
  color:var(--txt);
  position:fixed;top:0;left:0;right:0;bottom:0;width:100%;
}

/* Animated background — slow shifting nebula */
body::before{
  content:'';
  position:fixed;top:0;left:0;right:0;bottom:0;
  z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(80,120,255,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 85% 30%, rgba(168,100,255,0.12) 0%, transparent 55%),
    radial-gradient(ellipse 70% 50% at 50% 90%, rgba(60,180,255,0.10) 0%, transparent 60%),
    linear-gradient(160deg, #07080f 0%, #0b0d1a 50%, #080c14 100%);
  pointer-events:none;
}

#app-outer{
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;align-items:stretch;justify-content:center;
  background:transparent;
  z-index:1;
}

#app{
  display:flex;flex-direction:column;
  position:fixed;
  top:0;bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;max-width:560px;
  overflow:hidden;
  padding-top:env(safe-area-inset-top,0px);
}

/* ── App Switcher (top) ─────────────────────────────── */
#app-switch{
  display:flex;
  background:rgba(10,12,24,0.7);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border-bottom:1px solid var(--bdr);
  flex-shrink:0;
  position:relative;
  z-index:10;
}
#app-switch::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(168,199,255,0.2),transparent);
}
#app-switch button{
  flex:1;padding:11px 4px 9px;
  background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  font-family:inherit;
  transition:opacity 0.2s;
}
#app-switch button .sw-icon{font-size:16px;color:var(--mut);transition:all 0.25s}
#app-switch button .sw-lbl{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);font-family:'DM Mono',monospace;transition:all 0.25s}
#app-switch button.active .sw-icon{color:var(--acc);filter:drop-shadow(0 0 8px var(--acc-glow))}
#app-switch button.active .sw-lbl{color:var(--acc)}
#app-switch button.active{
  background:linear-gradient(180deg,rgba(168,199,255,0.08) 0%,transparent 100%);
  border-bottom:1.5px solid var(--acc);
}

/* ── Scroll content ─────────────────────────────────── */
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:none}
#content::-webkit-scrollbar{display:none}

/* ── Side Nav (Left Vertical Pill) ──────────────────── */
#bottom-nav{
  position:absolute;
  left:4px;
  bottom:15%;
  height:40%;
  z-index:9999;
  width:48px;
  /* Glass pill */
  background:rgba(8,10,20,0.72);
  backdrop-filter:blur(28px) saturate(180%);
  -webkit-backdrop-filter:blur(28px) saturate(180%);
  border:1px solid var(--bdr);
  border-radius:26px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5),0 1px 0 rgba(255,255,255,0.06) inset;
  overflow:hidden;
  transition:height 0.3s ease;
}
#bottom-nav::before{
  content:'';position:absolute;top:8px;bottom:8px;right:0;width:1px;
  background:linear-gradient(180deg,transparent,rgba(168,199,255,0.18),transparent);
}
/* Vertical button column */
#bottom-nav>div{
  display:flex;flex-direction:column;
  width:100%;height:100%;
  justify-content:space-evenly;
  align-items:center;
}
#bottom-nav button{
  width:100%;
  padding:6px 4px;
  background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-family:inherit;
  transition:all 0.2s;
  position:relative;
  flex:1;
  justify-content:center;
}
#bottom-nav button .n-icon{font-size:15px;color:var(--mut);transition:all 0.25s}
#bottom-nav button .n-lbl{font-size:6px;letter-spacing:1px;text-transform:uppercase;color:var(--mut);font-family:'DM Mono',monospace;transition:all 0.25s;white-space:nowrap}
#bottom-nav button.active .n-icon{color:var(--acc);filter:drop-shadow(0 0 8px var(--acc-glow))}
#bottom-nav button.active .n-lbl{color:var(--acc)}
#bottom-nav button.active{
  background:linear-gradient(90deg,rgba(168,199,255,0.10) 0%,transparent 100%);
  box-shadow:inset 3px 0 0 0 var(--acc), inset 6px 0 12px -4px var(--acc-glow);
}

/* ── Splash ─────────────────────────────────────────── */
#splash{
  position:fixed;top:0;left:0;right:0;bottom:0;
  z-index:99998;
  background:linear-gradient(160deg,#07080f,#0b0d1a);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  font-family:'DM Sans',sans-serif;
  transition:opacity 0.6s ease;
}
#splash.fade{opacity:0;pointer-events:none}
#splash.gone{display:none}
.splash-ring{
  width:52px;height:52px;border-radius:50%;
  border:1.5px solid rgba(168,199,255,0.15);
  border-top-color:var(--acc);
  animation:spin 1s linear infinite;
  filter:drop-shadow(0 0 12px rgba(168,199,255,0.4));
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PIN overlay ────────────────────────────────────── */
#pin-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(160deg,rgba(7,8,15,0.96),rgba(11,13,26,0.98));
  backdrop-filter:blur(40px);
  -webkit-backdrop-filter:blur(40px);
  z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  padding-bottom:env(safe-area-inset-bottom,0px);
  padding-top:env(safe-area-inset-top,0px);
  font-family:'DM Sans',sans-serif;
}
#pin-overlay.hidden{display:none}
.pin-dots{display:flex;gap:14px}
.pin-dot{
  width:13px;height:13px;border-radius:50%;
  border:1.5px solid var(--bdrh);
  background:transparent;
  transition:all 0.2s;
}
.pin-dot.filled{
  background:var(--acc);
  border-color:var(--acc);
  box-shadow:0 0 14px var(--acc-glow);
}
.pin-dot.error{background:var(--red);border-color:var(--red);box-shadow:0 0 14px rgba(255,107,122,0.5)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:248px}
.pin-btn{
  padding:20px;font-size:22px;font-weight:400;
  background:var(--surf);
  backdrop-filter:var(--glass-blur-sm);
  -webkit-backdrop-filter:var(--glass-blur-sm);
  border:1px solid var(--bdr);
  color:var(--txt);border-radius:var(--radius);
  cursor:pointer;letter-spacing:0;
  box-shadow:var(--shadow-card);
  transition:all 0.15s;
  font-family:'DM Sans',sans-serif;
}
.pin-btn:active{
  background:rgba(168,199,255,0.12);
  border-color:var(--bdr-glow);
  transform:scale(0.95);
}

/* ── Toast ──────────────────────────────────────────── */
#save-toast{
  position:fixed;left:50%;transform:translateX(-50%);
  bottom:24px;
  background:rgba(93,232,160,0.12);
  backdrop-filter:var(--glass-blur-sm);
  -webkit-backdrop-filter:var(--glass-blur-sm);
  border:1px solid rgba(93,232,160,0.25);
  color:var(--grn);
  font-size:9px;letter-spacing:2px;
  padding:7px 16px;
  display:flex;align-items:center;gap:7px;
  border-radius:20px;
  opacity:0;transition:opacity 0.3s,transform 0.3s;
  transform:translateX(-50%) translateY(6px);
  pointer-events:none;z-index:100;
  white-space:nowrap;
  font-family:'DM Mono',monospace;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
#save-toast.manual{
  background:rgba(168,199,255,0.1);
  border-color:rgba(168,199,255,0.3);
  color:var(--acc);
}
#save-toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
#save-toast .toast-dot{width:5px;height:5px;border-radius:50%;background:currentColor}

/* ── Page container ─────────────────────────────────── */
.page{padding:16px 16px 16px 60px;max-width:560px;margin:0 auto}

/* ── Typography ─────────────────────────────────────── */
.label{
  font-size:10px;letter-spacing:2px;
  color:var(--mut);text-transform:uppercase;
  margin-bottom:8px;
  font-family:'DM Mono',monospace;
  font-weight:400;
}
.label2{
  font-size:9px;letter-spacing:1.5px;
  color:var(--mut);text-transform:uppercase;
  margin-bottom:6px;
  font-family:'DM Mono',monospace;
}
.hero{font-size:40px;font-weight:300;color:var(--acc);line-height:1;letter-spacing:-0.5px}
.section{margin-bottom:20px}

/* ── Cards ──────────────────────────────────────────── */
.card{
  background:var(--surf);
  border:1px solid var(--bdr);
  border-radius:var(--radius);
  padding:14px 16px;
  margin-bottom:12px;
  box-shadow:var(--shadow-card);
  position:relative;
  overflow:hidden;
}
/* Apply glass blur only to prominent single cards, not grids */
.card.glass{
  backdrop-filter:var(--glass-blur-sm);
  -webkit-backdrop-filter:var(--glass-blur-sm);
}
/* Specular top edge on cards */
.card::before{
  content:'';position:absolute;top:0;left:8px;right:8px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);
}
.card.accent-l{border-left:2px solid var(--acc);box-shadow:var(--shadow-card),-3px 0 20px rgba(168,199,255,0.08)}
.card.green-l{border-left:2px solid var(--grn);box-shadow:var(--shadow-card),-3px 0 20px rgba(93,232,160,0.08)}
.card.red-l{border-left:2px solid var(--red);box-shadow:var(--shadow-card),-3px 0 20px rgba(255,107,122,0.08)}
.card.blue-l{border-left:2px solid var(--blu);box-shadow:var(--shadow-card),-3px 0 20px rgba(126,180,255,0.08)}
.card.bdr-l{border-left:2px solid var(--bdrh)}

/* ── Form elements ──────────────────────────────────── */
input,select,textarea{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--bdr);
  color:var(--txt);
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  padding:9px 12px;
  outline:none;
  width:100%;
  -webkit-appearance:none;
  border-radius:var(--radius-xs);
  transition:border-color 0.2s,box-shadow 0.2s;
}
input:focus,select:focus,textarea:focus{
  border-color:rgba(168,199,255,0.4);
  box-shadow:0 0 0 3px rgba(168,199,255,0.08);
  background:rgba(168,199,255,0.04);
}
select option{background:#0e1120;color:var(--txt)}
.inp-row{
  display:flex;align-items:center;
  border:1px solid var(--bdr);
  background:rgba(255,255,255,0.04);
  border-radius:var(--radius-xs);
  overflow:hidden;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.inp-row:focus-within{
  border-color:rgba(168,199,255,0.4);
  box-shadow:0 0 0 3px rgba(168,199,255,0.08);
}
.inp-row .pre{
  padding:0 11px;
  color:var(--mut);
  font-size:16px;
  flex-shrink:0;
  border-right:1px solid var(--bdr);
}
.inp-row input{
  border:none;flex:1;
  font-size:18px;padding:9px 8px;
  background:transparent;
  border-radius:0;
  box-shadow:none;
}
.inp-row input:focus{box-shadow:none;border:none}

/* ── Buttons ────────────────────────────────────────── */
button{
  cursor:pointer;
  font-family:'DM Sans',sans-serif;
  font-size:11px;letter-spacing:1px;
  text-transform:uppercase;
  padding:9px 18px;
  border:none;
  background:transparent;
  color:var(--mut);
  border-radius:var(--radius-xs);
  transition:all 0.18s;
  font-weight:500;
}
.btn-acc{
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  color:#07080f;
  font-weight:600;
  box-shadow:0 2px 16px rgba(168,199,255,0.25);
  border-radius:var(--radius-sm);
}
.btn-acc:active{transform:scale(0.97);box-shadow:0 1px 8px rgba(168,199,255,0.2)}
.btn-ghost{
  border:1px solid var(--bdrh);
  color:var(--txt2);
  background:var(--surf);
  backdrop-filter:var(--glass-blur-sm);
  -webkit-backdrop-filter:var(--glass-blur-sm);
}
.btn-ghost:active{background:var(--surf3)}
.btn-red{border:1px solid rgba(255,107,122,0.3);color:var(--red)}
.btn-grn{border:1px solid rgba(93,232,160,0.3);color:var(--grn)}
.btn-sm{font-size:9px;padding:5px 11px;letter-spacing:0.5px}

/* ── Tabs row ───────────────────────────────────────── */
.tab-row{
  display:flex;
  border:1px solid var(--bdr);
  border-radius:var(--radius-sm);
  margin-bottom:16px;
  background:var(--surf2);
  overflow:hidden;
  padding:3px;
  gap:2px;
}
.tab-row button{
  flex:1;padding:7px 4px;
  background:transparent;border:none;
  font-size:9px;letter-spacing:1px;
  color:var(--mut);font-weight:500;
  border-radius:8px;
  transition:all 0.2s;
  font-family:'DM Mono',monospace;
}
.tab-row button.active{
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  color:#07080f;
  font-weight:600;
  box-shadow:0 2px 10px rgba(168,199,255,0.2);
}

/* ── Rows ───────────────────────────────────────────── */
.row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.row .rl{font-size:12px;color:var(--txt2);letter-spacing:0.2px}
.row .rr{font-size:13px;color:var(--txt)}
.row.bold .rl{color:var(--txt)}
.row.bold .rr{font-size:16px;font-weight:600}

/* ── Toggle ─────────────────────────────────────────── */
.toggle{
  width:36px;height:20px;border-radius:10px;
  border:none;position:relative;flex-shrink:0;
  transition:all 0.25s;
  cursor:pointer;
}
.toggle.on{
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  box-shadow:0 0 12px rgba(168,199,255,0.3);
}
.toggle.off{background:rgba(255,255,255,0.1)}
.toggle::after{
  content:'';position:absolute;top:3px;
  width:14px;height:14px;border-radius:50%;
  background:rgba(255,255,255,0.5);
  transition:left 0.25s,background 0.25s;
  box-shadow:0 1px 4px rgba(0,0,0,0.3);
}
.toggle.on::after{left:19px;background:white}
.toggle.off::after{left:3px}

/* ── Progress bars ──────────────────────────────────── */
.bar-wrap{
  height:5px;
  background:rgba(255,255,255,0.06);
  position:relative;border-radius:3px;overflow:hidden;
}
.bar-fill{height:100%;border-radius:3px;transition:width 0.4s ease}
.prog{
  height:4px;
  background:rgba(255,255,255,0.06);
  border-radius:2px;overflow:hidden;margin-top:5px;
}
.prog-fill{height:100%;border-radius:2px}

/* ── Chips ──────────────────────────────────────────── */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{
  padding:6px 11px;
  border:1px solid var(--bdr);
  background:var(--surf);
  color:var(--mut);
  font-size:9px;letter-spacing:0.5px;
  cursor:pointer;border-radius:20px;
  transition:all 0.18s;
  font-family:'DM Sans',sans-serif;
}
.chip:active{transform:scale(0.96)}
.chip.active{
  border-color:rgba(168,199,255,0.5);
  background:rgba(168,199,255,0.12);
  color:var(--acc);
}

/* ── Pills ──────────────────────────────────────────── */
.pill-row{display:flex;gap:6px;flex-wrap:wrap}
.pill{
  padding:5px 12px;
  border:1px solid var(--bdr);
  background:var(--surf2);
  color:var(--mut);
  font-size:9px;letter-spacing:0.5px;
  border-radius:20px;cursor:pointer;
  transition:all 0.18s;
}
.pill.active{
  border-color:rgba(168,199,255,0.45);
  background:rgba(168,199,255,0.1);
  color:var(--acc);
}

/* ── Chart ──────────────────────────────────────────── */
.chart-wrap{width:100%;overflow:hidden;margin-bottom:16px}

/* ── Header ─────────────────────────────────────────── */
.hdr{
  background:rgba(8,10,20,0.6);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border-bottom:1px solid var(--bdr);
  padding:14px 18px;
  display:flex;justify-content:space-between;align-items:flex-start;
  max-width:560px;margin:0 auto;
  position:relative;
}
.hdr::after{
  content:'';position:absolute;bottom:0;left:12px;right:12px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(168,199,255,0.12),transparent);
}
.hdr-left .sub{
  font-size:9px;letter-spacing:3px;color:var(--mut);text-transform:uppercase;
  font-family:'DM Mono',monospace;
}
.hdr-left .title{
  font-size:22px;font-weight:300;letter-spacing:3px;
  color:var(--acc);
  text-shadow:0 0 30px rgba(168,199,255,0.4);
}
.hdr-left .countdown{font-size:9px;letter-spacing:1.5px;color:var(--mut);margin-top:3px;font-family:'DM Mono',monospace}

/* ── Live counter ───────────────────────────────────── */
.live-badge{
  display:inline-flex;align-items:center;gap:7px;
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  font-family:'DM Mono',monospace;
}
.live-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--grn);
  box-shadow:0 0 0 3px rgba(93,232,160,0.15),0 0 12px var(--grn);
  animation:pulse-live 2s ease infinite;
}
.live-dot.paused{
  background:var(--acc);
  box-shadow:0 0 0 3px rgba(168,199,255,0.15),0 0 12px var(--acc);
  animation:none;
}
.live-dot.on-break{
  background:var(--red);
  box-shadow:0 0 0 3px rgba(255,107,122,0.15),0 0 12px var(--red);
}
@keyframes pulse-live{
  0%,100%{box-shadow:0 0 0 3px rgba(93,232,160,0.15),0 0 12px var(--grn)}
  50%{box-shadow:0 0 0 6px rgba(93,232,160,0.08),0 0 20px var(--grn)}
}
.earnings-big{font-size:52px;font-weight:300;line-height:1;letter-spacing:-1px}

/* ── Day dot row ────────────────────────────────────── */
.day-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.05);
}
.day-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.08)}
.day-dot.live{background:var(--grn);box-shadow:0 0 8px var(--grn)}
.day-dot.done{background:rgba(93,232,160,0.25)}

/* ── Stat boxes ─────────────────────────────────────── */
.stat-row{display:flex;gap:8px;margin-bottom:14px}
.stat-box{
  flex:1;
  background:var(--surf);
  border:1px solid var(--bdr);
  border-radius:var(--radius-sm);
  padding:11px 13px;
  box-shadow:var(--shadow-card);
  position:relative;overflow:hidden;
}
.stat-box::before{
  content:'';position:absolute;top:0;left:4px;right:4px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);
}
.stat-box .sl{
  font-size:8px;letter-spacing:2px;
  color:var(--mut);text-transform:uppercase;
  margin-bottom:5px;
  font-family:'DM Mono',monospace;
}
.stat-box .sv{font-size:15px;font-weight:500;line-height:1}

/* ── Expandable week ────────────────────────────────── */
.wk-row{
  background:var(--surf);
  border:1px solid var(--bdr);
  border-radius:var(--radius);
  margin-bottom:8px;cursor:pointer;
  overflow:hidden;
  box-shadow:var(--shadow-card);
}
.wk-hdr{padding:13px 16px;display:flex;justify-content:space-between;align-items:center}
.wk-body{border-top:1px solid var(--bdr);padding:10px 16px 13px}

/* ── Data panel ─────────────────────────────────────── */
#data-panel{
  position:fixed;
  bottom:0;
  left:50%;transform:translateX(-50%);
  width:100%;max-width:560px;
  background:rgba(10,12,22,0.92);
  backdrop-filter:blur(40px);
  -webkit-backdrop-filter:blur(40px);
  border-top:1px solid var(--bdrh);
  border-radius:var(--radius) var(--radius) 0 0;
  padding:18px 20px;z-index:99;
  box-sizing:border-box;display:none;
  box-shadow:0 -8px 40px rgba(0,0,0,0.5);
}
#data-panel.open{display:block}

/* ── Calendar ───────────────────────────────────────── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-cell{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:6px;
  padding:4px;min-height:36px;
  transition:background 0.2s;
}
.cal-cell.cal-payday{
  background:rgba(126,180,255,0.1);
  border-color:rgba(126,180,255,0.3);
}
.cal-cell.cal-expense{
  background:rgba(255,107,122,0.09);
  border-color:rgba(255,107,122,0.25);
}
.cal-cell.cal-debt{
  background:rgba(255,173,107,0.08);
  border-color:rgba(255,173,107,0.25);
}
.cal-cell.cal-savings{
  background:rgba(93,232,160,0.08);
  border-color:rgba(93,232,160,0.25);
}
.cal-cell.cal-multi{
  background:rgba(196,160,255,0.09);
  border-color:rgba(196,160,255,0.3);
}
.cal-legend{
  display:flex;flex-wrap:wrap;gap:8px;
  margin-bottom:12px;padding:10px 14px;
  background:var(--surf);
  backdrop-filter:var(--glass-blur-sm);
  -webkit-backdrop-filter:var(--glass-blur-sm);
  border:1px solid var(--bdr);
  border-radius:var(--radius-sm);
}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:8px;color:var(--txt2);letter-spacing:0.5px;font-family:'DM Mono',monospace}
.cal-legend-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0}
.cal-cell.today{
  background:rgba(168,199,255,0.12);
  border-color:rgba(168,199,255,0.4);
  box-shadow:0 0 0 1px rgba(168,199,255,0.15) inset;
}
.cal-cell.has-exp{background:rgba(255,107,122,0.09);border-color:rgba(255,107,122,0.25)}
.cal-day-num{font-size:9px;color:var(--mut);font-family:'DM Mono',monospace}
.cal-cell.today .cal-day-num{color:var(--acc);font-weight:600}
.cal-amt{font-size:7px;color:var(--red);font-weight:500;margin-top:1px}
.cal-lbl{font-size:6px;color:var(--red);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── OT badge ───────────────────────────────────────── */
.ot-badge{
  font-size:8px;color:var(--org);
  background:rgba(255,173,107,0.1);
  padding:2px 8px;
  border:1px solid rgba(255,173,107,0.25);

}

/* ── Inline form ────────────────────────────────────── */
.inline-form{
  background:rgba(255,255,255,0.03);
  border:1px solid var(--bdrh);
  border-radius:var(--radius);
  padding:16px;margin-bottom:14px;
  box-shadow:var(--shadow-card);
}
.form-row{display:flex;gap:8px;margin-bottom:10px}
.form-row > *{flex:1}

/* ── Surplus/deficit badge ──────────────────────────── */
.bal-badge{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.bal-dot{width:9px;height:9px;border-radius:50%}
.bal-num{font-size:38px;font-weight:300;line-height:1;letter-spacing:-1px}

/* ── Debt payoff ────────────────────────────────────── */
.payoff-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;
  background:var(--surf);
  border:1px solid var(--bdr);
  border-radius:var(--radius-sm);
  border-left:2px solid var(--grn);
  margin-bottom:6px;
}
.payoff-num{
  width:22px;height:22px;border-radius:50%;
  background:rgba(93,232,160,0.1);
  border:1.5px solid rgba(93,232,160,0.4);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:var(--grn);font-weight:600;
  flex-shrink:0;
}

/* ── Goal bar ───────────────────────────────────────── */
.goal-bar{
  height:6px;background:rgba(255,255,255,0.06);
  border-radius:3px;overflow:hidden;margin-bottom:8px;
}
.goal-fill{
  height:100%;
  background:linear-gradient(90deg,var(--acc2),var(--acc));
  border-radius:3px;
  box-shadow:0 0 10px rgba(168,199,255,0.3);
}

/* ── Freedom fund box ───────────────────────────────── */
.ff-box{
  background:rgba(168,199,255,0.06);
  border:1px solid rgba(168,199,255,0.2);
  border-left:2px solid var(--acc);
  border-radius:var(--radius);
  padding:16px;margin-bottom:20px;
  box-shadow:-3px 0 20px rgba(168,199,255,0.06);
}

/* ── Gap helpers ────────────────────────────────────── */
.mt4{margin-top:4px}.mt6{margin-top:6px}.mt8{margin-top:8px}.mt10{margin-top:10px}.mt12{margin-top:12px}.mt14{margin-top:14px}.mt16{margin-top:16px}.mt18{margin-top:18px}.mt20{margin-top:20px}
.mb4{margin-bottom:4px}.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
.flex{display:flex}.gap8{gap:8px}.gap10{gap:10px}.gap6{gap:6px}
.f1{flex:1}.f2{flex:2}.bold{font-weight:600}

/* ── Color helpers ──────────────────────────────────── */
.green{color:var(--grn)}.red{color:var(--red)}.acc{color:var(--acc)}.blue{color:var(--blu)}.pur{color:var(--pur)}.org{color:var(--org)}.mut{color:var(--mut)}
.right{text-align:right}.center{text-align:center}

/* ── Scrollbar hide ─────────────────────────────────── */
*::-webkit-scrollbar{display:none}
*{scrollbar-width:none}

      <div style="font-size:11px;color:var(--red);margin-bottom:10px;line-height:1.5">⚠ This will permanently erase ALL your data — shifts, budgets, accounts, transactions, everything. This cannot be undone.</div>
      <div class="flex gap8">

<script>
'use strict';

// ─── Storage ─────────────────────────────────────────────────────────────────
function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch(e){return null}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true}catch(e){return false}}

// ─── State ───────────────────────────────────────────────────────────────────
const DEFAULT_SCH={
  hourlyRate:'',overtimeAfter:'8',overtimeMultiplier:'1.5',overtimeMode:'shift',
  weekStartDay:'0',weekStartTime:'00:00',annualGoal:'',breakRules:[],
  shifts:Object.fromEntries([0,1,2,3,4,5,6].map(d=>[d,{active:d>=1&&d<=5,start:'22:00',end:'06:00'}]))
};

let S={
  app:'tracker',
  trackerTab:'tracker',
  budgetTab:'overview',
  worthTab:'networth',
  histMode:'weeks',
  forecastMode:'4weeks',
  calTab:'calendar',
  expandedWk:null,
  schedule:{...DEFAULT_SCH,shifts:{...DEFAULT_SCH.shifts}},
  deductions:[],
  log:{},
  customShifts:[],
  paychecks:{},
  envelopes:{}, // {catId: monthlyLimit}
  assets:[],    // [{id,label,value,type}] for net worth
  snapshots:[],  // [{id,date,netWorth,note}]
  milestones:[], // [{id,label,target,achieved,achievedDate}]
  retirement401k:{
    accountBalance:'',      // legacy / manual override (kept for compat)
    balanceAnchor:null,     // {amount, date} — user-confirmed actual balance on a date
    employeeType:'percent',
    employeeAmount:'',
    matchFormula:'100',
    matchUpTo:'3',
    rothOrPretax:'pretax',
  },
  sideIncome:[],
  savingsChallenge:null,
  taxRate:'',   // estimated tax % for YTD
  earlyDepositDays:0, // 0=no early deposit, 1=1 day early, 2=2 days early
  pin:'',       // 4-digit PIN ('' = disabled)
  calLegendHidden:false,
  expenses:[],
  goals:[],
  debts:[],
  transactions:[], // [{id,date,description,amount,category,source,imported}]
  incomeSafetyThresholds:{monthlyFloor:'',notifyOnShortfall:true}, // income threshold alerts
  autoCatRules:[], // [{id,keyword,category}] user-defined auto-categorize rules
  pause:{paused:false,pausedAt:null,dayKey:null,accBreakSec:0,onBreak:false,breakStart:null},
};

function loadState(){
  const sch=lsGet('sch_v3'),ded=lsGet('ded_v3'),log=lsGet('log_v3'),
        ps=lsGet('pause_v3'),cs=lsGet('custom_shifts_v1'),pc=lsGet('paychecks_v1'),
        exp=lsGet('budget_expenses_v1'),gls=lsGet('budget_goals_v1'),dbs=lsGet('budget_debts_v1'),
        env=lsGet('envelopes_v1'),ast=lsGet('assets_v1'),txr=lsGet('tax_rate_v1'),pn=lsGet('pin_v1'),
        snp=lsGet('snapshots_v1'),mls=lsGet('milestones_v1'),
        r401=lsGet('ret401k_v1'),si=lsGet('side_income_v1'),sc=lsGet('savings_challenge_v1'),
        txns=lsGet('transactions_v1');
  const ist=lsGet('income_thresholds_v1'),acr=lsGet('auto_cat_rules_v1');
  if(sch)S.schedule={...DEFAULT_SCH,...sch,shifts:{...DEFAULT_SCH.shifts,...sch.shifts}};
  if(ded)S.deductions=ded;
  if(log)S.log=log;
  if(cs)S.customShifts=cs;
  if(pc)S.paychecks=pc;
  if(exp)S.expenses=exp;
  if(gls)S.goals=gls;
  if(dbs)S.debts=dbs;
  if(env)S.envelopes=env;
  if(ast)S.assets=ast;
  if(txr)S.taxRate=txr;
  if(pn)S.pin=pn;
  if(snp)S.snapshots=snp;
  if(mls)S.milestones=mls;
  if(r401)S.retirement401k={...S.retirement401k,...r401};
  if(si)S.sideIncome=si;
  if(sc)S.savingsChallenge=sc;
  if(txns)S.transactions=txns;
  if(ist)S.incomeSafetyThresholds={...S.incomeSafetyThresholds,...ist};
  if(acr)S.autoCatRules=acr;
  const edd=lsGet('early_deposit_v1');if(edd!=null)S.earlyDepositDays=edd;
  if(ps&&ps.dayKey===dayKey(new Date()))S.pause=ps;
  // On load: remove log entries only for the specific dates covered by custom shifts
  let logChanged=false;
  for(const cs of S.customShifts){
    const csDate=cs.date;
    const wkStr=localStr(getWeekStart(parseLocal(csDate),S.schedule.weekStartDay,S.schedule.weekStartTime));
    if(S.log[wkStr]&&S.log[wkStr][csDate]){
      const wkMap={...S.log[wkStr]};
      delete wkMap[csDate];
      if(Object.keys(wkMap).length>0)S.log={...S.log,[wkStr]:wkMap};
      else{const l={...S.log};delete l[wkStr];S.log=l;}
      logChanged=true;
    }
  }
  if(logChanged)lsSet('log_v3',S.log);
  S.app=localStorage.getItem('__activeApp__')||'tracker';
}

function save(key){
  const map={
    schedule:'sch_v3',deductions:'ded_v3',log:'log_v3',pause:'pause_v3',
    customShifts:'custom_shifts_v1',paychecks:'paychecks_v1',
    expenses:'budget_expenses_v1',goals:'budget_goals_v1',debts:'budget_debts_v1',
    envelopes:'envelopes_v1',assets:'assets_v1',taxRate:'tax_rate_v1',pin:'pin_v1',
    snapshots:'snapshots_v1',milestones:'milestones_v1',
    transactions:'transactions_v1',
    incomeSafetyThresholds:'income_thresholds_v1',autoCatRules:'auto_cat_rules_v1',
    retirement401k:'ret401k_v1',sideIncome:'side_income_v1',savingsChallenge:'savings_challenge_v1',
    earlyDepositDays:'early_deposit_v1'
  };
  lsSet(map[key],S[key]);
  showToast(false);
}

// ─── PIN ─────────────────────────────────────────────────────────────────────
let _pinEntry='',_pinSetting=false,_pinSettingStep=0,_pinFirst='';
function initPin(){
  if(S.pin){document.getElementById('pin-overlay').classList.remove('hidden');}
}
function pinPress(k){
  if(k==='back'){_pinEntry=_pinEntry.slice(0,-1);updatePinDots();return;}
  if(k==='')return;
  if(_pinEntry.length>=4)return;
  _pinEntry+=k;
  updatePinDots();
  if(_pinEntry.length===4){
    setTimeout(()=>{
      if(_pinSetting){
        if(_pinSettingStep===0){_pinFirst=_pinEntry;_pinEntry='';_pinSettingStep=1;document.getElementById('pin-prompt').textContent='Confirm PIN';updatePinDots();}
        else if(_pinFirst===_pinEntry){S.pin=_pinEntry;save('pin');_pinSetting=false;_pinSettingStep=0;_pinFirst='';_pinEntry='';document.getElementById('pin-overlay').classList.add('hidden');showToast(true);render();}
        else{_pinEntry='';_pinFirst='';_pinSettingStep=0;flashPinError('PINs did not match');document.getElementById('pin-prompt').textContent='Set New PIN';}
      } else {
        if(_pinEntry===S.pin){_pinEntry='';document.getElementById('pin-overlay').classList.add('hidden');}
        else{_pinEntry='';flashPinError('Incorrect PIN');}
      }
    },100);
  }
}
function updatePinDots(){
  for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(d){d.classList.toggle('filled',i<_pinEntry.length);d.classList.remove('error');}}
}
function flashPinError(msg){
  for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(d)d.classList.add('error');}
  document.getElementById('pin-prompt').textContent=msg;
  setTimeout(()=>{updatePinDots();document.getElementById('pin-prompt').textContent=_pinSetting?'Set New PIN':'Enter PIN';},900);
}
function startSetPin(){_pinSetting=true;_pinSettingStep=0;_pinFirst='';_pinEntry='';document.getElementById('pin-prompt').textContent='Set New PIN';document.getElementById('pin-overlay').classList.remove('hidden');}
function clearPin(){S.pin='';save('pin');showToast(true);render();}

// ─── Toast ───────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(manual=true){
  const t=document.getElementById('save-toast'),m=document.getElementById('toast-msg');
  if(!t)return;
  t.classList.remove('manual');
  if(manual)t.classList.add('manual');
  m.textContent=manual?'SAVED':'AUTO-SAVED';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

// ─── Math helpers ─────────────────────────────────────────────────────────────
function fmt$(n,sign=false){
  const s=Math.abs(n).toLocaleString('en-US',{style:'currency',currency:'USD'});
  return(sign&&n>0?'+':sign&&n<0?'−':n<0?'−':'')+s;
}
function fmtTime(sec){
  const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=Math.floor(sec%60);
  return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function toMin(t){const[h,m]=(t||'00:00').split(':').map(Number);return h*60+m;}
function localStr(d){const x=new Date(d);x.setHours(0,0,0,0);return`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;}
function parseLocal(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function dayKey(d){return localStr(d);}
function todayStr(){return localStr(new Date());}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const FULL_DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function getWeekStart(date,startDay,startTime){
  const sd=parseInt(startDay)||0,sm=toMin(startTime||'00:00');
  const nowMin=date.getHours()*60+date.getMinutes(),nowDay=date.getDay();
  let back=(nowDay-sd+7)%7;
  if(back===0&&nowMin<sm)back=7;
  const r=new Date(date);r.setDate(r.getDate()-back);r.setHours(Math.floor(sm/60),sm%60,0,0);
  return r;
}
function wkKey(date){return localStr(getWeekStart(date,S.schedule.weekStartDay,S.schedule.weekStartTime));}
function wkEnd(ws){const we=new Date(ws);we.setDate(we.getDate()+7);we.setSeconds(we.getSeconds()-1);return we;}
// Assumed pay date = day after week end, adjusted for early deposit
// If a paycheck was actually received (S.paychecks[wkStr].date), use that instead
function payDateForWeek(wkStr){
  const pc=S.paychecks[wkStr];
  if(pc?.date)return parseLocal(pc.date);
  const ws=parseLocal(wkStr);
  const we=wkEnd(ws);
  const pd=new Date(we);
  pd.setDate(pd.getDate()+1);
  const offset=parseInt(S.earlyDepositDays)||0;
  pd.setDate(pd.getDate()-offset);
  return pd;
}
function timeLeft(now,ws){
  const diff=wkEnd(ws)-now;if(diff<=0)return null;
  const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000);
  return d>0?`${d}d ${h}h left`:h>0?`${h}h ${m}m left`:`${m}m left`;
}

function calcEarnings(sec,rate,otA,otM){
  if(!rate||sec<=0)return 0;
  const h=sec/3600,oa=parseFloat(otA)||Infinity,om=parseFloat(otM)||1.5;
  return h<=oa?h*rate:(oa*rate)+((h-oa)*rate*om);
}

// Global live shift earnings — usable from any part of the app
function getLiveEarned(){
  const now=new Date(),rate=parseFloat(S.schedule.hourlyRate)||0;
  if(!rate)return 0;
  const shift=getActiveShift(now);
  if(!shift)return 0;
  const p=S.pause;
  let liveSec=p.paused&&p.pausedAt!=null?p.pausedAt:secsIntoShift(now,toMin(shift.shift.start));
  const brkLive=p.onBreak&&p.breakStart?Math.floor((now-p.breakStart)/1000):0;
  const netSec=Math.max(0,liveSec-(p.accBreakSec+brkLive));
  const ws=getWeekStart(shift.date,S.schedule.weekStartDay,S.schedule.weekStartTime);
  const wk=localStr(ws);
  const todayDk=dayKey(shift.date);
  const thisWk=S.log[wk]||{};
  const priorSec=Object.entries(thisWk).reduce((s,[k,v])=>k===todayDk?s:s+v,0);
  const covDays=csCoveredDays(wk);
  if(covDays.has(todayDk))return csInWeek(wk).filter(c=>c.date===todayDk).reduce((s,c)=>s+csGross(c),0);
  const oa=S.schedule.overtimeAfter,om=S.schedule.overtimeMultiplier,otMode=S.schedule.overtimeMode;
  if(otMode==='week')return calcEarnings(priorSec+netSec,rate,oa,om)-calcEarnings(priorSec,rate,oa,om);
  return calcEarnings(netSec,rate,oa,om);
}
function weekGross(dayMap,skipDk,liveSec,rate,otA,otM,otMode,csGrossAmt,coveredDays){
  // coveredDays: Set of dayKey strings replaced by custom shifts (no double-count)
  const extra=csGrossAmt||0;
  const covered=coveredDays||new Set();
  const effLive=covered.has(skipDk)?0:liveSec;
  function filteredMap(){return Object.fromEntries(Object.entries(dayMap).filter(([k])=>k!==skipDk&&!covered.has(k)));}
  if(otMode==='week'){
    const s=Object.values(filteredMap()).reduce((a,b)=>a+b,0);
    return calcEarnings(s+effLive,rate,otA,otM)+extra;
  }
  let t=extra;
  for(const[k,v]of Object.entries(filteredMap()))t+=calcEarnings(v,rate,otA,otM);
  return t+calcEarnings(effLive,rate,otA,otM);
}
function applyDed(gross,deds){
  let t=0;for(const d of(deds||[])){const v=parseFloat(d.value)||0;t+=d.type==='flat'?v:gross*(v/100);}
  // Auto-include tax rate as an additional percent deduction if set
  const tr=parseFloat(S.taxRate)||0;
  if(tr>0)t+=gross*(tr/100);
  return Math.max(0,gross-Math.min(t,gross));
}
function csGross(cs){return cs.type==='flat'?parseFloat(cs.gross)||0:(parseFloat(cs.hours)||0)*(parseFloat(cs.rate)||0);}
function csInWeek(wkStr){
  const ws=parseLocal(wkStr),we=new Date(ws.getTime()+7*24*3600*1000-1);
  return S.customShifts.filter(cs=>{const d=parseLocal(cs.date);return d>=ws&&d<=we;});
}
// Days covered by custom shifts in a week (these replace logged hours)
function csCoveredDays(wkStr){
  return new Set(csInWeek(wkStr).map(cs=>cs.date));
}

function getActiveShift(now){
  const sch=S.schedule,dowNow=now.getDay(),minNow=now.getHours()*60+now.getMinutes();
  for(const offset of[0,-1]){
    const dow=((dowNow+offset)+7)%7,sh=sch.shifts[dow];if(!sh?.active)continue;
    const sm=toMin(sh.start),em=toMin(sh.end),ov=em<sm;
    let ok=false;
    if(ov)ok=offset===0?minNow>=sm:minNow<em;
    else if(offset===0)ok=minNow>=sm&&minNow<em;
    if(ok){const d=new Date(now);d.setDate(d.getDate()+offset);return{dow,date:d,shift:sh};}
  }
  return null;
}
function secsIntoShift(now,startMin){const n=now.getHours()*60+now.getMinutes()+now.getSeconds()/60;let d=n-startMin;if(d<0)d+=1440;return d*60;}

// Budget helpers
function toWeekly(e){const a=parseFloat(e.amount)||0;switch(e.frequency){case'weekly':return a;case'biweekly':return a/2;case'monthly':return a*12/52;case'yearly':return a/52;default:return 0;}}
function toMonthly(e){const a=parseFloat(e.amount)||0;switch(e.frequency){case'weekly':return a*52/12;case'biweekly':return a*26/12;case'monthly':return a;case'yearly':return a/12;default:return 0;}}
function daysUntil(s){const d=parseLocal(s),t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/86400000);}

// Get actual spend from imported transactions by category for a month (alias)
function txSpendByCatForMonth(catId,yr,mo){
  const from=new Date(yr,mo,1),to=new Date(yr,mo+1,0,23,59,59,999);
  return S.transactions
    .filter(t=>{const d=parseLocal(t.date);return d>=from&&d<=to&&t.category===catId&&(t.amount<0||(t.type&&(t.type.toLowerCase()==='purchase'||t.type.toLowerCase()==='direct debit')));})
    .reduce((s,t)=>s+Math.abs(parseFloat(t.amount)||0),0);
}
function inWeek(e,ws){
  if(e.frequency==='one-time'){if(!e.oneTimeDate||e.paid)return false;const d=parseLocal(e.oneTimeDate),we=new Date(ws);we.setDate(we.getDate()+6);we.setHours(23,59,59,999);return d>=ws&&d<=we;}
  // Recurring: check if dayOfMonth falls in this week
  if(e.dayOfMonth){const dom=parseInt(e.dayOfMonth);for(let i=0;i<7;i++){const dd=new Date(ws);dd.setDate(dd.getDate()+i);if(dd.getDate()===dom)return true;}return false;}
  return true; // recurring with no day: always in week
}
function inMonth(e,yr,mo){
  if(e.frequency==='one-time'){if(!e.oneTimeDate||e.paid)return false;const d=parseLocal(e.oneTimeDate);return d.getFullYear()===yr&&d.getMonth()===mo;}
  return true; // recurring always in month
}
function expWeekAmt(e,ws){
  if(e.frequency==='one-time')return parseFloat(e.amount)||0;
  if(e.dayOfMonth){const dom=parseInt(e.dayOfMonth);for(let i=0;i<7;i++){const dd=new Date(ws);dd.setDate(dd.getDate()+i);if(dd.getDate()===dom)return parseFloat(e.amount)||0;}return 0;}
  return toWeekly(e);
}
function expMonthAmt(e,yr,mo){
  if(e.frequency==='one-time')return parseFloat(e.amount)||0;
  return toMonthly(e);
}

function tickTracker(){
  const now=new Date(),rate=parseFloat(S.schedule.hourlyRate)||0;
  if(!rate)return;
  const shift=getActiveShift(now);
  const p=S.pause;

  let liveSec=0;
  if(shift){
    if(p.paused&&p.pausedAt!=null)liveSec=p.pausedAt;
    else liveSec=secsIntoShift(now,toMin(shift.shift.start));
  }
  const brkLive=p.onBreak&&p.breakStart?Math.floor((now-p.breakStart)/1000):0;
  const totalBrk=p.accBreakSec+brkLive;
  const netSec=Math.max(0,liveSec-totalBrk);
  const oa=S.schedule.overtimeAfter,om=S.schedule.overtimeMultiplier,otMode=S.schedule.overtimeMode;

  const ws=getWeekStart(shift?shift.date:now,S.schedule.weekStartDay,S.schedule.weekStartTime);
  const wk=localStr(ws);
  const thisWk=S.log[wk]||{};
  const todayDk=shift?dayKey(shift.date):dayKey(now);
  const priorSec=Object.entries(thisWk).reduce((s,[k,v])=>k===todayDk?s:s+v,0);
  const covDays=csCoveredDays(wk);
  const todayCov=covDays.has(todayDk);

  let earned=0;
  if(todayCov) earned=csInWeek(wk).filter(c=>c.date===todayDk).reduce((s,c)=>s+csGross(c),0);
  else if(otMode==='week')earned=calcEarnings(priorSec+netSec,rate,oa,om)-calcEarnings(priorSec,rate,oa,om);
  else earned=calcEarnings(netSec,rate,oa,om);

  const ot=otMode==='week'?
    {inOT:(priorSec+netSec)>(parseFloat(oa)||Infinity)*3600,otHours:Math.max(0,(priorSec+netSec)/3600-(parseFloat(oa)||Infinity)),otRate:rate*(parseFloat(om)||1.5)}:
    {inOT:netSec/3600>(parseFloat(oa)||Infinity),otHours:Math.max(0,netSec/3600-(parseFloat(oa)||Infinity)),otRate:rate*(parseFloat(om)||1.5)};

  const el=document.getElementById('live-earned');if(el)el.textContent=fmt$(earned);
  const et=document.getElementById('live-time');if(et)et.textContent=fmtTime(netSec)+' worked'+(p.onBreak?` · ON BREAK ${fmtTime(brkLive)}`:'')+(totalBrk>0&&!p.onBreak?` · ${fmtTime(totalBrk)} breaks`:'');
  const otEl=document.getElementById('live-ot');if(otEl)otEl.style.display=ot.inOT?'inline-flex':'none';
  if(ot.inOT&&otEl)otEl.textContent=`OT (${otMode}) +${ot.otHours.toFixed(1)}h`;

  // color
  const bigEl=document.getElementById('live-earned');
  if(bigEl)bigEl.style.color=p.paused?'var(--acc)':ot.inOT?'var(--org)':'var(--grn)';

  // progress bar
  if(shift){
    const sm=toMin(shift.shift.start),em=toMin(shift.shift.end),tot=em<sm?em+1440-sm:em-sm;
    const pct=Math.min(100,(liveSec/60/tot)*100);
    const pb=document.getElementById('shift-bar');if(pb)pb.style.width=pct+'%';
    if(pb)pb.style.background=p.paused?'var(--acc)':ot.inOT?'var(--org)':'var(--grn)';
    const pp=document.getElementById('shift-pct');if(pp)pp.textContent=Math.round(pct)+'% shift complete';
  }

  // weekly OT bar
  if(S.schedule.overtimeMode==='week'&&S.schedule.overtimeAfter){
    const otAfterSec=(parseFloat(S.schedule.overtimeAfter)||0)*3600;
    const wpct=Math.min(100,((priorSec+netSec)/otAfterSec)*100);
    const wb=document.getElementById('week-ot-bar');if(wb){wb.style.width=wpct+'%';wb.style.background=ot.inOT?'var(--org)':'var(--blu)';}
    const wt=document.getElementById('week-ot-txt');if(wt)wt.textContent=`${((priorSec+netSec)/3600).toFixed(1)}h / ${S.schedule.overtimeAfter}h${ot.inOT?' · IN OT':''}`;
  }

  // dot badge
  const dot=document.getElementById('live-dot');
  if(dot){dot.className='live-dot'+(p.paused?' paused':p.onBreak?' on-break':'');}

  // break btn
  const bb=document.getElementById('break-btn');
  if(bb){bb.textContent=p.onBreak?'■ End Break':'⏱ Break';bb.style.color=p.onBreak?'var(--red)':'#c08050';bb.style.borderColor=p.onBreak?'rgba(192,80,80,.5)':'rgba(192,128,80,.3)';}

  // auto-log full shift when it ends (shift was active, now it's not)
  // This is handled in a separate interval — see autoLogCheck()

  // auto-save every 60s
  if(!p.paused&&shift&&netSec>0&&Math.floor(netSec)%60===0&&netSec>0){
    const todayDkNow=dayKey(shift.date);
    S.log={...S.log,[wk]:{...(S.log[wk]||{}),[todayDkNow]:netSec}};
    lsSet('log_v3',S.log);
    showToast(false);
  }
}

    <!-- Paycheck Variance Insights -->
    ${(()=>{
      const pcEntries=Object.entries(S.paychecks).filter(([,pc])=>pc.amount).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,8);
      if(pcEntries.length<2)return'';
      const variances=pcEntries.map(([wkS,pc])=>{
        const dm=S.log[wkS]||{};const cg=csInWeek(wkS).reduce((s,c)=>s+csGross(c),0);
        const g=weekGross(dm,'__x__',0,rate,oa,om,otMode,cg,csCoveredDays(wkS));

        +'</div>'

  </div>`;

function savePaycheck(wk,field,val){
  if(!S.paychecks[wk])S.paychecks[wk]={};
  if(field==='amount'){const v=parseFloat(val);if(v>0)S.paychecks[wk].amount=v;else delete S.paychecks[wk].amount;}
  else S.paychecks[wk][field]=val;
  if(!S.paychecks[wk].amount)delete S.paychecks[wk];
  save('paychecks');
  render();
}

function handlePause(){
  const now=new Date(),shift=getActiveShift(now),p=S.pause;
  if(!shift)return;
  const liveSec=p.paused&&p.pausedAt!=null?p.pausedAt:secsIntoShift(now,toMin(shift.shift.start));
  const brkLive=p.onBreak&&p.breakStart?Math.floor((now-p.breakStart)/1000):0;
  const netSec=Math.max(0,liveSec-(p.accBreakSec+brkLive));
  const ws=getWeekStart(shift.date,S.schedule.weekStartDay,S.schedule.weekStartTime);
  const wk=localStr(ws);
  if(!p.paused){
    // LEFT EARLY: save netSec as final for this shift day, freeze it
    S.log={...S.log,[wk]:{...(S.log[wk]||{}),[dayKey(shift.date)]:netSec}};
    S.pause={...p,paused:true,pausedAt:netSec,dayKey:dayKey(now)};
    save('log');save('pause');
  }else{
    // Resume: clear pause but keep the saved log value — don't let live time grow beyond saved
    S.pause={...p,paused:false,pausedAt:null,dayKey:dayKey(now)};
    save('pause');
  }
  render();
}

function handleManualSave(){
  const now=new Date(),shift=getActiveShift(now),p=S.pause;
  if(!shift)return;
  const liveSec=p.paused&&p.pausedAt!=null?p.pausedAt:secsIntoShift(now,toMin(shift.shift.start));
  const brkLive=p.onBreak&&p.breakStart?Math.floor((now-p.breakStart)/1000):0;
  const netSec=Math.max(0,liveSec-(p.accBreakSec+brkLive));
  const ws=getWeekStart(shift.date,S.schedule.weekStartDay,S.schedule.weekStartTime);
  const wk=localStr(ws);
  S.log={...S.log,[wk]:{...(S.log[wk]||{}),[dayKey(shift.date)]:netSec}};
  save('log');showToast(true);
}

function handleBreak(){
  const now=new Date(),p=S.pause;
  if(!p.onBreak){
    S.pause={...p,onBreak:true,breakStart:now.getTime()};
  }else{
    const elapsed=p.breakStart?Math.floor((now-p.breakStart)/1000):0;
    S.pause={...p,onBreak:false,breakStart:null,accBreakSec:(p.accBreakSec||0)+elapsed};
  }
  save('pause');
}

// Auto-log full shift at shift end
function autoLogCheck(){
  const now=new Date(),rate=parseFloat(S.schedule.hourlyRate)||0;
  if(!rate)return;
  // Look at each active day shift — if the shift ended in the last 2 min and nothing logged, auto-log full duration
  const sch=S.schedule;
  for(let dow=0;dow<7;dow++){
    const sh=sch.shifts[dow];if(!sh?.active)continue;
    const sm=toMin(sh.start),em=toMin(sh.end),overnight=em<sm;
    // Find the date this shift was on
    const shiftDate=new Date(now);
    if(overnight){
      // overnight shift started yesterday (dow-1), ends today
      const endMin=now.getHours()*60+now.getMinutes();
      if(now.getDay()===((dow+1)%7)&&endMin>=em&&endMin<em+3){
        // shift just ended in last 3 min
        shiftDate.setDate(shiftDate.getDate()-1);
        shiftDate.setDay&&(shiftDate=new Date(now));
        // find the start date
        const sd=new Date(now);sd.setDate(sd.getDate()-1);
        if(sd.getDay()===dow){
          const ws=getWeekStart(sd,sch.weekStartDay,sch.weekStartTime);
          const wk=localStr(ws),dk=dayKey(sd);
          if(!(S.log[wk]&&S.log[wk][dk])){
            const dur=em+1440-sm;
            S.log={...S.log,[wk]:{...(S.log[wk]||{}),[dk]:dur*60}};
            lsSet('log_v3',S.log);showToast(false);
          }
        }
      }
    } else {
      if(now.getDay()===dow){
        const nowMin=now.getHours()*60+now.getMinutes();
        if(nowMin>=em&&nowMin<em+3){
          const ws=getWeekStart(now,sch.weekStartDay,sch.weekStartTime);
          const wk=localStr(ws),dk=dayKey(now);
          if(!(S.log[wk]&&S.log[wk][dk])){
            const dur=em-sm;
            S.log={...S.log,[wk]:{...(S.log[wk]||{}),[dk]:dur*60}};
            lsSet('log_v3',S.log);showToast(false);
          }
        }
      }
    }
  }
}
setInterval(autoLogCheck,60000);

function purgeLogDay(dateStr){
  // Remove a single day's log entry so a custom shift can't double-count
  const wkStr=localStr(getWeekStart(parseLocal(dateStr),S.schedule.weekStartDay,S.schedule.weekStartTime));
  if(!S.log[wkStr]||!S.log[wkStr][dateStr])return;
  const wkMap={...S.log[wkStr]};
  delete wkMap[dateStr];
  if(Object.keys(wkMap).length>0)S.log={...S.log,[wkStr]:wkMap};
  else{const l={...S.log};delete l[wkStr];S.log=l;}
  lsSet('log_v3',S.log);
}
function saveCS(){
  if(!_csForm.date)return;
  if(_csForm.type==='hourly'&&(!_csForm.hours||!_csForm.rate))return;
  if(_csForm.type==='flat'&&!_csForm.gross)return;
  purgeLogDay(_csForm.date);
  S.customShifts=[...S.customShifts,{..._csForm,id:Date.now().toString()}];
  save('customShifts');_csFormOpen=false;render();
}

function saveHistEntry(){
  const f=_hForm,rate=parseFloat(S.schedule.hourlyRate)||0,er=parseFloat(f.rate)||rate;
  if(!f.date)return;

  // GROSS + TAKEHOME mode — store as flat custom shift, optionally record paycheck takehome
  if(f.inputType==='gross'){
    const g=parseFloat(f.gross)||0;if(g<=0)return;
    const th=parseFloat(f.takehome)||0;
    // Calculate implied hours/day from gross and rate for display
    const activeDays=Object.values(S.schedule.shifts).filter(s=>s.active).length||1;
    const impliedHrs=er>0?(g/er):0;
    const impliedHrsPerDay=impliedHrs/activeDays;
    // Store as a flat custom shift for the week
    const ref=parseLocal(f.date);
    const wkStr=localStr(getWeekStart(ref,S.schedule.weekStartDay,S.schedule.weekStartTime));
    purgeLogDay(f.date);
    S.customShifts=[...S.customShifts,{id:Date.now().toString(),label:f.note||(impliedHrsPerDay>0?`~${impliedHrsPerDay.toFixed(1)}h/day avg`:'Weekly pay'),date:f.date,type:'flat',gross:String(g)}];
    // If take-home provided, record as paycheck
    if(th>0){
      if(!S.paychecks[wkStr])S.paychecks[wkStr]={};
      S.paychecks[wkStr].amount=th;
      S.paychecks[wkStr].date=f.date;
      save('paychecks');
    }
    save('customShifts');_hFormOpen=false;render();return;
  }

  if(f.inputType==='weekly'){
    const totalHrs=parseFloat(f.weekHours)||0;if(totalHrs<=0)return;
    const ref=parseLocal(f.date),ewk=localStr(getWeekStart(ref,S.schedule.weekStartDay,S.schedule.weekStartTime));
    const ws2=getWeekStart(ref,S.schedule.weekStartDay,S.schedule.weekStartTime);
    const activeDays=[];
    for(let i=0;i<7;i++){const dow=(parseInt(S.schedule.weekStartDay||0)+i)%7,sh=S.schedule.shifts[dow];if(!sh?.active)continue;const sm=toMin(sh.start),em=toMin(sh.end),dur=em<sm?em+1440-sm:em-sm;const dd=new Date(ws2);dd.setDate(ws2.getDate()+i);activeDays.push({dk:dayKey(dd),min:dur});}
    const usedRate=er>0?er:rate;
    S.customShifts=[...S.customShifts,{id:Date.now().toString(),label:f.note||'Weekly historical',date:f.date,type:'hourly',hours:String(totalHrs),rate:String(usedRate)}];
    save('customShifts');_hFormOpen=false;render();return;
  }
  let secs=0;
  if(f.inputType==='hours')secs=(parseFloat(f.hours)||0)*3600;
  else{const sm=toMin(f.start),em=toMin(f.end);secs=em<sm?(em+1440-sm)*60:(em-sm)*60;}
  if(secs<=0)return;
  const d=parseLocal(f.date),ewk=localStr(getWeekStart(d,S.schedule.weekStartDay,S.schedule.weekStartTime)),dk=dayKey(d);
  if(er!==rate&&er>0){
    S.customShifts=[...S.customShifts,{id:Date.now().toString(),label:f.note||'Historical entry',date:f.date,type:'hourly',hours:String(secs/3600),rate:String(er)}];
    save('customShifts');_hFormOpen=false;render();return;
  }
  S.log={...S.log,[ewk]:{...(S.log[ewk]||{}),[dk]:secs}};
  save('log');_hFormOpen=false;render();
}

function calcIncome(src){
  const annualEl=document.getElementById('ic-annual'),hrsEl=document.getElementById('ic-hrs'),resEl=document.getElementById('ic-result');
  if(!resEl)return;
  const annual=parseFloat(annualEl?.value)||0;
  const hrs=parseFloat(hrsEl?.value)||40;
  const taxPct=parseFloat(S.taxRate)||0;
  const rate=parseFloat(S.schedule.hourlyRate)||0;
  let lines=[];
  if(annual>0){
    const implied=annual/(hrs*52);
    const afterTax=annual*(1-taxPct/100);
    lines.push('At '+fmt$(annual)+'/yr with '+hrs+'h/wk → '+fmt$(implied)+'/hr');
    if(taxPct>0)lines.push('After '+taxPct+'% tax: '+fmt$(afterTax)+'/yr · '+fmt$(afterTax/12)+'/mo');
  }
  if(rate>0){
    const annFromRate=rate*hrs*52;
    const afterTax2=annFromRate*(1-taxPct/100);
    lines.push('At current $'+rate.toFixed(2)+'/hr × '+hrs+'h/wk = '+fmt$(annFromRate)+'/yr');
    if(taxPct>0)lines.push('Take-home: '+fmt$(afterTax2)+'/yr · '+fmt$(afterTax2/12)+'/mo · '+fmt$(afterTax2/52)+'/wk');
  }
  resEl.innerHTML=lines.length?lines.join('<br>'):'Enter an annual target or set your hourly rate above';
}

function getBudgetIncome(){
  const rate=parseFloat(S.schedule.hourlyRate)||0;
  const sch=S.schedule;
  let hrs=0;for(const sh of Object.values(sch.shifts)){if(!sh.active)continue;const sm=toMin(sh.start),em=toMin(sh.end),dur=em<sm?em+1440-sm:em-sm;hrs+=dur/60;}
  const wGross=hrs*rate,wNet=applyDed(wGross,S.deductions);
  // Add recurring side income to weekly/monthly projections
  const siWeekly=S.sideIncome.filter(s=>s.frequency!=='one-time').reduce((t,s)=>t+toWeekly({amount:s.amount,frequency:s.frequency}),0);
  const siMonthly=S.sideIncome.filter(s=>s.frequency!=='one-time').reduce((t,s)=>t+toMonthly({amount:s.amount,frequency:s.frequency}),0);
  return{wGross,wNet:wNet+siWeekly,mGross:wGross*52/12,mNet:wNet*52/12+siMonthly,connected:!!rate};
}

// Fix 1: actual spending from imported transactions for a date range
function getTxSpending(fromDate,toDate){
  // Only count negative-amount transactions (purchases/expenses), not deposits
  return S.transactions
    .filter(t=>{const d=parseLocal(t.date);return d>=fromDate&&d<=toDate&&(t.amount<0||(t.type&&(t.type.toLowerCase()==='purchase'||t.type.toLowerCase()==='direct debit')));})
    .reduce((s,t)=>s+Math.abs(parseFloat(t.amount)||0),0);
}
function getTxSpendingByCategory(fromDate,toDate){
  const byCat={};
  S.transactions
    .filter(t=>{const d=parseLocal(t.date);return d>=fromDate&&d<=toDate&&(t.amount<0||(t.type&&(t.type.toLowerCase()==='purchase'||t.type.toLowerCase()==='direct debit')));})
    .forEach(t=>{const c=t.category||'custom';byCat[c]=(byCat[c]||0)+Math.abs(parseFloat(t.amount)||0);});
  return byCat;
}
// Get imported deposit/income for a date range (positive-amount deposit-type transactions)
function getTxIncome(fromDate,toDate){
  return S.transactions
    .filter(t=>{
      if(!t.date)return false;
      const d=parseLocal(t.date);
      if(d<fromDate||d>toDate)return false;
      const amt=parseFloat(t.amount)||0;
      if(amt<=0)return false;
      const type=(t.type||'').toLowerCase();
      // Only count transactions that are explicitly deposit-typed or manually added (no type set)
      return type==='deposit'||type==='direct deposit'||type==='cash bonus'||type==='income'||(!t.imported&&type==='');
    })
    .reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
}
